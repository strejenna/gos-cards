<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ГОСЫ — карточки</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:#0e0e12;color:#f0f0f8;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ---- LAYOUT ---- */
header{padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(14,14,18,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:200}
.logo{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;color:#a78bfa}
.logo span{color:#8888aa;font-weight:400}
.gbar{height:2px;background:#1e1e28}.gf{height:100%;background:linear-gradient(90deg,#4ade9a 0%,#a78bfa 50%,#f5c542 75%,#ff8080 100%);transition:width .4s}

/* ---- TABS ---- */
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(14,14,18,.92);position:sticky;top:50px;z-index:190;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:80px;padding:10px 4px;text-align:center;font-size:12px;color:#8888aa;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:#f0f0f8}
.tab.on{color:#f0f0f8;border-bottom-color:#a78bfa;font-weight:500}
.tab .tab-cnt{display:block;font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;margin-bottom:1px}

.page{display:none;padding:1.25rem}.page.on{display:block}

/* ---- CARDS PAGE ---- */
.ctrl-lbl{font-size:10px;color:#8888aa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem}
.ctrl{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.85rem}
.pill{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.09);background:none;font-size:12px;color:#8888aa;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.pill:hover{border-color:rgba(255,255,255,.2);color:#f0f0f8}
.pill.on{border-color:#a78bfa;background:rgba(167,139,250,.12);color:#a78bfa}
.pill.p1{border-color:rgba(74,222,154,.4);background:rgba(74,222,154,.1);color:#4ade9a}
.pill.p2{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1);color:#a78bfa}
.pill.p3{border-color:rgba(245,197,66,.4);background:rgba(245,197,66,.1);color:#f5c542}
.pill.p4{border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);color:#ff8080}

.meta{font-size:12px;color:#555570;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}

.card{border-radius:14px;border:1px solid rgba(255,255,255,.09);overflow:hidden;margin-bottom:1rem;transition:border-color .3s}
.card.s1{border-color:rgba(74,222,154,.25)}
.card.s2{border-color:rgba(167,139,250,.25)}
.card.s3{border-color:rgba(245,197,66,.25)}
.card.s4{border-color:rgba(255,107,107,.2)}
.front{background:#16161d;padding:1.35rem;cursor:pointer}
.back{background:#1a1a26;padding:1.35rem;display:none;border-top:1px solid rgba(255,255,255,.07)}
.card.flipped .back{display:block}
.qnum{font-size:11px;color:#555570;font-family:'Unbounded',sans-serif;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.qtitle{font-size:16px;font-weight:500;color:#f0f0f8;line-height:1.5;margin-bottom:1rem}
.ann-block{background:#1e1e28;border:1px solid rgba(255,255,255,.07);border-left:2px solid #a78bfa;border-radius:0 10px 10px 0;padding:9px 13px;margin-bottom:.85rem}
.ann-lbl{font-size:10px;color:#a78bfa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.ann-txt{font-size:13px;color:#8888aa;line-height:1.55}
.flip-hint{font-size:11px;color:#555570;text-align:center;padding-top:.2rem}
.back-lbl{font-size:10px;color:#8888aa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.85rem;font-family:'Unbounded',sans-serif}
.answer-body{font-size:13.5px;color:#d0d0e8;line-height:1.75;max-height:55vh;overflow-y:auto;padding-right:4px}
.answer-body::-webkit-scrollbar{width:3px}.answer-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.answer-body p{margin-bottom:.55rem}.answer-body p:last-child{margin-bottom:0}
.answer-body strong{color:#f0f0f8;font-weight:500}
.answer-body h4{font-size:12.5px;color:#a78bfa;font-weight:500;margin:.9rem 0 .35rem}
.answer-body ul{padding-left:1.1rem;margin-bottom:.55rem}
.answer-body li{margin-bottom:.3rem}

/* ---- STATUS BUTTONS ---- */
.btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.85rem}
.btn-s{padding:10px 4px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;line-height:1.3;border:1.5px solid}
.btn-s:hover{transform:translateY(-1px)}
.btn-s .sub{display:block;font-size:9px;opacity:.65;margin-top:1px;font-weight:400}
.btn-s1{background:rgba(74,222,154,.1);border-color:rgba(74,222,154,.35);color:#4ade9a}
.btn-s1:hover{background:rgba(74,222,154,.18)}
.btn-s2{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.35);color:#a78bfa}
.btn-s2:hover{background:rgba(167,139,250,.18)}
.btn-s3{background:rgba(245,197,66,.1);border-color:rgba(245,197,66,.35);color:#f5c542}
.btn-s3:hover{background:rgba(245,197,66,.18)}
.btn-s4{background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.3);color:#ff8080}
.btn-s4:hover{background:rgba(255,107,107,.15)}

.nav-row{display:flex;gap:6px;margin-bottom:1.5rem}
.bn{flex:1;padding:9px 8px;background:none;border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#8888aa;font-size:12px;cursor:pointer;font-family:inherit;text-align:center}
.bn:hover{background:#1e1e28;color:#f0f0f8}

/* ---- LIST PAGE ---- */
.list-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.ltab{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.09);background:none;font-size:12px;color:#8888aa;cursor:pointer;font-family:inherit;white-space:nowrap}
.ltab.on{color:#f0f0f8;font-weight:500}
.ltab.l1.on{border-color:rgba(74,222,154,.4);background:rgba(74,222,154,.08);color:#4ade9a}
.ltab.l2.on{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.08);color:#a78bfa}
.ltab.l3.on{border-color:rgba(245,197,66,.4);background:rgba(245,197,66,.08);color:#f5c542}
.ltab.l4.on{border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.06);color:#ff8080}
.list-empty{font-size:13px;color:#555570;padding:2rem 0;text-align:center}
.q-list{list-style:none}
.q-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.q-item:last-child{border-bottom:none}
.q-item:hover .q-text{color:#a78bfa}
.q-num{font-size:11px;color:#555570;min-width:26px;font-family:'Unbounded',sans-serif;padding-top:1px;flex-shrink:0}
.q-text{font-size:13px;color:#d0d0e8;flex:1;line-height:1.4}
.q-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

/* ---- DASHBOARD ---- */
.dash-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#8888aa}
.leg-dot{width:10px;height:10px;border-radius:3px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:5px;margin-bottom:1.5rem}
.dc{border-radius:9px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent}
.dc:hover{transform:translateY(-1px);filter:brightness(1.15)}
.dc .dc-n{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600}
.dc .dc-s{font-size:9px;margin-top:2px;opacity:.75}
.dc.d0{background:#16161d;border-color:rgba(255,255,255,.07);color:#555570}
.dc.d1{background:rgba(74,222,154,.12);border-color:rgba(74,222,154,.3);color:#4ade9a}
.dc.d2{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3);color:#a78bfa}
.dc.d3{background:rgba(245,197,66,.1);border-color:rgba(245,197,66,.3);color:#f5c542}
.dc.d4{background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.25);color:#ff8080}
.dash-detail{background:#16161d;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:1rem;font-size:13px;color:#8888aa;line-height:1.6;min-height:60px}
.dash-detail strong{color:#f0f0f8}
.dash-detail .dd-btns{margin-top:.75rem;display:flex;gap:6px;flex-wrap:wrap}
.dash-detail .ddb{padding:5px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid rgba(255,255,255,.12);background:none;color:#8888aa}
.dash-detail .ddb:hover{background:#1e1e28;color:#f0f0f8}

@media(max-width:480px){
  .btns{gap:4px}.btn-s{font-size:11px;padding:9px 2px}
  .dc{padding:7px 2px}.dc .dc-n{font-size:10px}
}
</style>
</head>
<body>

<header>
  <div class="logo">ГОСЫ<span> / подготовка</span></div>
  <div style="font-size:12px;color:#8888aa">113 вопросов</div>
</header>
<div class="gbar"><div class="gf" id="gf" style="width:0%"></div></div>

<!-- TABS -->
<div class="tabs">
  <div class="tab on" onclick="goPage('cards',this)">
    <span class="tab-cnt" id="tc-cards">—</span>карточки
  </div>
  <div class="tab" onclick="goPage('list',this)">
    <span class="tab-cnt" id="tc-list">113</span>списки
  </div>
  <div class="tab" onclick="goPage('dash',this)">
    <span class="tab-cnt">🗂</span>дашборд
  </div>
</div>

<!-- PAGE: CARDS -->
<div class="page on" id="page-cards">
  <div class="ctrl-lbl">день</div>
  <div class="ctrl" id="day-ctrl"></div>
  <div class="ctrl-lbl">показывать</div>
  <div class="ctrl filt-row">
    <button class="pill on" onclick="setF('all',this)">Все</button>
    <button class="pill" onclick="setF('new',this)">Не начатые</button>
    <button class="pill p1" onclick="setF('1',this)">Знаю</button>
    <button class="pill p2" onclick="setF('2',this)">Повторить</button>
    <button class="pill p3" onclick="setF('3',this)">Подучить</button>
    <button class="pill p4" onclick="setF('4',this)">Учить</button>
  </div>
  <div class="meta"><span id="meta">1 из 113</span><span id="dlbl" style="font-size:11px;color:#555570"></span></div>

  <div class="card" id="card">
    <div class="front" onclick="flip()">
      <div class="qnum">
        <span id="qnum-txt">ВОПРОС №—</span>
        <span class="status-dot" id="sdot"></span>
        <span id="slabel" style="font-size:10px;color:#555570"></span>
      </div>
      <div class="qtitle" id="qtitle"></div>
      <div class="ann-block">
        <div class="ann-lbl">что нужно раскрыть</div>
        <div class="ann-txt" id="qann"></div>
      </div>
      <div class="flip-hint">нажми → полный ответ</div>
    </div>
    <div class="back" id="back">
      <div class="back-lbl">полный ответ</div>
      <div class="answer-body" id="answer-body"></div>
    </div>
  </div>

  <div class="btns">
    <button class="btn-s btn-s1" onclick="mark(1)">✓ Знаю<span class="sub">отлично</span></button>
    <button class="btn-s btn-s2" onclick="mark(2)">↺ Повторить<span class="sub">знаю, но...</span></button>
    <button class="btn-s btn-s3" onclick="mark(3)">~ Подучить<span class="sub">частично</span></button>
    <button class="btn-s btn-s4" onclick="mark(4)">✗ Учить<span class="sub">не знаю</span></button>
  </div>
  <div class="nav-row">
    <button class="bn" onclick="prev()">← назад</button>
    <button class="bn" onclick="next()">вперёд →</button>
    <button class="bn" onclick="shuffle()">⇄ перемешать</button>
  </div>
</div>

<!-- PAGE: LISTS -->
<div class="page" id="page-list">
  <div class="list-tabs">
    <button class="ltab l4 on" onclick="setListTab(4,this)">✗ Учить</button>
    <button class="ltab l3" onclick="setListTab(3,this)">~ Подучить</button>
    <button class="ltab l2" onclick="setListTab(2,this)">↺ Повторить</button>
    <button class="ltab l1" onclick="setListTab(1,this)">✓ Знаю</button>
    <button class="ltab" onclick="setListTab(0,this)" style="margin-left:auto">Не начатые</button>
  </div>
  <div id="list-content"></div>
</div>

<!-- PAGE: DASHBOARD -->
<div class="page" id="page-dash">
  <div class="dash-legend">
    <div class="leg-item"><div class="leg-dot" style="background:#4ade9a"></div>Знаю</div>
    <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>Повторить</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f5c542"></div>Подучить</div>
    <div class="leg-item"><div class="leg-dot" style="background:#ff8080"></div>Учить</div>
    <div class="leg-item"><div class="leg-dot" style="background:#16161d;border:1px solid rgba(255,255,255,.1)"></div>Не начато</div>
  </div>
  <div class="dash-grid" id="dash-grid"></div>
  <div class="dash-detail" id="dash-detail">Нажми на номер вопроса, чтобы увидеть детали</div>
</div>

<script>
const CARDS=[{"n":1,"t":"Мировоззрение, его сущность и исторические типы. Специфика философского мировоззрения","ann":"Дать определение мировоззрения. Перечислить три исторических типа: мифологическое, религиозное, философское. Показать отличие философии от науки и религии.","a":"<p><strong>Мировоззрение</strong> – это система человеческих знаний о мире и о месте человека в мире, выраженная в ценностных установках личности и социальной группы, в убеждениях относительно сущности природного и социального мира.</p>\n<p><strong>Три основные формы мировоззрения</strong>, выделяемые в истории человечества (исторические типы):</p>\n<ul>\n<li>Мифологическое мировоззрение</li>\n</ul>\n<ul>\n<li>Религиозное мировоззрение</li>\n</ul>\n<ul>\n<li>Философское мировоззрение</li>\n</ul>\n<p><strong>Мифология</strong> – мировоззрение первобытнообщинного, родового общества, и состоит из стихийно складывающихся легенд, сказаний о жизни, о происхождении, о возникновении ремесел, которые передаются через поколения.</p>\n<p><strong>Религия</strong> – это форма мировоззрения, основанная на вере в наличие фантастических, сверхъестественных сил, которые влияют на жизнь человека и окружающий мир.</p>\n<p><strong>Главное отличие философии </strong>от всех иных наук заключается в том, что философия является теоретическим мировоззрением, предельным обобщением ранее накопленных человечеством знаний.</p>"},{"n":2,"t":"Сущность человека и смысл его бытия в мире как философская проблема","ann":"Указать важность проблемы. Привести позиции мыслителей: Сократ, Конфуций, Кант, Камю.","a":"<p><strong>Сущность человека и смысл его бытия в мире</strong> – философская проблема, которая связана с определением конечной цели существования человека как биологического вида и индивидуума.</p>\n<p><strong>Значимость решения этой проблемы</strong> для каждого человека заключается в том, что <strong>понимание смысла жизни влияет на</strong> поведение, отношение и поступки человека. От того, как человек понимает смысл своей жизни, зависят программы и планы на будущее.</p>\n<p><strong>В истории философии многие мыслители обращались к проблеме поиска смысла жизни</strong>:</p>\n<ul>\n<li>Сократ призывал человека сделать целью и смыслом своей жизни заботу о нравственной чистоте души, а не стремление к славе и богатству.</li>\n</ul>\n<ul>\n<li>Конфуций считал, что смысл жизни заключается в «правильной жизни», то есть в выполнении своего личного долга по соучастию в общем деле служения традиции.</li>\n</ul>\n<ul>\n<li>Кант писал, что «существование человека имеет в себе самом высшую цель, которой, насколько это в его силах, он может подчинить всю природу».</li>\n</ul>\n<ul>\n<li>А. Камю считал, что мир абсурден и не имеет смысла, но человек все же имеет смысл, «поскольку он один смысла взыскует».</li>\n</ul>\n<p><strong>Представления о смысле жизни</strong> складываются в процессе деятельности людей и зависят от их социального положения, содержания решаемых проблем, образа жизни, миропонимания, конкретной исторической ситуации, религии.</p>"},{"n":3,"t":"Проблема сущности человека и культуры в философии психоанализа.","ann":"Показать роль бессознательного. Структура психики по Фрейду (Оно/Я/Сверх-Я). Сублимация. Юнг и Фромм.","a":"<p>Философия психоанализа возникла в XX веке и связана прежде всего с именем <strong>Зигмунда Фрейда</strong>. Она оказала большое влияние на философию, психологию и культуру, поскольку раскрыла важную роль <strong>бессознательного начала</strong> в жизни человека. Психоанализ рассматривает человека как существо, поведение которого во многом определяется не только сознанием, но и скрытыми психическими процессами.</p>\n<p><strong>Структура психики по Фрейду:</strong></p>\n<ul>\n<li><strong>Оно (Id)</strong> - бессознательное, инстинкты, либидо</li>\n</ul>\n<ul>\n<li><strong>Я (Ego)</strong> - сознание, регулирует поведение, приспосабливает к реальности</li>\n</ul>\n<ul>\n<li><strong>Сверх-Я (Superego)</strong> - моральные нормы и запреты, усвоенные от общества</li>\n</ul>\n<p>Поведение человека определяется бессознательными желаниями, которые <strong>вытесняются</strong> из сознания, но продолжают влиять на мысли и поступки.</p>\n<p><strong>Считал что </strong>культура возникает через <strong>сублимацию</strong> - преобразование биологических инстинктов в творческую деятельность (искусство, науку, религию).</p>\n<p><strong>Последователи:</strong></p>\n<ul>\n<li><strong>Юнг</strong> - коллективное бессознательное и архетипы в мифах и культуре</li>\n</ul>\n<ul>\n<li><strong>Фромм</strong> - человек как социальное существо, личность формируется культурой и обществом</li>\n</ul>\n<p><strong>Вывод:</strong> сущность человека не сводится к разуму - бессознательное определяет личность, поведение и культуру.</p>"},{"n":4,"t":"Проблема социального прогресса в условиях современного межкультурного разнообразия общества","ann":"Раскрыть сложность однозначного ответа. Соотношение прогресса и регресса. Критерии социального прогресса.","a":"<p><strong>Социальный прогресс</strong> – это поступательное развитие общества по восходящей линии, от низшего к высшему, от простого к сложному. Однако прогресс не имеет прямолинейной дороги развития, социальные изменения сложны и противоречивы. Прогресс в одной области может сопровождаться регрессом в другой.</p>\n<p><strong>Критерии общественного прогресса</strong> – это показатели, характеристики, по которым определяется степень развитости общества: развитие экономики и науки, уровень образования и культуры, состояние медицины, средняя продолжительность жизни, соблюдение прав человека, демократизация, система социальной защиты.</p>\n<p><strong>Сложность однозначного ответа:</strong></p>\n<ul>\n<li>прогресс применим не ко всем сферам - в искусстве и морали нет «высшего» и «низшего»</li>\n</ul>\n<ul>\n<li>одни считают интегральным критерием <strong>нравственность</strong> общества</li>\n</ul>\n<ul>\n<li>современность даёт противоречивую картину: рост свободы личности соседствует с социальным неравенством, культурными конфликтами, утратой традиционных ценностей</li>\n</ul>\n<p><strong>Вывод:</strong> прогресс и регресс сосуществуют одновременно в разных сферах. Однозначно оценить «прогрессивность» общества невозможно - всё зависит от выбранного критерия.</p>"},{"n":5,"t":"Основы тайм-менеджмента","ann":"Раскрыть понятие. Методы: лягушка, помодоро, 90/30, Mind Map, Ганта, Kanban.","a":"<p><strong>Тайм-менеджмент</strong> – это система, направленная на оптимизацию управления временем с целью обеспечения правильной расстановки приоритетов и выполнения поставленных задач. <strong>В основу </strong>тайм-менеджмента заложены принципы: планирование, расстановка приоритетов, мотивация, анализ и рационализация поведения.</p>\n<p><strong>Цель управления временем</strong>: научить планировать задачи и эффективно управлять собственной жизнью, повысить собственную продуктивность и продуктивность коллектива.</p>\n<p><strong>Системы тайм-менеджмента</strong> подразделяются на</p>\n<ul>\n<li>личные (индивидуальное планирование)</li>\n</ul>\n<ul>\n<li>корпоративные (управление временем в организации)</li>\n</ul>\n<ul>\n<li>смешанные</li>\n</ul>\n<p><strong>Основные методы:</strong></p>\n<ul>\n<li><strong>Метод лягушки</strong> – выполнение самой неприятной или сложной задачи в первую очередь, с утра, что снимает психологическое напряжение на весь день.</li>\n</ul>\n<ul>\n<li><strong>Метод помидора (Помодоро)</strong> – работа блоками по 25 минут с 5-минутными перерывами. После 4 циклов – длинный перерыв 15–30 минут. Повышает концентрацию и снижает усталость.</li>\n</ul>\n<ul>\n<li><strong>Метод 90 на 30</strong> – 90 минут интенсивной работы чередуются с 30 минутами отдыха. Опирается на циклы ультрадианных ритмов организма, подходит для глубокой сосредоточенной работы.</li>\n</ul>\n<ul>\n<li><strong>Интеллект-карта (Mind Map)</strong> – визуальный инструмент структурирования информации и задач вокруг центральной темы с разветвленными подзадачами. Помогает охватить весь объем работы и выявить связи между задачами.</li>\n</ul>\n<ul>\n<li><strong>Диаграмма Ганта</strong> – горизонтальная столбчатая диаграмма, отображающая задачи проекта во времени. Позволяет наглядно планировать сроки, последовательность и параллельность выполнения задач.</li>\n</ul>\n<ul>\n<li><strong>Kanban</strong> – система визуального управления задачами с помощью досок и карточек. Задачи движутся по колонкам: «Запланировано» → «В работе» → «Выполнено». Позволяет контролировать загрузку и прогресс в реальном времени.</li>\n</ul>\n<p><strong>Формы эффективного управления временем:</strong></p>\n<ul>\n<li><strong>Планирование</strong> – составление списков задач, расписаний, распределение времени на день/неделю/месяц.</li>\n</ul>\n<ul>\n<li><strong>Делегирование</strong> – передача второстепенных задач другим лицам для высвобождения времени на приоритетные цели.</li>\n</ul>\n<ul>\n<li><strong>Контроль и анализ</strong> – регулярная оценка выполненных задач, корректировка планов.</li>\n</ul>"},{"n":6,"t":"Принцип Парето","ann":"Определение правила 80/20. Неравномерность вклада, универсальность. Примеры.","a":"<p><strong>Принцип Парето (правило 80/20)</strong> – закономерность, согласно которой 20% усилий дают 80% результата, и наоборот – оставшиеся 80% усилий приносят лишь 20% результата. Сформулирован итальянским экономистом и социологом Вильфредо Парето на основе наблюдений за распределением богатства в обществе.</p>\n<p><strong>Основные характеристики:</strong></p>\n<ul>\n<li><strong>Неравномерность вклада</strong> – не все действия одинаково результативны;</li>\n</ul>\n<ul>\n<li><strong>Универсальность</strong> – принцип применим в экономике, тайм-менеджменте, маркетинге, продажах и других сферах.</li>\n</ul>\n<ul>\n<li><strong>Практичность</strong> – принцип не требует точного соотношения именно 80/20;</li>\n</ul>\n<p><strong>Примеры применения:</strong></p>\n<ul>\n<li>бизнес: 20% клиентов → 80% выручки</li>\n</ul>\n<ul>\n<li>обучение: 20% материала → 80% ключевых знаний</li>\n</ul>\n<ul>\n<li>производство: 20% причин → 80% дефектов</li>\n</ul>\n<ul>\n<li>В <strong>производстве</strong>: 20% причин порождают 80% дефектов → устранение этих причин дает максимальный эффект.</li>\n</ul>\n<p><strong>В тайм-менеджменте:</strong> инструмент расстановки приоритетов - не распылять усилия равномерно, а выявить те 20% действий, которые дают максимум, и сосредоточиться на них.</p>"},{"n":7,"t":"Модель Стивена Кови","ann":"Матрица управления временем. Четыре квадранта. Главный принцип — инвестировать в квадрант II.","a":"<p><strong>Стивен Кови</strong> – американский специалист в области менеджмента, автор книги «Семь навыков высокоэффективных людей», в которой изложена его модель управления временем, основанная на принципе приоритетов и матрице управления временем.</p>\n<p><strong>Основные положения модели:</strong></p>\n<p>Кови разделяет все задачи по двум критериям – <strong>срочность</strong> и <strong>важность</strong> – образуя четыре квадранта:</p>\n<ul>\n<li><strong>Квадрант I – Срочное и важное</strong> («Кризисы»): неотложные проблемы, дедлайны, форс-мажоры. Пример: сломалось оборудование накануне сдачи проекта. Жизнь только в этом квадранте ведет к хроническому стрессу.</li>\n</ul>\n<ul>\n<li><strong>Квадрант II – Несрочное и важное</strong> («Качество»): планирование, развитие, профилактика, обучение, выстраивание отношений. Пример: подготовка к экзамену заранее, занятия спортом. Кови считает этот квадрант ключевым – именно здесь живут эффективные люди.</li>\n</ul>\n<ul>\n<li><strong>Квадрант III – Срочное и неважное</strong> («Иллюзия»): чужие просьбы, часть звонков и совещаний. Пример: ответ на несрочное сообщение, которое кажется срочным. Создает ощущение занятости без реального результата.</li>\n</ul>\n<ul>\n<li><strong>Квадрант IV – Несрочное и неважное</strong> («Расточительство»): бесцельное времяпрепровождение, бесполезные привычки. Пример: бесконечный скроллинг социальных сетей.</li>\n</ul>\n<p><strong>Главный принцип Кови:</strong> необходимо сознательно сокращать время в квадрантах III и IV и инвестировать его в квадрант II, что позволяет предотвращать кризисы квадранта I и жить проактивно, а не реактивно.</p>\n<p><strong>Примеры использования:</strong></p>\n<ul>\n<li>Студент вместо подготовки в последнюю ночь (квадрант I) регулярно занимается в течение семестра (квадрант II).</li>\n</ul>\n<ul>\n<li>Руководитель делегирует несрочные и неважные звонки (квадрант III) и высвобождает время на стратегическое планирование (квадрант II).</li>\n</ul>\n<ul>\n<li>Специалист отказывается от лишних совещаний (квадрант III) в пользу профессионального обучения (квадрант II).</li>\n</ul>\n<p>Таким образом, модель Кови смещает фокус с управления временем как такового на управление собой и своими приоритетами: эффективность достигается не через выполнение большего числа задач, а через выполнение правильных задач.</p>"},{"n":8,"t":"Аудитория средств массовой коммуникации: понятие, виды. Основные теории аудитории средств массовых коммуникаций.","ann":"Целевая, потенциальная, массовая. Теории: Лассуэл, магическая пуля, Гербнер, Лазарсфельд, Липпман.","a":"<p><strong>Аудитория СМК</strong> – это субъект коммуникационного процесса, который является элементом системы «отправитель – информация – получатель информации». Главная функция аудитории в этой системе – потребление информации.</p>\n<p><strong>Характеристики массовой аудитории: </strong>многочисленность, анонимность, пространственная рассредоточенность, социальная неоднородность, стихийность формирования, непостоянство.</p>\n<p><strong>Типы аудитории:</strong></p>\n<ul>\n<li><strong>целевая</strong> - те, на кого рассчитано сообщение</li>\n</ul>\n<ul>\n<li><strong>потенциальная</strong> - кого СМК хотело бы привлечь</li>\n</ul>\n<ul>\n<li><strong>массовая</strong> - все потребители контента канала</li>\n</ul>\n<p><strong>Сегментация аудитории –</strong>  выделение части аудитории по полу, возрасту, доходу, интересам, географии для адресного формирования контента.</p>\n<p><strong>Основные теории аудитории СМК:</strong></p>\n<ul>\n<li><strong>Теория универсальных последствий Г. Лассуэла</strong> – СМИ воздействуют на всю аудиторию одновременно и прямо. Модель: Кто - Что - По какому каналу - Кому - С каким эффектом. Аудитория пассивна.</li>\n</ul>\n<ul>\n<li><strong>Теория магической пули (шприца) </strong>– сообщение «впрыскивается» в пассивную однородную аудиторию и вызывает одинаковую реакцию у всех.</li>\n</ul>\n<ul>\n<li><strong>Теория культивирования (Дж. Гербнер)</strong> – длительное потребление медиа формирует искажённое восприятие реальности (переоценка насилия, преступности).</li>\n</ul>\n<ul>\n<li><strong>Двуступенчатая модель П. Лазарсфельда </strong>– СМИ → лидеры мнений → остальная аудитория. Прямого влияния нет.</li>\n</ul>\n<ul>\n<li><strong>Теория активной аудитории </strong>– аудитория не пассивна, сама выбирает контент под свои потребности и сама формирует смысл сообщения.</li>\n</ul>\n<ul>\n<li><strong>Теория формирования общественного мнения и стереотипов У. Липпмана </strong>– между реальным миром и его образом в сознании есть разрыв. СМИ формируют стереотипы и «псевдосреду», которую аудитория принимает за реальность.</li>\n</ul>\n<ul>\n<li><strong>Теории ограниченного влияния СМИ </strong>– воздействие СМК опосредовано личными характеристиками человека и его окружением; люди воспринимают лишь то, что подтверждает их взгляды.</li>\n</ul>\n<p>Основные формы взаимодействия аудитории и медиа: комментарии и обратная связь, публикация контента в блогах, форумы и обсуждения, активность в социальных сетях, опросы и голосования.</p>"},{"n":9,"t":"Информационные потребности аудитории. Медиапотребление","ann":"Потребность в информации в современном обществе. Теории информационного общества. Основные тенденции развития информационных потребностей аудитории. Управление информацией. Понятие медиапотребления и его динамика. Негативные последствия медиапотребления: понятие медиазависимости и «баннерной слепоты","a":"<p><strong>Потребность в информации</strong>: без постоянного информационного контакта невозможно полноценное развитие человека в обществе.</p>\n<p>Теории информационного общества:</p>\n<ul>\n<li>Концепция информационного общества — преобладание информационного сектора экономики вслед за сельским хозяйством, промышленностью и услугами.</li>\n</ul>\n<ul>\n<li>Теория Тоффлера — индустриальное общество устарело, необходим переход к информационному.</li>\n</ul>\n<ul>\n<li>Технотронная теория — общество меняет не социальные революции, а научно-технический прогресс, формируя новое производство, психологию и культуру.</li>\n</ul>\n<p>Основные тенденции развития информационных потребностей: цифровизация, доступность, персонализация, интерактивность, доверие к качеству, многообразие форматов.</p>\n<p><strong>Управление информацией</strong> — оптимизированный сбор, хранение, извлечение и использование информации (личной или организационной).</p>\n<p><strong>Медиапотребление</strong> — набор используемых человеком или группой СМИ (книги, журналы, фильмы, ТВ, радио, новые медиатехнологии).</p>\n<p>Динамика медиапотребления — изменения в способах, частоте и форматах (рост онлайн, персонализация, интерактив, видео).</p>\n<p>Негативные последствия:</p>\n<p><strong>Медиазависимость</strong> – патологическая форма, утрата контроля над временем в медиасреде, тревожность без доступа, подмена реального общения (особенно соцсети и видео).</p>\n<p><strong>«Баннерная слепота» </strong>– психологический феномен игнорирования рекламы (баннеров, всплывающих окон) как информационного шума из-за перенасыщения; защитный механизм мозга, снижающий эффективность интернет-рекламы.</p>"},{"n":10,"t":"Социологические исследования аудитории средств массовой коммуникации","ann":"Аудитория СМК: характеристики, показатели. Исследования аудитории: социальный и маркетинговый подходы. Основные источники информации для изучения аудитории СМК. Количественная и качественная методология исследований аудитории. Медиаизмерения – прикладные исследования аудитории СМИ.","a":"<p><strong>Аудитория СМК</strong> – это субъект коммуникационного процесса, который является элементом системы «отправитель – информация – получатель информации». Главная функция аудитории в этой системе – потребление информации.</p>\n<p><strong>Характеристики аудитория СМК: </strong>огромная, массовая, стихийная, неорганизованная, разнообразная по составу<strong>, </strong>непостоянная, анонимная для коммуникатора, цикличность аудитории, аудитория не имеет четких границ.</p>\n<p><strong>Показатели аудитории СМК</strong>:</p>\n<ul>\n<li><strong>Пресса</strong>. AIR (ср.кол-во читателей 1 номера), Coverage (охват ЦГ), Frequency (ср.частота контакта), OTS (кол-во контактов в тыс.), CPT (стоимость охвата тыс. чел.).</li>\n</ul>\n<ul>\n<li><strong>Радио</strong>. Daily reach, Weekly reach, Rating (аудитория временного интервала), GRP (сумма Rating), Cost TRP (стоимость пункта рейтинга).</li>\n</ul>\n<ul>\n<li><strong>ТВ.</strong> Rating, Аудитория, Доля канала.</li>\n</ul>\n<p><strong>Подходы исследования аудитории</strong>:</p>\n<p><strong>Социальный</strong> <strong>подход</strong> – изучение взаимосвязи аудиторного поведения и социального фона. Например, рассматривают соц.демографические и соц.психологические хар-ки аудитории (возраст, пол, мотивы и т.д.).</p>\n<p><strong>Маркетинговый</strong> <strong>подход</strong> – исследование коммуникативного и потребительского поведения аудитории. Например, сравнивают различные СМК по степени оперативности и достоверности информации.</p>\n<p><strong>Методы исследований аудитории</strong>:</p>\n<p><strong>Количественные</strong> – направлены на определение объема аудитории медиаобъекта. К ним относят, например: автоматизированные (для электронных СМК, постоянные автоматические измерения) и опросные методы.</p>\n<p><strong>Качественные </strong>– направлены на глубокое понимание темы, мотивации, чувств, детальных мнений и впечатлений аудитории. К ним относят, например: тесты, наблюдение, эксперимент.</p>\n<p><strong>Медиаизмерения</strong> – деятельность по изучению и сбору численных и качественных данных медиаканала и аудитории, проводимая с целью исследования эффективности СМК.</p>\n<p><strong>Прикладные качественные исследования аудитории СМК</strong> – это направление медиаисследований для получения определенного рода информации о СМК, аудитории, ее предпочтениях и размещаемой рекламе.</p>\n<p><strong>Прикладные качественные исследования для медиаиндустрии</strong>: определение отношения телезрителей к телепередаче; исследование стиля жизни ЦА; выявление ценностных ориентаций; сегментир. Аудитории.</p>"},{"n":11,"t":"Методы изучения массовой аудитории и анализ ее медиапредпочтений","ann":"Медийные предпочтения аудитории и методы их изучения. Сайты отзывов, карты и маркетплейсы. Форумы с целевой аудиторией. Сообщества конкурентов и тематические сообщества. Аналитические сервисы. Статистика поисковых запросов целевой аудитории. Методы анализа текста: контент-анализ, когнитивный анализ,","a":"<p><strong>Медийные предпочтения</strong> – это совокупность предпочтений, интересов и потребностей аудитории в отношении медийного контента (форматы контента, темы и жанры, платформы и другие аспекты).</p>\n<p><strong>Количественные методы изучения медийных предпочтений:</strong></p>\n<ul>\n<li><strong>Опросы</strong> - интервью и анкетирование; блиц-опрос (3-4 вопроса по конкретному событию)</li>\n</ul>\n<ul>\n<li><strong>Дневники</strong> телезрителей/радиослушателей - фиксация телезрителями контактов с медиа каждые 15 минут</li>\n</ul>\n<ul>\n<li><strong>Аудиметры</strong> - специальные счётчики на ТВ/радио, автоматически фиксируют каждую секунду просмотра</li>\n</ul>\n<p><strong>Качественные методы:</strong></p>\n<ul>\n<li><strong>Анализ документов</strong> - изучение медиатекстов (первичные данные надёжнее вторичных)</li>\n</ul>\n<ul>\n<li><strong>Наблюдение</strong> - включённое/невключённое, открытое/инкогнито</li>\n</ul>\n<ul>\n<li><strong>Фокус-группы</strong> - дискуссия под руководством модератора</li>\n</ul>\n<p><strong>Источники для изучения аудитории:</strong> сайты отзывов и маркетплейсы, форумы с ЦА, сообщества конкурентов, тематические сообщества, аналитические сервисы, статистика поисковых запросов, мнения экспертов по рынку.</p>\n<p><strong>Методы анализа текста:</strong></p>\n<ul>\n<li><strong>Контент-анализ</strong> (Лассуэлл, Берельсон) - перевод текстов в количественные показатели; выявляет частоту упоминаний, тональность, скрытые намерения</li>\n</ul>\n<ul>\n<li><strong>Когнитивный анализ</strong> - как тексты формируют образы и фреймы в сознании аудитории</li>\n</ul>\n<ul>\n<li><strong>Критический дискурс-анализ</strong> - выявление идеологических установок и манипуляций</li>\n</ul>\n<ul>\n<li><strong>Лингвокультурологический анализ</strong> - национально-культурные образы и стереотипы в языке СМК</li>\n</ul>"},{"n":12,"t":"Инструменты маркетингового планирования и продвижения коммуникационного продукта","ann":"Понятие коммуникационного продукта. Коммуникационный продукт как услуга, коммуникационный продукт как товар. Комплекс маркетинга для планирования и продвижения коммуникационного продукта, различия моделей 4P, 4C и 7P. Жизненный цикл коммуникационного продукта. ","a":"<p><strong>Коммуникационный продукт</strong> – это результат профессиональной деятельности в сфере публичных и массовых коммуникаций по производству рекламного, PR-, медиа- и ивент-продукта</p>\n<p>Коммуникационный продукт как услуга – это процесс взаимодействия, где клиент платит за экспертные действия, время специалистов или временный доступ к инфраструктуре, а не за право владения вещью.</p>\n<p>Коммуникационный продукт как товар: Это материальный (физический) или полностью готовый цифровой объект, который имеет фиксированную стоимость, переходит в собственность покупателя и может использоваться многократно.</p>\n<p><strong>Комплекс маркетинга</strong> для планирования и продвижения коммуникационного продукта: анализ рынка; постановка целей и задач, определение ЦА, определение желаемой ответной реакции ЦА, создание послания, выбор каналов коммуникаций, определение бюджета и оценка результатов.</p>\n<p><strong>Модель 4P</strong> – классическая модель, ориентированная на производителя:</p>\n<ul>\n<li><strong>Product (продукт)</strong> – характеристики и качество коммуникационного продукта.</li>\n</ul>\n<ul>\n<li><strong>Price (цена)</strong> – стоимость продукта для потребителя.</li>\n</ul>\n<ul>\n<li><strong>Place (место)</strong> – каналы распространения и дистрибуции.</li>\n</ul>\n<ul>\n<li><strong>Promotion (продвижение)</strong> – реклама, PR, стимулирование сбыта.</li>\n</ul>\n<p><strong>Модель 4C</strong> – модель, ориентированная на потребителя (развитие 4P):</p>\n<ul>\n<li><strong>Consumer (потребитель)</strong> – потребности и желания аудитории вместо характеристик продукта.</li>\n</ul>\n<ul>\n<li><strong>Cost (стоимость)</strong> – совокупные затраты потребителя, включая время и усилия.</li>\n</ul>\n<ul>\n<li><strong>Convenience (удобство)</strong> – доступность и удобство получения продукта вместо каналов сбыта.</li>\n</ul>\n<ul>\n<li><strong>Communication (коммуникация)</strong> – двусторонний диалог с аудиторией вместо одностороннего продвижения.</li>\n</ul>\n<p><strong>Модель 7P</strong> – расширенная модель для сферы услуг (4P + 3 дополнительных элемента):</p>\n<ul>\n<li><strong>People (люди)</strong> – персонал, создающий и delivering коммуникационный продукт.</li>\n</ul>\n<ul>\n<li><strong>Process (процесс)</strong> – способ и порядок предоставления услуги.</li>\n</ul>\n<ul>\n<li><strong>Physical evidence (физическое окружение)</strong> – материальные свидетельства качества: офис, фирменный стиль, упаковка.</li>\n</ul>\n<ul>\n<li><strong>Promotion</strong> (Продвижение) Каналы коммуникации, с помощью которых вы рассказываете клиенту о продукте. Инструменты: контекстная и таргетированная реклама, контент-маркетинг, участие в профильных конференциях, PR-статьи в СМИ</li>\n</ul>\n<ul>\n<li><strong>Place</strong> (Место / Дистрибуция) Где и как клиент может найти, купить или получить ваш продукт</li>\n</ul>\n<ul>\n<li><strong>Price</strong> (Цена) Стратегия ценообразования, скидки, условия оплаты и позиционирование на рынке.</li>\n</ul>\n<ul>\n<li><strong>Product (Продукт)</strong> Что именно вы продаете, какую проблему клиента это решает и в чем его уникальность.</li>\n</ul>\n<p><strong>Различия моделей:</strong></p>\n<p>Модель 4P фокусируется на продукте и интересах производителя. Модель 4C смещает акцент на потребителя и его ценности – особенно актуальна для медиа и коммуникационной сферы, где важен диалог с аудиторией. Модель 7P применяется для коммуникационного продукта как услуги, учитывая роль человеческого фактора и процессов в формировании качества.</p>\n<p><strong>Жизненный цикл коммуникационного продукта:</strong></p>\n<ul>\n<li>Внедрение на рынок. Характерные черты: высокие расходы на продвижение, отсутствие прибыли, высокий уровень затрат на выпуск продукции из-за малых производственных масштабов.</li>\n</ul>\n<ul>\n<li>Рост. Наблюдается рост объемов сбыта, снижение производственных издержек.</li>\n</ul>\n<ul>\n<li>Зрелость. Насыщение потребительского спроса. Рынок сегментирован. Деятельность фирмы направлена на удовлетворение всевозможных потребностей покупателей.</li>\n</ul>\n<ul>\n<li>Упадок. Наблюдается снижение спроса на продукт, падение заинтересованности покупателя в нем, сокращение объемов реализации и прибыли.</li>\n</ul>"},{"n":13,"t":"Понятие и деятельность рекламных агентств","ann":" Понятие «рекламное агентство». Функции, которые выполняют рекламные агентства. Классификация рекламных агентств.","a":"<p><strong>Рекламное агентство</strong> – это независимая организация, которая специализируется на разработке, подготовке, производстве и размещении рекламных программ, материалов и продуктов.</p>\n<p><strong>Функции и услуги рекламных агентств</strong>:</p>\n<ul>\n<li>изучение объекта, который рекламируется, рынка, его конкурентов и целевой аудитории;</li>\n</ul>\n<ul>\n<li>стратегическое и тактическое планирование;</li>\n</ul>\n<ul>\n<li>креативный подход при разработке промо-продукции и ее распространении;</li>\n</ul>\n<ul>\n<li>управление и контроль рекламной кампании.</li>\n</ul>\n<ul>\n<li>изготовление выставочных стендов и промоутерской печатной продукции;</li>\n</ul>\n<ul>\n<li>производство и размещение наружной рекламы;</li>\n</ul>\n<ul>\n<li>разработка и создание печатной продукции, расклеиваемой в людных местах;</li>\n</ul>\n<ul>\n<li>создание POS-материалов.</li>\n</ul>\n<p><strong>Сотрудники РА</strong>: рекламный, креативный менеджер, медиапланировщик, технический специалист, копирайтер, графический дизайнер, PR-специалист; SMM; SEO; директор; финансовый менеджер.</p>\n<p><strong>Классификация рекламных агентств</strong>:</p>\n<ul>\n<li><strong><em>По объему оказываемых услуг</strong><strong></em>. </strong>Агентства с полным набором услуг и с ограниченным.</li>\n</ul>\n<ul>\n<li><strong><em>По видам оказываемых услуг</strong><strong></em>. </strong>Универсальные агентства, занимающиеся всеми видами рекламы, и специализированные, которые работают только по одному или нескольким видам рекламных средств.</li>\n</ul>\n<ul>\n<li><strong><em>По месту оказываемых услуг</strong><strong></em>. </strong>Агентства на внутреннем рынке, на внешнем рынке и комбинированные.</li>\n</ul>"},{"n":14,"t":"Контроль и саморегулирование в рекламной деятельности","ann":"Тенденции развития медиакоммуникационных систем региона, страны и мира, исходя из политических и экономических механизмов их функционирования, правовых и этических норм регулирования. Права саморегулируемой организации в сфере рекламы.","a":"<p><strong>Контроль и саморегулирование в рекламной деятельности</strong><strong> </strong>– это управленческая деятельность, нацеленная на количественную и качественную оценку и учет результатов работы организации в сфере планирования и реализации рекламы.</p>\n<p><strong>Тенденции развития медиакоммуникационных систем региона, страны и мира:</strong></p>\n<ul>\n<li><em>Цифровизация</em> - медиа все больше переходят к цифровым форматам, что приводит к конвергенции различных медиа-платформ (телевидение, интернет).</li>\n</ul>\n<ul>\n<li><em>Глобализация</em> - с развитием интернета границы для распространения информации становятся все менее значимыми.</li>\n</ul>\n<ul>\n<li><em>Политическое влияние</em>, оказывающее влияние на медиа коммуникационные системы, включая регулирование контента, свободу слова, доступ к информации и пр.</li>\n</ul>\n<ul>\n<li><em>Экономическая конкуренция</em> – медиакомпании сталкиваются с конкуренцией за аудиторию и рекламные доходы.</li>\n</ul>\n<p><strong>Права саморегулируемой организации (СРО) в сфере рекламы:</strong></p>\n<ul>\n<li>представлять законные интересы членов СРО в их отношениях с федеральными органами власти;</li>\n</ul>\n<ul>\n<li>участвовать в рассмотрении антимонопольным органом дел о рекламе;</li>\n</ul>\n<ul>\n<li>применять в отношении членов СРО предусмотренные учредительными и иными документами СРО меры ответственности, в том числе исключение из членов организации;</li>\n</ul>\n<ul>\n<li>разрабатывать, устанавливать и опубликовывать обязательные для выполнения всеми членами СРО правила профессиональной деятельности в сфере рекламы;</li>\n</ul>\n<ul>\n<li>рассматривать жалобы на действия члена СРО и пр.</li>\n</ul>"},{"n":15,"t":"Модели воздействия на потребителя","ann":"Рассмотреть основные модели воздействия на потребителя, расшифровать термин и пояснить последовательность действий модели (AIDA, DAGMAR, ACCA, DIBABA)","a":"<p><strong>Модели воздействия на потребителя</strong> – это концептуальные схемы, описывающие последовательность психологических состояний и действий потребителя от момента первого контакта с коммуникационным сообщением до совершения целевого действия.</p>"},{"n":16,"t":"Планирование и реализация коммуникационных кампаний и мероприятий","ann":"Этапы планирования коммуникационных кампаний, оценка рекламных затрат. Разработка рекламной стратегии.","a":"<p><strong>Коммуникационная кампания</strong> – это комплекс мероприятий, целью которых является создание и поддержание общественного мнения об организации.</p>\n<p><strong>Этапы планирования коммуникационных кампаний:</strong></p>\n<p>1. \tВыявление проблемы проблемной ситуации и ее факторов, определение позиции организации;</p>\n<p>2. \tФормирование целей и задач;</p>\n<p>3. \tОпределение инструментария, ресурсов;</p>\n<p>4. \tРазработка технических решений;</p>\n<p>5. \tОпределение критериев оценки эффективности.</p>\n<p><strong>Оценка рекламных затрат:</strong> процесс определения суммы денег, которую компания или организация готова потратить на размещение рекламы. Оценка основывается на: бюджете, целях, стратегии, ожидаемом эффекте и пр.</p>\n<p><strong>Разработка рекламной стратегии: </strong>определение ЦА; выяснение предмета рекламы; разработка концепции товара; выбор каналов рекламных коммуникаций и разработка рекламного обращения.</p>\n<p><strong>Цель коммуникационных кампаний и мероприятий </strong>– увеличить продажи, повысить лояльность к бренду, сформировать потребность в товаре или услуге, увеличить число подписчиков социальных сетей бренда, повысить узнаваемость бренда.</p>"},{"n":17,"t":"Маркетинговая среда. Методы анализа маркетинговой среды","ann":"дать определения маркетинговой среды организации, макро- и микросреда в маркетинге, раскрыть составляющие и методы анализа маркетинговой среды. Раскрыть сущность методики проведения PEST-анализа. Дать характеристику модели пяти сил конкуренции по М. Портеру. Раскрыть сущность SWOT-анализа.","a":"<p><strong>Маркетинговая среда</strong> – это различные факторы и явления, которые окружают предприятие и влияют на его работу.</p>\n<p><strong>Составляющие анализа маркетинговой среды</strong>:</p>\n<ul>\n<li><strong>Микросреда</strong> – это потребители, поставщики, конкуренты, посредники, контактные аудитории. Бизнес может выстраивать с ними отношения и так косвенно менять среду под себя.</li>\n</ul>\n<ul>\n<li><strong>Макросреда</strong> – это политические, социальные, демографические, культурные факторы. На них бизнес не может влиять, но может адаптироваться к ним.</li>\n</ul>\n<p><strong>Методы анализа маркетинговой среды</strong>: анализ внутренних ресурсов; исследования; конкурентный анализ; анализ рынка; PEST-анализ, SWOT-анализ, анализ 5 сил Портера, матрица БКГ.</p>\n<p><strong>Методы анализа маркетинговой среды:</strong></p>\n<p><strong>PEST-анализ</strong> – метод анализа макросреды, оценивающий четыре группы факторов:</p>\n<ul>\n<li><strong>Political (политические)</strong> – законодательство, государственное регулирование, политическая стабильность, налоговая политика.</li>\n</ul>\n<ul>\n<li><strong>Economic (экономические)</strong> – уровень доходов, инфляция, безработица, покупательская способность, доступность кредита.</li>\n</ul>\n<ul>\n<li><strong>Social (социокультурные)</strong> – демографические тенденции, культурные ценности, стиль жизни, уровень образования населения.</li>\n</ul>\n<ul>\n<li><strong>Technological (научно-технологические)</strong> – научно-технические новшества, развитие технологий, уровень автоматизации, новые материалы и методы производства.</li>\n</ul>\n<p><strong>Цель PEST-анализа</strong> – выявить внешние факторы, которые могут повлиять на деятельность компании, и своевременно адаптировать маркетинговую стратегию.</p>\n<p><strong>Модель пяти сил конкуренции М. Портера</strong> – метод анализа конкурентной среды (микросреды), оценивающий пять факторов, определяющих интенсивность конкуренции в отрасли:</p>\n<ul>\n<li><strong>Угроза появления новых конкурентов</strong> – насколько легко новым игрокам войти на рынок.</li>\n</ul>\n<ul>\n<li><strong>Угроза товаров-заменителей</strong> – наличие альтернативных продуктов, способных удовлетворить те же потребности.</li>\n</ul>\n<ul>\n<li><strong>Рыночная власть поставщиков</strong> – способность поставщиков влиять на цены и условия поставок.</li>\n</ul>\n<ul>\n<li><strong>Рыночная власть покупателей</strong> – способность покупателей влиять на цены и требовать лучших условий.</li>\n</ul>\n<ul>\n<li><strong>Интенсивность конкуренции между существующими игроками</strong> – борьба фирм за ограниченный объем платежеспособного спроса на доступных сегментах рынка.</li>\n</ul>\n<p>Анализ пяти сил позволяет оценить привлекательность отрасли и выработать конкурентную стратегию.</p>\n<p><strong>SWOT-анализ</strong> – метод комплексного анализа, объединяющий оценку внутренней и внешней среды компании по четырем параметрам:</p>\n<ul>\n<li><strong>Strengths (сильные стороны)</strong> – внутренние конкурентные преимущества компании.</li>\n</ul>\n<ul>\n<li><strong>Weaknesses (слабые стороны)</strong> – внутренние недостатки и ограничения.</li>\n</ul>\n<ul>\n<li><strong>Opportunities (возможности)</strong> – благоприятные факторы внешней среды (макро- и микросреды).</li>\n</ul>\n<ul>\n<li><strong>Threats (угрозы)</strong> – неблагоприятные факторы внешней среды, создающие риски.</li>\n</ul>\n<p>SWOT-анализ позволяет сопоставить внутренний потенциал компании с условиями внешней среды и сформировать обоснованную маркетинговую стратегию: использовать возможности, опираясь на сильные стороны, и минимизировать угрозы, устраняя слабые.</p>"},{"n":18,"t":"Сегментирование рынка и позиционирование товара: цели, стратегии, методы","ann":"дать определение и указать цель сегментирования рынка, понятию «рыночный сегмент», перечислить и дать определение стратегиям сегментации, указать критерии сегментирования. Дать определение понятию «позиционирование», описать атрибуты и виды (формы) позиционирования. Раскрыть сущность карт восприятия","a":"<p><strong>Сегментирование рынка</strong> – разбивка рынка на четкие группы покупателей, для каждой из которых может потребоваться отдельный товар и комплекс маркетинга.</p>\n<p><strong>Цель сегментирования</strong> – выявить наиболее привлекательные сегменты, сосредоточить ресурсы компании на тех из них, которые могут дать максимальную прибыль, и разработать эффективные маркетинговые программы.</p>\n<p><strong>Рыночный сегмент</strong> – группа потребителей, одинаково реагирующих на один и тот же набор побудительных стимулов маркетинга.</p>\n<p><strong>Критерии эффективности сегментации:</strong></p>\n<ul>\n<li><strong>Измеримость</strong> – возможность разграничения, измерения и оценки рыночного потенциала сегментов.</li>\n</ul>\n<ul>\n<li><strong>Достаточный размер</strong> – сегмент должен иметь достаточную емкость для экономической целесообразности.</li>\n</ul>\n<ul>\n<li><strong>Достижимость</strong> – возможность предлагать сегменту маркетинговые программы.</li>\n</ul>\n<ul>\n<li><strong>Стабильность</strong> – способность сегмента сохранять однородность покупательских предпочтений с течением времени.</li>\n</ul>\n<p><strong>Краткое описание стратегий охвата рынка:</strong></p>\n<ul>\n<li><strong>Недифференцированный маркетинг.</strong> Компания фокусирует внимание на том, что является общим в потребностях потребителей, а не на том, чем они отличаются друг от друга (массовая реклама).</li>\n</ul>\n<ul>\n<li><strong>Дифференцированный маркетинг. </strong>Действие на нескольких сегментах со специально для них разработанными продуктами.</li>\n</ul>\n<ul>\n<li><strong>Концентрированный маркетинг. </strong>Это стратегия специализации, в которой предложение, как правило, оригинально и рассчитано «под клиента».</li>\n</ul>\n<p><strong>Позиционирование</strong> – процесс формирования в сознании целевой аудитории четкого, отличительного и желательного образа продукта относительно конкурентов.</p>\n<p><strong>Цель позиционирования</strong> – занять устойчивое место в сознании потребителя и выделиться на фоне конкурентов.</p>\n<p><strong>Атрибуты позиционирования</strong> – характеристики, по которым продукт отличается от конкурентов в восприятии потребителя:</p>\n<ul>\n<li>функциональные (качество, цена, состав);</li>\n</ul>\n<ul>\n<li>эмоциональные (престиж, стиль, ценности);</li>\n</ul>\n<ul>\n<li>символические (бренд, страна происхождения);</li>\n</ul>\n<ul>\n<li>сервисные (удобство, поддержка, гарантии).</li>\n</ul>\n<p><strong>Формы (виды) позиционирования:</strong></p>\n<ul>\n<li>Позиционирование компании – формирование образа всей организации в сознании потребителей (репутация, ценности, миссия).</li>\n</ul>\n<ul>\n<li>Позиционирование продукта – выделение конкретного товара среди конкурентов по его характеристикам, выгодам или цене.</li>\n</ul>\n<ul>\n<li>Позиционирование продукта и бренда вместе – объединение образа товара и торговой марки в единое восприятие. Пример: Volvo – безопасность, McDonald's – еда и развлечения.</li>\n</ul>\n<p><strong>Карта позиционирования (восприятия)</strong> – визуальный инструмент, отображающий положение продукта и конкурентов в сознании потребителей по двум ключевым атрибутам (осям). Позволяет наглядно увидеть незанятые рыночные ниши, конкурентную среду и восприятие собственного бренда аудиторией. Оси карты выбираются исходя из наиболее значимых для целевой аудитории критериев – например, «цена – качество» или «традиционность – инновационность».</p>"},{"n":19,"t":"Понятие и элементы комплекса маркетинга. Новые теории на основе концепции 4P. Товар как элемент комплекса маркетинга. Жизненный цикл товара на рынке","ann":"При ответе на вопрос необходимо раскрыть сущность теории 4P (комплекса маркетинга),  дать характеристику основным элементам комплекса маркетинга. Привести новые теории на основе концепции 4P. Комплекс маркетинга 5, 6, 7 \"P\". Дать определение «товара», классификация товаров. Жизненный цикл товара: оп","a":"<p><strong>Комплекс маркетинга (маркетинг-микс)</strong> – набор инструментов, позволяющих управлять спросом и достигать маркетинговых целей компании.</p>\n<p><h4><strong>Product</strong> — что предлагаем</h4></p>\n<p><h4><strong>Price</strong> — сколько стоит</h4></p>\n<p><h4><strong>Place</strong> — как доставить до потребителя</h4></p>\n<p><h4><strong>Promotion</strong> — как информировать</h4></p>\n<p><h4><strong>Новые концепции на основе 4P</strong></h4></p>\n<p><strong>7P (Бумс и Битнер, 1981) – для рынка услуг добавили:</strong></p>\n<ul>\n<li>People (Люди) – персонал, лидеры мнений, VIP-клиенты</li>\n</ul>\n<ul>\n<li>Process (Процесс) – взаимодействие компании и потребителя</li>\n</ul>\n<ul>\n<li>Physical Evidence (Физическое окружение) – среда оказания услуги</li>\n</ul>\n<p><strong>4C (Боб Лотерборн, 1990) – акцент смещается на потребителя:</strong></p>\n<ul>\n<li>Customer needs – потребности покупателя (вместо Product)</li>\n</ul>\n<ul>\n<li>Cost to the customer – стоимость для покупателя (вместо Price)</li>\n</ul>\n<ul>\n<li>Convenience – удобство (вместо Place)</li>\n</ul>\n<ul>\n<li>Communication – двусторонний обмен (вместо Promotion)</li>\n</ul>\n<p><strong>4R (Дон Шульц) – модель персонального маркетинга:</strong></p>\n<ul>\n<li>Relevance (Релевантность)</li>\n</ul>\n<ul>\n<li>Respond (Реакция)</li>\n</ul>\n<ul>\n<li>Relation (Отношения)</li>\n</ul>\n<ul>\n<li>Return (Вознаграждение/Прибыль)</li>\n</ul>\n<p><h4><strong>3. Товар как элемент комплекса маркетинга</strong></h4></p>\n<p><strong>Товар</strong> – все, что может быть предложено рынку для удовлетворения потребности: физический продукт, услуга или идея.</p>\n<p><strong>Классификация товаров по типу спроса:</strong></p>\n<ul>\n<li>Товары повседневного спроса – (хлеб, зубная паста)</li>\n</ul>\n<ul>\n<li>Товары предварительного выбора – покупатель сравнивает варианты (мебель, бытовая техника)</li>\n</ul>\n<ul>\n<li>Товары особого спроса – уникальные, покупатель готов на усилия (дорогие автомобили)</li>\n</ul>\n<ul>\n<li>Товары пассивного спроса – о которых покупатель не думает сам (страховка)</li>\n</ul>\n<ul>\n<li>Товары массового спроса – ориентированные на массовую аудиторию</li>\n</ul>\n<p><h4><strong>4. Жизненный цикл товара (ЖЦТ)</strong></h4></p>\n<p><strong>ЖЦТ</strong> – период существования товара на рынке от вывода до снятия с производства.</p>\n<ul>\n<li><strong>Вывод</strong> — медленный рост, нет прибыли, цель — осведомлённость</li>\n</ul>\n<ul>\n<li><strong>Рост</strong> — продажи растут, появляются конкуренты, цель — захват доли рынка</li>\n</ul>\n<ul>\n<li><strong>Зрелость</strong> — продажи стабильны, конкуренция максимальна, цель — удержание позиций</li>\n</ul>\n<ul>\n<li><strong>Спад</strong> — продажи падают, решение: снять, модернизировать или найти новые рынки</li>\n</ul>"},{"n":20,"t":"Количественные характеристики рекламной кампании в СМИ","ann":"при ответе на вопрос необходимо дать определение и характеристику таким показателям как GRP, TRP, OTS, Reach, Reach 1+, Frequency, привести формулы расчета и указать значение каждого из показателей.","a":"<p>Суммарный рейтинг рекламной кампании, GRP (Gross Rating Point) - маркетинговый показатель, отражающий масштаб рекламного воздействия; считается методом суммирования рейтингов всей рекламной кампании по всем носителям.</p>\n<p>GRP показывает, сколько раз рекламное сообщение попадается людям на глаза за период рекламной кампании.</p>\n<p>Целевой суммарный рейтинг или Target Rating Point, TRP – это суммарный рейтинг, но не для всей аудитории, как GRP, а лишь для целевой группы.</p>\n<p>Количество контактов (OTS, Opportunity To See) - количество раз (в абсолютном исчислении), которое данное PC потенциально могли увидеть все потенциальные телезрители, независимо от того, относятся они к ЦА или нет.</p>\n<p><strong>OTS = GRP x Тп</strong></p>\n<p>Эффективный охват – величина, характеризующая размер аудитории, имевшей контакт с рекламой за время рекламной кампании. Эта величина может быть представлена в двух типичных формах: как характеристика аудитории, которая видела PC определенное количество раз, и как характеристика аудитории, которая видела PC не менее определенного количества раз.</p>\n<p>Обозначаются эти величины Reach(n) и Reach(n+) соответственно, где n - количество восприятий.</p>\n<p>Средняя частота восприятия (Average Opportunity To See), или Frequency - показывает среднее число контактов аудитории с рекламными сообщениями в рамках рекламной кампании среди представителей целевой аудитории, имевших контакт с данной рекламой.</p>\n<p>Задача оптимального медиапланирования состоит в том, чтобы, стремясь к наибольшему охвату, обеспечить необходимую среднюю частоту восприятия,</p>"},{"n":21,"t":"Стоимостные показатели рекламной кампании в СМИ","ann":"при ответе на вопрос студент должен дать определение, привести формулу расчета и перечислить особенности стоимостных показателей рекламной кампании: СРТ, СРТ reach, CPP.","a":"<p><strong><em>СРТ </strong><strong>позволяет проводить сравнение в количественном выражении коммуникационных каналов, принципиально различных по своей сущности: пресса, радио, телевидение, наружная реклама.</em></p>\n<p></strong><em>CPT = (стоимость рекламы / количество контактов) </em> 1 000<strong><em></p>\n<p></em>Стоимость контактов с тысячей представителей целевой аудитории (СРТ reach) </strong>- определяет цену, которую надо заплатить, чтобы рекламу увидела (услышала) тысяча представителей целевой аудитории, имевших хотя бы один контакт с рекламным сообщением за время проведения рекламной кампании :<em></p>\n<p></em>где Reach(1+) - доля целевой аудитории, имевших хотя бы один контакт с рекламным сообщением<em></p>\n<p><strong></em>Стоимость за пункт GRP </strong><strong>(англ. Cost Per Point или СРР) отражает цену, которую нужно заплатить для информирования или охвата 1% аудитории.<em></p>\n<p></em>CPP рассчитывают для оценки экономической эффективности размещения рекламы.<em></p>\n<p></strong></em>CPP = Стоимость размещения рекламы / GRP<em>*</em></p>"},{"n":22,"t":"Коммуникационная эффективность рекламы","ann":"студент должен дать определение коммуникационной эффективности рекламы, перечислить и кратко охарактеризовать существующие методики ее определения до проведения рекламной кампании, в период ее проведения и после ее завершения.","a":"<p>Коммуникационная эффективность – степень психологического воздействия рекламных сообщений на сознание потенциальных потребителей и способность рекламы достигать поставленных перед ней целей коммуникативного порядка.</p>\n<p><strong>Методы оценки, используемые до начала рекламной кампании: </strong></p>\n<p><strong>Метод оценки психологического восприятия</strong></p>\n<p>Контрольной группе потребителей предлагают рассмотреть альтернативные варианты рекламы и дать оценку каждому варианту в баллах по определенной шкале.</p>\n<p><strong>Метод оценки запоминаемости. </strong></p>\n<p>Приглашают группу людей (из типичных представителей ЦА). Им предлагают просмотреть или прослушать подборку рекламных сообщений. Затем их просят вспомнить, какую рекламу они запомнили, и ее содержание (достоинства товара, марку производителя). Таким образом, определяют уровень запоминания рекламы.</p>\n<p><strong>Метод экспертных оценок</strong></p>\n<p>Позволяет определить лучшее объявление из нескольких альтернативных по совокупности параметров.</p>\n<p>Члены экспертной комиссии проставляют оценки в баллах в анкете</p>\n<p>Вопросы: степень привлечения внимания, степень запоминаемости, убедительность рекламных доводов и т.д.</p>\n<p>Для каждого объявления оценки суммируются и выбирается лучшее объявление.</p>\n<p><strong>Методы оценки, используемые в ходе рекламной кампании</strong></p>\n<p><strong>Метод определения степени привлечения внимания к рекламе. </strong></p>\n<p>Наблюдатель регистрирует количество людей, обративших внимание на рекламу (витрину магазина, стенд выставки или наружную рекламу) и ведет подсчет общего количества людей, прошедших мимо.</p>\n<p><strong>Метод оценки потока покупателей</strong></p>\n<p>Определяют отношение числа посетителей в период рекламирования к обычному, среднему числу посетителей.</p>\n<p><strong>Методы оценки, используемые после рекламной кампании.</strong></p>\n<p><strong>Метод «отзыва без помощи»</strong></p>\n<p>Для ответов на вопросы респондентам предлагают несколько пар антонимов-определений, отражающих противоположные точки зрения на товар или рекламу.</p>\n<p>Например: \"положительное\" - \"отрицательное\", \"сильное\" - \"слабое\".</p>\n<p>Между ними располагается шкала.</p>\n<p>Респондент должен отразить свое отношение, поставив галочку в соответствующем интервале.</p>\n<p><strong>«Отзыв с помощью»</strong></p>\n<p>Респондентам показываются определенные рекламные сообщения. Специалисты задают наводящие вопросы и помогают сформулировать ответы.</p>\n<p>В результате выясняется, было ли отношение респондента к рекламируемому товару сформировано ранее или в результате воздействия рекламы.</p>"},{"n":23,"t":"Организация как функция менеджмента.  Организационные основы управления","ann":"Организация как функция управления. Организационные структуры менеджмента: линейная, функциональная, линейно – функциональная, дивизиональная, матричная. Динамические сети. Информационное обеспечение рекламной деятельности. Понятие информации, методы анализа информации. Организация исследований в ре","a":"<p><strong>Организация (функция управления)</strong> – это установление связей между подразделениями и определение порядка работы.</p>\n<p><strong>Организационные структуры менеджмента</strong>:</p>\n<p><strong>Линейная</strong> — строгая вертикальная иерархия, единоначалие. Плюс — простота и чёткость подчинения, минус — негибкость и перегрузка руководителя.</p>\n<p><strong>Функциональная</strong> — подразделения создаются по специализированным направлениям: производство, маркетинг, финансы. Высокая компетентность, но сложная координация между отделами.</p>\n<p><strong>Линейно-функциональная</strong> — сочетает единоначалие с функциональной специализацией: линейный руководитель принимает решения, функциональные службы консультируют.</p>\n<p><strong>Дивизиональная</strong> — компания делится на самостоятельные дивизионы по продуктам, регионам или клиентам, у каждого свои службы. Высокая адаптивность, но дублирование функций.</p>\n<p><strong>Матричная</strong> — двойное подчинение: функциональному руководителю и руководителю проекта. Гибкость и эффективное использование ресурсов, но высокий риск конфликтов.</p>\n<p><strong>Динамические сети</strong> — временные союзы независимых фирм вокруг компании-лидера под конкретный проект. После завершения сеть распадается.</p>\n<p><strong>Информационное обеспечение</strong> рекламной деятельности — сбор, обработка и предоставление данных о рынке, конкурентах, регулировании. Методы анализа: количественные и качественные исследования, ситуационный анализ.</p>\n<p><strong>Рекламные исследования</strong> — сбор и анализ информации для разработки и оценки рекламных стратегий. Виды: кабинетные, полевые, поисковые, описательные, причинно-следственные.</p>"},{"n":24,"t":"Понятие, процесс и структура маркетинговых коммуникаций. Брендинг и стимулирование сбыта","ann":"При ответе на этот вопрос необходимо показать знание основных аспектов маркетинговых коммуникаций и их роли в современном бизнесе. Рассмотреть ключевые понятия, процессы и структурные элементы маркетинговых коммуникаций. Описать инструменты и модели коммуникационного воздействия на потребителей, дат","a":"<p><h4>1. Понятие маркетинговых коммуникаций</h4></p>\n<p><strong>Маркетинговые коммуникации</strong> – совокупность инструментов и сообщений, с помощью которых компания передает информацию о товаре целевой аудитории. Коммуникация – процесс передачи информации от отправителя к получателю.</p>\n<p><h4>2. Процесс коммуникации</h4></p>\n<ul>\n<li>Передатчик (коммуникатор) – компания-отправитель сообщения</li>\n</ul>\n<ul>\n<li>Кодирование – преобразование идеи в форму (текст, видео, изображение)</li>\n</ul>\n<ul>\n<li>Обращение – само рекламное сообщение</li>\n</ul>\n<ul>\n<li>Декодирование – интерпретация сообщения потребителем</li>\n</ul>\n<ul>\n<li>Обратная связь – реакция получателя на сообщение</li>\n</ul>\n<ul>\n<li>Помехи – факторы, искажающие восприятие сообщения</li>\n</ul>\n<p><h4><strong>3. Структура и инструменты коммуникаций (комплекс продвижения)</strong></h4></p>\n<p>Реклама – платное неличное продвижение товара через СМИ и интернет.</p>\n<p>PR – управление репутацией компании через публикации и мероприятия.</p>\n<p>Прямая коммуникация – персональное обращение к потребителю.</p>\n<p>Цифровой маркетинг и интернет-коммуникации – продвижение через SEO, контекстную и таргетированную рекламу.</p>\n<p>Социальные медиа – двустороннее взаимодействие с аудиторией через соцсети.</p>\n<p>Активное предложение – инициативное обращение к потребителю с конкретной акцией для стимулирования немедленной покупки.</p>\n<p><h4>4. Брендинг</h4></p>\n<p><strong>Брендинг</strong> – процесс создания и управления брендом для формирования устойчивого образа в сознании потребителей.</p>\n<ul>\n<li>УТП – конкретное преимущество товара перед конкурентами</li>\n</ul>\n<ul>\n<li>Позиционирование – место бренда в сознании аудитории относительно конкурентов</li>\n</ul>\n<ul>\n<li>Лояльность – приверженность потребителя бренду и готовность к повторным покупкам</li>\n</ul>\n<p><h4>5. Стимулирование сбыта</h4></p>\n<p><strong>Стимулирование сбыта</strong> – краткосрочные мероприятия, побуждающие потребителя к быстрой покупке.</p>\n<p>Ценовые методы: скидки, акции, купоны.</p>\n<p>Неценовые методы: сэмплинг (раздача образцов), лотереи, подарок при покупке, программы лояльности.</p>\n<p><strong>POS-материалы</strong> – рекламные материалы непосредственно в местах продаж (воблеры, дисплеи, промостойки), воздействующие на потребителя в момент принятия решения о покупке.</p>"},{"n":25,"t":"Понятие интернет-реклама. Виды, особенности работы","ann":"При ответе на этот вопрос необходимо подробно описать виды рекламы в интернете. Отдельное внимание следует уделить теме контекстной рекламы: описать принцип работы, систему оплаты, основные системы и сайты (Яндекс.Директ, Google AdWords), достоинства и недостатки. Необходимо раскрыть понятие таргети","a":"<p><h4>1. Понятие интернет-рекламы</h4></p>\n<p><strong>Интернет-реклама</strong> – форма рекламы, использующая интернет для взаимодействия с целевой аудиторией через веб-сайты, поисковые системы, социальные сети и другие цифровые каналы.</p>\n<p><h4>2. Виды интернет-рекламы</h4></p>\n<p><strong>Поисковая реклама</strong> – показывается в результатах поиска в ответ на запрос пользователя.</p>\n<p><strong>Тематическая реклама</strong> – показывается на сайтах-партнерах, тематика которых совпадает с интересами пользователя.</p>\n<p><strong>Контекстная реклама</strong> – показ объявлений, соответствующих интересам пользователя (включает поисковую и тематическую).</p>\n<p><strong>Таргетинговая реклама</strong> – показ рекламы по заданным параметрам аудитории: возраст, пол, география, интересы, поведение.</p>\n<p><strong>Ретаргетинг</strong> – показ рекламы пользователям, уже взаимодействовавшим с сайтом, но не совершившим целевое действие. Цель – вернуть ушедшего пользователя.</p>\n<p><h4>3. Контекстная реклама</h4></p>\n<p><strong>Контекстная реклама (КР)</strong> – показ рекламных объявлений, релевантных интересам и запросам пользователя.</p>\n<p><h4><strong>Принцип работы</strong></h4></p>\n<p>Система анализирует интересы и поведение пользователя, его поисковые запросы и показывает наиболее подходящие объявления. Рекламодатель задает ключевые слова, аудиторию и ставку – система подбирает подходящий момент для показа.</p>\n<p><h4><strong>Системы оплаты</strong></h4></p>\n<ul>\n<li>CPC (Cost Per Click) – оплата за каждый клик по объявлению</li>\n</ul>\n<ul>\n<li>CPA (Cost Per Action) – оплата за целевое действие (покупка, регистрация)</li>\n</ul>\n<ul>\n<li>CPM (Cost Per Mille) – оплата за 1000 показов</li>\n</ul>\n<ul>\n<li>Фиксированная – фиксированная стоимость размещения за период</li>\n</ul>\n<p><h4><strong>Основные системы</strong></h4></p>\n<p><strong>Яндекс.Директ </strong>– ведущая система КР в России. Объявления отображаются на страницах поисковой выдачи, на партнерских сайтах (РСЯ – Рекламная сеть Яндекса), а также во всех внутренних сервисах Яндекса: картах, новостных порталах, справочниках.</p>\n<p><strong>Google AdWords (Google Ads)</strong> – глобальная система КР. Рекламодатель сам назначает цену за клик. Объявления показываются в поиске Google, на сайтах-партнерах (КМС – Контекстно-медийная сеть), а также перед видеороликами на YouTube.</p>\n<p><h4>Достоинства и недостатки</h4></p>\n<p>| Достоинства | Недостатки |</p>\n<p>| --- | --- |</p>\n<p>| Точность попадания в аудиторию | Не подходит для новых/неизвестных продуктов |</p>\n<p>| Широкий охват | «Баннерная слепота» у пользователей |</p>\n<p>| Быстрый запуск | Высокая стоимость в конкурентных нишах |</p>\n<p>| Гибкость настройки | Сложность настройки и управления |</p>\n<p>| Доступная аналитика | Ограничения по тематикам (медицина, финансы) |</p>\n<p><h4><strong>4. Сравнение интернет-рекламы и SEO</strong></h4></p>\n<p>Сходство: оба инструмента направлены на привлечение клиентов через интернет.</p>\n<p>| Параметр | Контекстная реклама | SEO |</p>\n<p>| --- | --- | --- |</p>\n<p>| Тип | Платная реклама в выдаче | Органическая оптимизация сайта |</p>\n<p>| Скорость | Результат моментально | Результат через месяцы |</p>\n<p>| Стоимость | Постоянные затраты на клики | Дешевле в долгосрочной перспективе |</p>\n<p>| Изменения сайта | Не требует | Требует технической оптимизации |</p>\n<p>| Прогнозируемость | Высокая | Нет гарантий результата |</p>\n<p>| Качество трафика | Широкий охват | Более целевой трафик |</p>"},{"n":26,"t":"Проектирование рекламной кампании и создание концепции рекламного обращения","ann":"Понятие рекламной концепции и рекламной идеи. Маркетинговая и коммуникативная эффективность рекламного продукта. Эффективность рекламной кампании и эффективность рекламного продукта. Финансово-экономические показатели и методы оценки эффективности рекламного продукта. ","a":"<p><h4><strong>1. Рекламная концепция и рекламная идея</strong></h4></p>\n<p><strong>Рекламная концепция</strong> – общий замысел рекламной кампании: определяет цели, целевую аудиторию, ключевое послание и общий стиль коммуникации.</p>\n<p><strong>Рекламная идея</strong> – художественное представление преимуществ товара; конкретное творческое решение, через которое концепция воплощается в рекламном продукте (слоган, образ, сюжет).</p>\n<p>Концепция отвечает на вопрос <strong>«что сказать»</strong>, идея – на вопрос <strong>«как сказать»</strong>.</p>\n<p><h4><strong>2. Эффективность рекламной кампании и рекламного продукта</strong></h4></p>\n<p>Эффективность рекламной кампании – степень достижения поставленных маркетинговых целей в результате проведения кампании (рост продаж, доли рынка, узнаваемости бренда).</p>\n<p>Эффективность рекламного продукта – способность конкретного рекламного материала достигать целей кампании. Различают два вида:</p>\n<ul>\n<li><strong>Коммуникативная эффективность</strong> – степень воздействия рекламы на сознание потребителя: запоминаемость, узнаваемость, отношение к бренду</li>\n</ul>\n<ul>\n<li><strong>Маркетинговая (экономическая) эффективность</strong> – измеримый финансовый результат: рост продаж, прибыли, возврат инвестиций</li>\n</ul>\n<p><h4><strong>3. Финансово-экономические показатели оценки эффективности</strong></h4></p>\n<ul>\n<li><strong>ROI (Return on Investment)</strong> – возврат на инвестиции в рекламу. Показывает, сколько прибыли принес каждый вложенный рубль: ROI = (Прибыль − Затраты) / Затраты × 100%</li>\n</ul>\n<ul>\n<li><strong>Рентабельность</strong> – отношение прибыли от рекламы к затратам на нее</li>\n</ul>\n<ul>\n<li><strong>Объем продаж</strong> – прирост продаж в период рекламной активности</li>\n</ul>\n<ul>\n<li><strong>Конверсия</strong> – доля пользователей, совершивших целевое действие (покупку, регистрацию) от общего числа контактов с рекламой</li>\n</ul>\n<ul>\n<li><strong>Кликабельность (CTR)</strong> – отношение числа кликов к числу показов рекламы</li>\n</ul>\n<ul>\n<li><strong>CPA (Cost Per Action)</strong> – стоимость одного целевого действия</li>\n</ul>\n<p><h4><strong>4. Методы оценки эффективности</strong></h4></p>\n<ul>\n<li><strong>Сравнение показателей до и после рекламы</strong> – замер продаж, знания бренда и других метрик до старта кампании и после ее завершения</li>\n</ul>\n<ul>\n<li><strong>Анализ рентабельности</strong> – сопоставление затрат на рекламу с полученной прибылью</li>\n</ul>\n<ul>\n<li><strong>Анализ достижения цели</strong> – оценка того, насколько достигнуты изначально поставленные KPI кампании</li>\n</ul>\n<ul>\n<li><strong>Сравнение с конкурентами</strong> – бенчмаркинг показателей эффективности относительно рынка</li>\n</ul>\n<p><h4><strong>5. Уровни оценки эффективности рекламного продукта</strong></h4></p>\n<p>Когнитивный – определение влияния рекламы на изменение знаний потребителя об объекте рекламы: знает ли аудитория о товаре, его свойствах и преимуществах.</p>\n<p>Аффективный – формирование в сознании потребителей положительного отношения к объекту рекламы: симпатия, доверие, предпочтение бренда.</p>\n<p>Коннотативный (поведенческий) – формирование намерения вступить в контакт с фирмой и купить ее товар: готовность к действию как итог коммуникационного воздействия.</p>"},{"n":27,"t":"Контент-маркетинг в структуре интернет-маркетинговых коммуникаций","ann":" При ответе на этот вопрос необходимо показать понимание сущности, принципов контент-маркетинга и его места в структуре маркетинговых коммуникаций в сети Интернет.","a":"<p><strong><em>Аннотация:</strong><strong> При ответе на этот вопрос необходимо показать понимание сущности, принципов контент-маркетинга и его места в структуре маркетинговых коммуникаций в сети Интернет.</em></p>\n<p>Контент-маркетинг – способ продвижения через создание и распространение полезного, интересного контента (статьи, видео, инфографика, подкасты).</p>\n<p>Цель – привлечь целевую аудиторию, сформировать доверие к бренду и превратить аудиторию в покупателей.</p>\n<p>В отличие от прямой рекламы, контент-маркетинг не навязывает покупку, а решает проблемы потребителя, формируя долгосрочную лояльность.</p>\n<p></strong>Цифровые маркетинговые коммуникации включают:<strong> SEO, контекстную рекламу, таргетинг, ретаргетинг, email-маркетинг, медийную и баннерную рекламу, SMM и контент-маркетинг.</p>\n<p></strong>Схемы и инструменты этапов создания и распространения контент-маркетинга:**</p>\n<p>1. Исследование целевой аудитории и определение их потребностей и интересов.</p>\n<p>2. Создание качественного контента, такого как статьи, блоги, видео, инфографика и другие форматы.</p>\n<p>3. Распространение контента через различные каналы, такие как социальные сети, электронная почта, блоги, веб-сайты и т.д.</p>\n<p>4. Оптимизация контента для поисковых систем с целью улучшения его видимости в поисковых результатах.</p>\n<p>5. Анализ результатов и эффективности контент-маркетинга с использованием метрик и инструментов аналитики.</p>"},{"n":28,"t":"Основы управления коллективом","ann":"Раскрыть понятие коллектива, рассмотрите факторы, влияющие на работу коллектива, опишите методы управления коллективами.","a":"<p><strong>1. Понятие коллектива</strong></p>\n<p><strong>Трудовой коллектив — </strong>социальная группа, объединенная общей целью, с органами управления, дисциплиной и ответственностью.</p>\n<p><strong>Коллективы бывают:</strong></p>\n<p><strong>Формальные — </strong>структурные подразделения с назначенным руководителем и закрепленными функциями</p>\n<p><strong>Неформальные —</strong> возникают стихийно по симпатиям, интересам и привычкам</p>\n<p><strong>2. Факторы, влияющие на работу коллектива</strong></p>\n<ul>\n<li>Внутренние — психологический климат, сплоченность, роли и статусы, лидерство, коммуникация</li>\n</ul>\n<ul>\n<li>Внешние — оргкультура, система мотивации, условия труда, конкуренция</li>\n</ul>\n<p><strong>3. Методы управления коллективом (АЭС)</strong></p>\n<p><strong>Административные (организационно-распо
