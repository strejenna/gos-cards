рядительные)</strong></p>\n<p>Основаны на власти и дисциплине. Включают приказы, инструкции, регламенты, должностные обязанности. Эффективны для поддержания порядка, но могут снижать инициативу.</p>\n<p><strong>Экономические – </strong>премии, надбавки, система KPI, штрафы. Мотивируют через выгоду, но не всегда формируют лояльность.</p>\n<p><strong>Социально-психологические – </strong>корпоративный дух, похвала, тимбилдинг, работа с конфликтами; самые важные.</p>"},{"n":29,"t":"Раскройте понятие ролевого состава группы","ann":"Раскройте понятие ролевого состава группы, ролевой состав группы в работе по содержанию, при поддержании психологического климата в коллективе. Опишите все роли, которые присутствуют в коллективе.","a":"<p><strong>1. Понятие ролевого состава группы</strong></p>\n<p><strong>Роль</strong> – это модель поведения, ожидаемая от человека в определенной позиции внутри группы.</p>\n<p><strong>Ролевой состав группы</strong> – это совокупность функциональных ролей, которые выполняют члены коллектива в процессе совместной деятельности.</p>\n<p><strong>Роли бывают:</strong></p>\n<ul>\n<li><strong>Формальные</strong> – закреплены должностью (руководитель, исполнитель)</li>\n</ul>\n<ul>\n<li><strong>Неформальные</strong> – складываются стихийно на основе личных качеств и отношений</li>\n</ul>\n<p><strong>2. Роли в работе по содержанию (деловые роли) – </strong>это роли, направленные на выполнение задач и достижение результата:</p>\n<ul>\n<li><strong>Генератор идей</strong> – предлагает новые, нестандартные решения, творчески подходит к задачам. Незаменим на этапе планирования и мозгового штурма.</li>\n</ul>\n<ul>\n<li><strong>Аналитик (критик)</strong> – оценивает предложения, выявляет слабые места, предотвращает ошибки. Не генерирует идеи, но улучшает чужие.</li>\n</ul>\n<ul>\n<li><strong>Исполнитель</strong> – четко и дисциплинированно выполняет поставленные задачи. Надежен, но может быть негибким.</li>\n</ul>\n<ul>\n<li><strong>Координатор</strong> – организует взаимодействие между членами группы, распределяет задачи, следит за сроками.</li>\n</ul>\n<ul>\n<li><strong>Эксперт (специалист)</strong> – обладает глубокими знаниями в конкретной области, к нему обращаются за профессиональным мнением.</li>\n</ul>\n<ul>\n<li><strong>Доводчик (финишер)</strong> – доводит дело до конца, следит за качеством и деталями на завершающем этапе.</li>\n</ul>\n<p><strong>3. Роли при поддержании психологического климата – </strong>это роли, направленные не на задачи, а на отношения внутри коллектива.</p>\n<ul>\n<li><strong>Лидер</strong> – пользуется авторитетом, объединяет группу, задает направление. Может быть формальным (руководитель) и неформальным.</li>\n</ul>\n<ul>\n<li><strong>Душа компании</strong> – создает позитивную атмосферу, снимает напряжение, поддерживает хорошие отношения между всеми.</li>\n</ul>\n<ul>\n<li><strong>Миротворец</strong> – сглаживает конфликты, ищет компромисс, восстанавливает взаимопонимание.</li>\n</ul>\n<ul>\n<li><strong>Опекун</strong> – заботится о других членах группы, поддерживает в трудных ситуациях, внимателен к настроениям.</li>\n</ul>\n<ul>\n<li><strong>Юморист</strong> – разряжает напряжение с помощью юмора, помогает группе справляться со стрессом.</li>\n</ul>\n<p><strong>4. Деструктивные роли:</strong>:</p>\n<ul>\n<li><strong>Агрессор</strong> – критикует, нападает, подавляет инициативу других.</li>\n</ul>\n<ul>\n<li><strong>Манипулятор</strong> – использует других в личных интересах, скрывает истинные мотивы.</li>\n</ul>\n<ul>\n<li><strong>Отстраненный</strong> – не участвует в жизни группы, избегает ответственности.</li>\n</ul>"},{"n":30,"t":"Социальный статус человека, понятие стратификации","ann":"Понятие социального статуса, факторы, влияющие на социальный статус человека. Стратификация общества, критерии стратификации, раскрыть все подробно.","a":"<p><strong>1. Понятие социального статуса</strong></p>\n<p><strong>Социальный статус</strong> – положение человека в обществе, определяющее его права, обязанности и отношения с другими.</p>\n<ul>\n<li><strong>Предписанный статус </strong>– получен от рождения, независимо от желания человека. Например: пол, национальность, происхождение, место рождения.</li>\n</ul>\n<ul>\n<li><strong>Достигнутый статус</strong> – приобретается в результате собственных усилий, образования, профессиональной деятельности. Например: должность, ученая степень, звание. Также выделяют:</li>\n</ul>\n<ul>\n<li><strong>Личный статус</strong> – положение человека в малой группе (семья, коллектив), основанное на личных качествах</li>\n</ul>\n<ul>\n<li><strong>Профессиональный статус</strong> – положение в профессиональной иерархии</li>\n</ul>\n<ul>\n<li><strong>Главный (интегральный) статус</strong> – наиболее значимый для человека и окружающих, чаще всего связан с профессией или должностью</li>\n</ul>\n<p><strong>2. Факторы, влияющие на социальный статус ОППСПС</strong></p>\n<ul>\n<li><strong>Образование</strong> – чем выше уровень образования, тем выше статус. Диплом престижного вуза открывает больше возможностей.</li>\n</ul>\n<ul>\n<li><strong>Профессия и должность</strong> – одни профессии традиционно ценятся выше других. Руководящая должность повышает статус.</li>\n</ul>\n<ul>\n<li><strong>Материальное положение</strong> – уровень дохода, собственность, доступ к ресурсам напрямую влияют на положение в обществе.</li>\n</ul>\n<ul>\n<li><strong>Происхождение и семья</strong> – социальное происхождение задает стартовые условия. Семья с высоким статусом передает его детям.</li>\n</ul>\n<ul>\n<li><strong>Личные качества</strong> – харизма, интеллект, коммуникабельность, репутация влияют на неформальный статус.</li>\n</ul>\n<ul>\n<li><strong>Связи и окружение</strong> – социальный капитал, то есть круг знакомств и связей, существенно определяет возможности человека.</li>\n</ul>\n<ul>\n<li><strong>Пол и возраст</strong> – в разных обществах и культурах влияют на статус по-разному.</li>\n</ul>\n<p><strong>3. Понятие социальной стратификации</strong></p>\n<p>Социальная стратификация – это система расслоения общества на слои (страты) по определенным критериям: доходу, власти, престижу, образованию. Термин происходит от латинского <em>stratum</em> – слой.</p>\n<p>Стратификация показывает, что общество <strong>неоднородно</strong>: люди занимают разные позиции и имеют неравный доступ к ресурсам и возможностям.</p>\n<p>Выделяют четыре типа стратификации:</p>\n<p>| <strong>1.Рабство</strong> | Крайняя форма неравенства, человек – собственность |</p>\n<p>| --- | --- |</p>\n<p>| <strong>2.Касты</strong> | Закрытые группы, переход между которыми невозможен (Индия) |</p>\n<p>| <strong>3.Сословия</strong> | Группы с наследуемыми правами и обязанностями (феодализм) |</p>\n<p>| <strong>4.Классы</strong> | Открытые группы, переход возможен через достижения (современное общество) |</p>\n<p><strong>4. Критерии стратификации</strong></p>\n<p><strong>Доход (экономический критерий)</strong></p>\n<p>Уровень материального благосостояния – заработная плата, собственность, капитал. Делит общество на богатых, средний класс и бедных. Наиболее измеримый критерий.</p>\n<p><strong>Власть (политический критерий)</strong></p>\n<p>Способность навязывать свою волю другим людям, принимать решения, влияющие на общество. Чем больше людей подчиняется человеку – тем выше его статус по этому критерию.</p>\n<p><strong>Престиж (социальный критерий)</strong></p>\n<p>Оценка обществом значимости той или иной профессии, образа жизни, поведения. Престиж не всегда совпадает с доходом (например, учитель имеет высокий престиж, но невысокий доход).</p>\n<p><strong>Образование</strong></p>\n<p>Уровень и качество образования определяют доступ к профессиям, информации и социальным возможностям.</p>\n<p><strong>5. Страты современного общества</strong></p>\n<p><strong>Высший класс</strong> – крупные собственники, топ-менеджеры, политическая элита. Контролируют основные ресурсы.</p>\n<p><strong>Средний класс</strong> – специалисты, предприниматели, менеджеры среднего звена. Основа стабильности общества, наиболее многочисленная страта в развитых странах.</p>\n<p><strong>Рабочий класс</strong> – наемные работники физического и низкоквалифицированного труда.</p>\n<p><strong>Низший класс</strong> – люди с минимальным доходом, безработные, социально уязвимые группы.</p>"},{"n":31,"t":"Физическая культура. Ценности физической культуры","ann":"при ответе на данный вопрос необходимо дать определение физической культуры. Рассмотреть направленность на сохранение, укрепление и развитие.  Рассмотреть ценности физической культуры.","a":"<p><strong>1. Понятие физической культуры</strong></p>\n<p><strong>Физическая культура</strong> – это часть общей культуры общества, представляющая собой совокупность ценностей, знаний и норм, которые используются обществом в целях физического и интеллектуального развития человека, совершенствования его двигательной активности, формирования здорового образа жизни.</p>\n<p><strong>Физическая культура включает в себя:</strong></p>\n<ul>\n<li>физическое воспитание и образование</li>\n</ul>\n<ul>\n<li>спорт и соревновательную деятельность</li>\n</ul>\n<ul>\n<li>физическую рекреацию (активный отдых)</li>\n</ul>\n<ul>\n<li>двигательную реабилитацию</li>\n</ul>\n<p><strong>2. Направленность физической культуры</strong></p>\n<p><strong>Сохранение здоровья</strong></p>\n<p>Физическая культура направлена на <strong>поддержание достигнутого уровня здоровья</strong> и предотвращение его ухудшения. Это включает профилактику заболеваний, поддержание нормального веса, правильной осанки, функционирования всех систем организма. Регулярная физическая активность снижает риск сердечно-сосудистых, опорно-двигательных и других заболеваний.</p>\n<p><strong>Укрепление здоровья</strong></p>\n<p>Это <strong>активное повышение уровня физических возможностей</strong> организма: развитие выносливости, силы, гибкости, иммунитета. Укрепление здоровья предполагает систематические занятия физическими упражнениями, закаливание, соблюдение режима дня и питания.</p>\n<p><strong>Развитие здоровья и способностей</strong></p>\n<p>Направлено на <strong>раскрытие физического и духовного потенциала</strong> человека. Физическая культура развивает не только тело, но и волю, дисциплину, целеустремленность, умение работать в команде. Через физическое развитие формируется гармоничная личность.</p>\n<p><strong>3. Ценности физической культуры</strong></p>\n<p>Ценности физической культуры делятся на <strong>материальные</strong> и <strong>духовные</strong>.</p>\n<p><strong>1.Материальные ценности – </strong>это все, что имеет физическое воплощение и <em>обеспечивает занятия физической культурой:</em></p>\n<p><strong>Спортивные сооружения</strong></p>\n<p><strong>Спортивный инвентарь и оборудование</strong> – снаряды, тренажеры, спортивная одежда и обувь.</p>\n<p><strong>Медицинское и научное обеспечение</strong> – лаборатории, методики тестирования физического состояния, спортивная медицина.</p>\n<p><strong>Финансовые ресурсы</strong> – инвестиции государства и бизнеса в развитие физической культуры и спорта.</p>\n<p><strong>2. Духовные ценности – </strong>это нематериальные результаты и смыслы, которые несет физическая культура:</p>\n<ul>\n<li><strong>Здоровье как ценность</strong> – осознание здоровья как главного жизненного блага, ответственное отношение к своему телу и самочувствию.</li>\n</ul>\n<ul>\n<li><strong>Знания и образование</strong> – знания о строении тела, принципах тренировки, здоровом образе жизни, питании. Физическая грамотность человека.</li>\n</ul>\n<ul>\n<li><strong>Эстетические ценности</strong> – красота движения, гармония тела, эстетика спорта. Физическая культура формирует культуру тела и движения.</li>\n</ul>\n<ul>\n<li><strong>Нравственные ценности</strong> – честная игра (fair play), уважение к сопернику, командный дух, воля к победе, дисциплина и самоконтроль.</li>\n</ul>\n<ul>\n<li><strong>Рекорды и достижения</strong> – результаты выдающихся спортсменов вдохновляют общество, задают ориентиры для развития.</li>\n</ul>\n<ul>\n<li><strong>Традиции и ритуалы</strong> – олимпийское движение, национальные виды спорта, спортивные праздники как часть культуры народа.</li>\n</ul>"},{"n":32,"t":"Роль самоконтроля на занятиях физической культурой. Дневник самоконтроля","ann":"ответ на этот вопрос раскрывает суть самоконтроля, влияние занятий на организм занимающихся. Объективные и субъективные показатели самоконтроля.","a":"<p><strong>1. Понятие самоконтроля</strong></p>\n<p><strong>Самоконтроль</strong> – это систематическое самостоятельное наблюдение человека за состоянием своего здоровья, физическим развитием и функциональным состоянием организма в процессе занятий физической культурой.</p>\n<p><strong>Самоконтроль позволяет:</strong></p>\n<ul>\n<li>отслеживать реакцию организма на физические нагрузки</li>\n</ul>\n<ul>\n<li>своевременно выявлять признаки переутомления или перетренированности</li>\n</ul>\n<ul>\n<li>корректировать интенсивность и объем нагрузок</li>\n</ul>\n<ul>\n<li>повышать осознанность и ответственность за свое здоровье</li>\n</ul>\n<p><strong>2. Влияние занятий физической культурой на организм</strong></p>\n<ul>\n<li>Позитивное (при правильной нагрузке) — сердечно-сосудистая система, мышцы, обмен веществ, сон, иммунитет</li>\n</ul>\n<ul>\n<li>Негативное (при чрезмерной) — переутомление, нарушение сна, раздражительность, риск травм</li>\n</ul>\n<p><strong>3. Показатели самоконтроля</strong></p>\n<p><strong>Субъективные показатели - </strong>оцениваются на основе личных ощущений человека:<strong> </strong>самочувствие, настроение, сон, аппетит, желание тренироваться, болевые ощущения.</p>\n<p><strong>Объективные показатели - </strong>измеряются конкретными числовыми значениями:<strong> </strong>давление, масса тела, частота дыхания, а также мышечная сила.</p>\n<p><strong>4. Дневник самоконтроля</strong></p>\n<p><strong>Дневник самоконтроля</strong> – это личный документ, в котором систематически фиксируются показатели состояния здоровья и реакции организма на физические нагрузки.</p>\n<p><strong>Правила ведения дневника:</strong></p>\n<ul>\n<li>записи делаются <strong>регулярно</strong>, желательно ежедневно</li>\n</ul>\n<ul>\n<li>измерения проводятся в <strong>одно и то же время</strong></li>\n</ul>\n<ul>\n<li>данные фиксируются <strong>честно</strong>, без приукрашивания</li>\n</ul>\n<ul>\n<li>при ухудшении показателей нагрузку снижают или делают перерыв</li>\n</ul>"},{"n":33,"t":"Здоровый образ жизни. Основные компоненты здорового образа жизни","ann":"Определить ЗОЖ. Принципы ЗОЖ. Компоненты: рациональное питание, физическая активность, режим дня, отказ от вредных привычек.","a":"<p><strong>1. Понятие здорового образа жизни</strong></p>\n<p><strong>Здоровый образ жизни (ЗОЖ)</strong> – это способ жизнедеятельности человека, направленный на сохранение и укрепление здоровья, профилактику заболеваний и продление активной жизни через соблюдение определенных норм, правил и ограничений в повседневном поведении. ВОЗ определяет здоровье не просто как отсутствие болезней, а как <strong>состояние полного физического, психического и социального благополучия</strong>.</p>\n<p><strong>2. Принципы здорового образа жизни</strong></p>\n<ul>\n<li><strong>Системность и регулярность</strong> – ЗОЖ постоянный стиль жизни. Эпизодические усилия не дают устойчивого результата.</li>\n</ul>\n<ul>\n<li><strong>Индивидуальность</strong> – нормы и режимы подбираются с учетом возраста, пола, состояния здоровья и образа жизни конкретного человека.</li>\n</ul>\n<ul>\n<li><strong>Комплексность</strong> – все компоненты ЗОЖ взаимосвязаны. Невозможно компенсировать вредные привычки только спортом или правильным питанием.</li>\n</ul>\n<ul>\n<li><strong>Позитивная направленность</strong> – ЗОЖ строится на осознанном стремлении к качеству жизни и благополучию.</li>\n</ul>\n<p><strong>3. Направленность здорового образа жизни</strong></p>\n<ul>\n<li><strong>Сохранение здоровья</strong> – поддержание достигнутого уровня физического и психического состояния, предотвращение его ухудшения.</li>\n</ul>\n<ul>\n<li><strong>Укрепление здоровья</strong> – активное повышение резервов организма, иммунитета, физических возможностей.</li>\n</ul>\n<ul>\n<li><strong>Развитие личности</strong> – через заботу о здоровье человек развивает дисциплину, волю, ответственность и осознанность.</li>\n</ul>\n<p><strong>4. Основные компоненты здорового образа жизни</strong></p>\n<ul>\n<li>Рациональное питание</li>\n</ul>\n<ul>\n<li>Физическая активность</li>\n</ul>\n<ul>\n<li>Режим труда и отдыха</li>\n</ul>\n<ul>\n<li>Отказ от вредных привычек</li>\n</ul>\n<ul>\n<li>Личная гигиена</li>\n</ul>\n<ul>\n<li>Психологическое здоровье и управление стрессом</li>\n</ul>"},{"n":34,"t":"Теоретические основы безопасной жизнедеятельности","ann":"Объект и область изучения. Классификация опасных и вредных факторов. Критерии безопасности и комфортности. Методы обеспечения безопасности жизнедеятельности. Структура и задачи безопасности жизнедеятельности.","a":"<p><strong>1. Объект и область изучения БЖД</strong></p>\n<p><strong>Безопасность жизнедеятельности (БЖД)</strong> – это наука о комфортном и безопасном взаимодействии человека со средой обитания, а также о защите от опасных и вредных факторов.</p>\n<p><strong>Объект изучения БЖД</strong> – взаимодействие человека с окружающей его средой (природной, техногенной, социальной).</p>\n<p><strong>Область изучения – </strong>безопасность в разных сферах.</p>\n<p><strong>2. Классификация опасных и вредных факторов</strong></p>\n<ul>\n<li><strong>Физические факторы</strong> – разрушающиеся конструкции, движущиеся машины и тд</li>\n</ul>\n<ul>\n<li><strong>Химические факторы</strong> – токсичные вещества, газы, пары, пыль, кислоты, щелочи.</li>\n</ul>\n<ul>\n<li><strong>Биологические факторы</strong> – бактерии, вирусы, грибки</li>\n</ul>\n<ul>\n<li><strong>Психофизиологические факторы</strong> – физические/нервно-психические перегрузки</li>\n</ul>\n<p><strong>3. Критерии безопасности и комфортности</strong></p>\n<p>допустимый риск, оптимальные параметры микроклимата, достаточный уровень освещенности, допустимый уровень шума, отсутствие вредных веществ в воздухе, эргономичность рабочего места.</p>\n<p><strong>4. Методы обеспечения безопасности жизнедеятельности</strong></p>\n<ul>\n<li>Разделение человека и источника опасности</li>\n</ul>\n<ul>\n<li>Устранение или снижение опасных факторов</li>\n</ul>\n<ul>\n<li>Обучение, инструктажи, использование средств индивидуальной защиты (СИЗ).</li>\n</ul>\n<ul>\n<li>Сочетание всех трех методов как наиболее эффективный подход.</li>\n</ul>\n<p><strong>5. Структура и задачи безопасности жизнедеятельности</strong></p>\n<p><strong>Структура:</strong></p>\n<ul>\n<li>Теоретические основы</li>\n</ul>\n<ul>\n<li>Производственная безопасность (охрана труда)</li>\n</ul>\n<ul>\n<li>Экологическая безопасность</li>\n</ul>\n<ul>\n<li>Безопасность в чрезвычайных ситуациях (ЧС)</li>\n</ul>\n<ul>\n<li>Бытовая безопасность</li>\n</ul>\n<p><strong>Задачи:</strong></p>\n<ul>\n<li>Идентификация опасностей</li>\n</ul>\n<ul>\n<li>Оценка риска</li>\n</ul>\n<ul>\n<li>Разработка защитных мер</li>\n</ul>\n<ul>\n<li>Ликвидация последствий</li>\n</ul>\n<ul>\n<li>Обучение и просвещение</li>\n</ul>"},{"n":35,"t":"Охрана труда в сфере профессиональной деятельности","ann":"Условия трудовой деятельности. Классификация условий труда по степени опасности и вредности. Тяжесть и напряженность труда. Рациональная организация рабочего места. Оздоровление воздушной среды рабочей зоны. Производственный микроклимат и его влияние на организм человека.","a":"<p><strong>Охрана труда – </strong>это система сохранения жизни и здоровья работников в процессе трудовой деятельности</p>\n<p><strong>Условия труда</strong> – это совокупность факторов производственной среды и трудового процесса, оказывающих влияние на здоровье и работоспособность человека в процессе трудовой деятельности.</p>\n<p><strong>Условия труда формируются под воздействием:</strong> технических факторов, санитарно-гигиенических факторов, организационных факторов, психофизиологических факторов, эстетических факторов.</p>\n<p><strong>Классификация условий труда по степени опасности и вредности</strong></p>\n<p><strong>1 класс – Оптимальные условия</strong></p>\n<p><strong>2 класс – Допустимые условия</strong></p>\n<p><strong>3 класс – Вредные условия</strong></p>\n<p><strong>4 класс – Опасные (экстремальные) условия</strong></p>\n<p><strong>Тяжесть труда</strong> – характеристика трудового процесса, отражающая физическую нагрузку на организм: нагрузку на опорно-двигательный аппарат, сердечно-сосудистую и дыхательную системы.</p>\n<p><strong>По тяжести труд делится на:</strong> легкий, средней тяжести, тяжелый.</p>\n<p><strong>Напряженность труда</strong> – характеристика трудового процесса, отражающая нагрузку на центральную нервную систему, органы чувств и эмоциональную сферу.<strong> </strong></p>"},{"n":36,"t":"Экологические аспекты безопасной жизнедеятельности","ann":"Основные проблемы защиты окружающей среды. Методы и средства защиты атмосферы. Методы и средства защиты гидросферы. Сбор и ликвидация твердых и жидких отходов. ","a":"<p><strong>1. Основные проблемы защиты окружающей среды</strong></p>\n<ul>\n<li><strong>Загрязнение атмосферы</strong> – выбросы промышленных предприятий, транспорта и энергетики насыщают воздух токсичными веществами.</li>\n</ul>\n<ul>\n<li><strong>Загрязнение гидросферы</strong> – сброс сточных вод, нефтепродуктов и химических веществ в водоемы.</li>\n</ul>\n<ul>\n<li><strong>Загрязнение почвы</strong> – захоронение отходов, применение пестицидов и утечки химикатов.</li>\n</ul>\n<ul>\n<li><strong>Истощение природных ресурсов</strong> – чрезмерная добыча полезных ископаемых, вырубка лесов</li>\n</ul>\n<ul>\n<li><strong>Накопление отходов</strong> – рост производства и потребления создает огромные объемы твердых и жидких отходов, которые общество не успевает перерабатывать.</li>\n</ul>\n<p><strong>2. Методы и средства защиты атмосферы</strong></p>\n<p><strong>Вредные выбросы в атмосферу</strong> – это газы, пары, пыль и аэрозоли, выделяемые промышленными предприятиями, транспортом и энергетическими установками.</p>\n<p><strong>Методы защиты: </strong>очистка газовых выбросов, перевод на экологически чистые источники энергии, нормирование выбросов, озеленение.</p>\n<p><strong>3. Методы и средства защиты гидросферы</strong></p>\n<p><strong>Методы очистки сточных вод: </strong>механическая очистка, химическая очистка, биологическая очистка, физико-химическая очистка.</p>\n<p><strong>4. Сбор и ликвидация твердых и жидких отходов</strong></p>\n<p><strong>Методы обращения с отходами: </strong>раздельный сбор отходов по видам, контролируемое размещение отходов на специально оборудованных полигонах с изоляцией от почвы и грунтовых вод, сжигание, переработка, компостирование, обезвреживание.</p>\n<p><strong> </strong></p>"},{"n":37,"t":"Адаптация лиц с ОВЗ на рабочем месте","ann":"Опишите основы адаптации лиц с ОВЗ на рабочем месте, особенности взаимодействия с лицами с ОВЗ во время профессиональной деятельности.","a":"<p><strong>Лица с ограниченными возможностями здоровья (ОВЗ)</strong> – люди, имеющие физические, психические, сенсорные или иные нарушения, которые в сочетании с различными барьерами могут препятствовать их полноценному участию в профессиональной деятельности.</p>\n<p><strong>Адаптация лиц с ОВЗ на рабочем месте</strong> – это комплекс мер по созданию условий, при которых человек с ОВЗ может эффективно выполнять профессиональные обязанности наравне с другими сотрудниками.</p>\n<p><strong>Основы адаптации лиц с ОВЗ</strong></p>\n<p><strong>Физическая адаптация</strong>: пандусы, лифты, широкие дверные проемы, специализированная мебель и оборудование, адаптированная оргтехника, специальное программное обеспечение и вспомогательные технологии.</p>\n<p><strong>Организационная адаптация</strong>: индивидуальный график работы и возможность удаленной работы, сокращенный рабочий день, дополнительные перерывы для отдыха.</p>\n<p><strong>Психологическая адаптация</strong>: назначение наставника для помощи в период адаптации, работа с коллективом для формирования инклюзивной культуры, устранение стигматизации и дискриминации.</p>\n<p><strong>Профессиональная адаптация</strong>: обучение с учетом особенностей восприятия информации, адаптированные учебные материалы.</p>\n<p><strong>Особенности взаимодействия с лицами с ОВЗ в профессиональной деятельности</strong></p>\n<p><strong>Уважение и равноправие</strong> – сотрудник с ОВЗ является полноценным членом коллектива. Недопустимы покровительственный тон, излишняя опека или, напротив, игнорирование его потребностей.</p>\n<p><strong>Прямое общение</strong> – обращаться следует непосредственно к человеку с ОВЗ, а не к его сопровождающему или сурдопереводчику.</p>\n<p><strong>Уточнение потребностей</strong> – не нужно догадываться, какая помощь нужна. Лучше прямо спросить: «Могу ли я вам помочь?» и уважать ответ.</p>\n<p><strong>Корректная терминология</strong> – рекомендуется использовать нейтральные формулировки: «человек с инвалидностью», «человек на коляске», избегая устаревших и обидных обозначений.</p>"},{"n":38,"t":"Правила поведения и этики при взаимодействии с лицами с ОВЗ","ann":"Опишите основы поведения и этики при взаимодействии с лицами с ОВЗ в профессиональной деятельности.","a":"<p><strong>Лица с ограниченными возможностями здоровья (ОВЗ)</strong> – люди, имеющие физические, психические, сенсорные или иные нарушения, которые в сочетании с различными барьерами могут препятствовать их полноценному участию в профессиональной деятельности.</p>\n<p><strong>Этика взаимодействия с лицами с ОВЗ</strong> – это система норм и правил поведения, основанных на уважении человеческого достоинства, равноправии и признании ценности каждой личности вне зависимости от ее физических или психических особенностей.</p>\n<p><strong>Общие правила поведения</strong></p>\n<ul>\n<li>Обращайтесь напрямую</li>\n</ul>\n<ul>\n<li>Спрашивайте о помощи напрямую, а не предполагайте</li>\n</ul>\n<ul>\n<li>Не акцентируйте внимание на особенностях</li>\n</ul>\n<ul>\n<li>Соблюдайте личное пространство</li>\n</ul>\n<ul>\n<li>Будьте терпеливы</li>\n</ul>\n<ul>\n<li>Не завершайте фразы за собеседника</li>\n</ul>\n<p><strong>Этика взаимодействия по типу нарушений</strong></p>\n<p><strong>С нарушениями слуха: </strong>перед разговором привлеките внимание легким прикосновением к плечу<strong>; </strong>говорите четко, не преувеличивая артикуляцию; не прикрывайте рот руками во время разговора; при необходимости используйте письменную речь; не кричите.</p>\n<p><strong>С нарушениями зрения: </strong>представляйтесь при каждой встрече<strong>; </strong>предупреждайте, когда уходите из комнаты<strong>; </strong>при сопровождении предлагайте руку, не берите человека самостоятельно<strong>; </strong>описывайте словами то, что показываете; не используйте указательные жесты.</p>\n<p><strong>С нарушениями опорно-двигательного аппарата: </strong>не опирайтесь на коляску и не толкайте ее без разрешения; заранее убедитесь в доступности места встречи; не предлагайте физическую помощь демонстративно на виду у всех.</p>\n<p><strong>С ментальными особенностями: </strong>используйте простые, четкие и короткие фразы<strong>; </strong>избегайте сарказма, двусмысленности и переносных выражений<strong>; </strong>не повышайте голос и не проявляйте раздражения<strong>; </strong>при необходимости повторите информацию спокойно и терпеливо.</p>"},{"n":39,"t":"Организация рабочего места и рабочего пространства для лиц с ОВЗ","ann":"Доступная среда. Эргономика. Технические средства реабилитации.","a":"<p><strong>Лица с ограниченными возможностями здоровья (ОВЗ)</strong> – люди, имеющие физические, психические, сенсорные или иные нарушения, которые в сочетании с различными барьерами могут препятствовать их полноценному участию в профессиональной деятельности.</p>\n<p><strong>Организация рабочего пространства</strong></p>\n<p><strong>Доступность здания и помещений </strong>(пандусы, подъемники, широкие дверные проемы, лифты, доступные сан. узлы с поручнями и достаточным пространством, отсутствие порогов, тактильные направляющие полосы)</p>\n<p><strong>Организация пространства офиса: (</strong>свободные проходы, мебель не должна загромождать пути движения, зоны отдыха и ожидания)</p>\n<p><strong>Организация рабочего места по типу нарушений</strong></p>\n<p><strong>Для лиц с нарушениями опорно-двигательного аппарата: </strong>регулируемый по высоте стол, эргономичное кресло с регулировкой высоты, все рабочие материалы и оборудование располагаются в зоне досягаемости, голосовое управление компьютером.</p>\n<p><strong>Для лиц с нарушениями зрения: </strong>программы экранного чтения, дисплей Брайля для работы с текстом, программы увеличения изображения на экране, высококонтрастное оформление интерфейсов, достаточная освещенность рабочей зоны без бликов, документы в аудиоформатах.</p>\n<p><strong>Для лиц с нарушениями слуха:</strong> световые сигналы вместо звуковых, субтитры и текстовые дублирования, мессенджеры и чаты как основные каналы рабочей коммуникации, видеосвязь с возможностью подключения сурдопереводчика.</p>\n<p><strong>Для лиц с ментальными особенностями:</strong> тихое, спокойное рабочее место с минимумом отвлекающих факторов; четкое зонирование пространства – рабочая зона, зона отдыха, предсказуемая и стабильная организация рабочего места, наглядные инструкции и схемы на рабочем месте.</p>"},{"n":40,"t":"Основные понятия регулирования рекламного рынка","ann":"субъект, объект и цели правового регулирования рекламной деятельностью. Методы и средства государственного регулирования. Участники рекламной деятельности.","a":"<p><strong>Субъект</strong> правового регулирования: рекламодатели, рекламопроизводители, рекламораспространители, потребители рекламы, органы саморегулирования в сфере рекламной деятельности, госорганы, осуществляющие регулирование и контроль рекламной деятельности.</p>\n<p><strong>Объект</strong> – общественные отношения, складывающиеся в процессе рекламной деятельности.</p>\n<p><strong>Цели правового регулирования</strong>:</p>\n<ul>\n<li>защита от недобросовестной конкуренции в области рекламы;</li>\n</ul>\n<ul>\n<li>предотвращение и пресечения ненадлежащей рекламы, способной ввести потребителей рекламы в заблуждение;</li>\n</ul>\n<ul>\n<li>предотвращение рекламы, способной нанести вред здоровью граждан, имуществу граждан или юридических лиц, окружающей среде либо вред чести, достоинству или деловой репутации указанных лиц, посягающей на общественные интересы, принципы гуманности и морали.</li>\n</ul>\n<p><strong>Методы регулирования разделяются на</strong>:</p>\n<ul>\n<li><strong>прямые:</strong> контроль над монополиями, разработка стандартов, их поддержание (знаки качества, государственные стандарты)</li>\n</ul>\n<ul>\n<li><strong>косвенные </strong>(денежная политика, контроль за доходами, социальная политика)</li>\n</ul>\n<ul>\n<li><strong>внешнеэкономическое регулирование</strong></li>\n</ul>\n<p><strong>Основные инструменты (средства) государственного регулирования</strong>: налоговая политика (политика в области правовых расходов и налогов), денежная политика, политика регулирования доходов, соц. политика, госрегулирование ценообразования, внешнеэкономическое регулирование.</p>\n<p><strong>Участники рекламной деятельности</strong>: рекламопроизводитель, рекламораспространитель, рекламодатель и потребитель рекламы.</p>"},{"n":41,"t":"Искусство Древнего мира, Средневековья и возрождения","ann":"раскрыть понятие «искусство», «искусство Древнего мира», искусство древнего Рима, искусство древнего Египта. Зарождение искусства средневековья. Искусство эпохи Возрождения.","a":"<p><strong>Искусство</strong><strong> – </strong>форма человеческой деятельности, художественное творчество, проявляющееся в различных его видах: живописи, архитектуре, скульптуре, литературе, музыке, танцах, театральных постановках и т. д.</p>\n<p><strong>Искусство Древнего мира</strong> – это совокупность художественных произведений и творческой деятельности древних цивилизаций, охватывающая период от появления первых государств до падения Западной Римской империи.</p>\n<p><strong>Искусство Древнего Египта</strong> – одна из самых ранних форм искусства в мире. Оно было создано около 3000 года до нашей эры и отличается строгостью и геометрией форм. Основной темой древнеегипетского искусства были религиозные мотивы и образы богов. К числу произведений относят пирамиды-гробницы, статуи фараонов и богов, рельефы и фрески, украшающие стены пирамид и храмов, а также вазы, украшения.</p>\n<p><strong>Искусство Древнего Рима</strong> – сочетание практичности и торжественности. Римляне строили величественные общественные здания, такие как Колизей и Пантеон, а также создавали впечатляющие мозаики и фресковые картины, появилось понятие романа. К числу самых знаменитых произведений античного искусства относятся статуи Афродиты, Венеры, а также архитектурные шедевры, такие как Аполлон Театрон и Храм Зевса Олимпийского.</p>\n<p><strong>Искусство Древней Греции</strong> – художники воспевали красоту тела и мифических богов, создавали огромные гипсовые, мраморные и бронзовые скульптуры и изысканные барельефы с изображением героев. В скульптуре был разработан канон человеческой фигуры. В станковой живописи появились жанровые сцены и утвердился иллюзионизм. Центром искусства были Афины. Был придуман театр.</p>\n<p><strong>Зарождение искусства Средневековья</strong>: Оно характеризуется религиозными мотивами и использованием символизма. Основными видами искусства были церковная архитектура, скульптура и иллюминированные манускрипты. Архитектура в Средние века была сосредоточена вокруг строительства церквей и соборов, таких как Собор Парижской Богоматери и Кельнский собор.</p>\n<p><strong>Искусство эпохи Возрождения</strong>: Возродился интерес к античной культуре, пейзажу, человек изображается реалистично, появляются портреты обычных людей (светских лиц), а не только святых. Изучается перспектива, композиция. Художники уделяют внимание изучению анатомии, чтобы достоверно изобразить человека. Среди самых выдающихся художников эпохи Возрождения можно назвать Леонардо да Винчи, Рафаэля и Микеланджело. Их работы, такие как Мона Лиза, Сикстинская капелла и Давид, стали символами искусства Ренессанса.</p>"},{"n":42,"t":"Искусство Нового времени. Современное искусство","ann":"Историко-художественные фазы и основные направления эпохи: барокко, классицизм, реализм. Эпоха просвещения. Современное искусство.","a":"<p><strong>Основные фазы и направления искусства</strong>:</p>\n<p><strong>Барокко</strong>. (Италия, конец 16в. – середина 18в.) Главная цель – <em>стремление удивить</em>, вызвать изумление. Главными темами искусства были <em>мучения и страдания человека</em>, мистические аллегории, соотношение добра и зла, жизни и смерти, любви и ненависти, жажды наслаждений и расплаты за них.</p>\n<p><strong>Классицизм</strong>. Направление в искусстве на смену барокко (середина 17- начало 19в.). В основе классицизма лежит <em>идея разумности, упорядоченности мира</em>. Человек понимается как существо прежде всего разумное, а человеческое общество – как рационально устроенный механизм.</p>\n<p><strong>Реализм</strong>. Предметом изображения становилась, как правило, действительность «здесь и сейчас». Основная задача - дать как можно более объективную картину современной действительности.</p>\n<p><strong>Эпоха просвещения</strong>. 18 в. Для нее характерны идеи уважения человеческого достоинства, свободы и счастья, а также стремление к логике и порядку. В живописи доминировал стиль неоклассицизма, который отличался четкостью линий, использованием симметрии и строгой композицией.</p>\n<p><strong>Современное искусство</strong>. Отличается отходом от традиционных художественных условностей, исследование новых техник, материалов и концепций. Современное искусство охватывает широкий спектр стилей, включая минимализм, кубизм, сюрреализм, фотореализм и др.</p>\n<p><strong>Минимализм</strong> – художественное движение, зародившееся в 1960-х годах. Для него характерны произведения искусства с несложными элементами, часто состоящими из геометрических фигур, лишенных репрезентативного содержания.</p>\n<p><strong>Фотореализм</strong> – это жанр искусства, целью которого является создание произведения, максимально приближенного к реальности.</p>\n<p><strong>Кубизм</strong> – это модернистское направление живописи, изображающее композицию в виде примитивных геометрических фигур.</p>"},{"n":43,"t":"Художественные стили: характерные особенности и произведения искусства","ann":"реализм, кубизм, абстракционизм, поп-арт, графика, сюрреализм.","a":"<p><strong>Характерные особенности художественных стилей с примерами</strong>:</p>\n<p><strong>Реализм</strong> – стремление изображать жизнь такой, какая она есть, с максимальной точностью и детализацией. Художники сосредоточены на реальных людях, местах и событиях.</p>\n<p><strong><em>Черты</strong><strong>:</em> детализация, натуральные цвета, темы повседневной жизни.</p>\n<p></strong><em>Примеры<strong></em><em>:</em> Илья Репин («Бурлаки на Волге»), Гюстав Курбе («Похороны в Орнане»).</p>\n<p></strong>Кубизм<strong> - модернистское направление живописи, изображающее композицию в виде примитивных геометрических фигур.</p>\n<p></strong><em>Черты:<strong></em> сосредоточенность на геометрических формах, разложение объектов на составляющие элементы.</p>\n<p></strong><em>Примеры<strong></em><em>:</em> Пикассо, Жорж Брак.</p>\n<p></strong>Абстракционизм<strong> - отказ от изображения реальных объектов и сосредоточенность на цветах, формах и линиях.</p>\n<p></strong><em>Черты:<strong></em> хаотичные узоры, сосредоточенность на чувствах и настроении.</p>\n<p></strong><em>Примеры<strong></em><em>:</em> В. Кандинский, Малевич, Пит Мондриан.</p>\n<p></strong>Поп<strong>-</strong>арт<strong> - сосредоточенность на массовой культуре, рекламе и повседневных объектах.</p>\n<p></strong><em>Черты<strong></em><em>:</em> яркие, насыщенные цвета, использование образов из поп-культуры, простота и четкие линии.</p>\n<p></strong><em>Примеры<strong></em><em>:</em> Энди Уорхол.</p>\n<p></strong>Графика<strong> - основными изобразительными средствами (графическими) являются свойства изобразительной поверхности и тональные отношения линий, штрихов и пятен.</p>\n<p></strong><em>Черты:<strong></em> четкость и простота, цветовая гармония, баланс и композиция. </strong><em>Представители:<strong></em> да Винчи, Серов В.А.</p>\n<p></strong>Сюрреализм<strong> - стиль, который исследует подсознание и сны, сочетает элементы реальности и фантазии.</p>\n<p></strong><em>Черты<strong></em><em>:</em> нереальные или мечтательные образы, элементы абсурда, сочетание неожиданных объектов.</p>\n<p></strong><em>Примеры</em><em>*</em>:* Сальвадор Дали</p>"},{"n":44,"t":"Этапы развития теории и практики рекламы. Древность, средневековье, новое время","ann":"История рекламы в России и мире. Понятие реклама, виды рекламы: печатная реклама, телевизионная реклама, радио реклама, наружная реклама, интернет реклама.","a":"<p><strong> </strong></p>\n<p><strong>Реклама</strong> – это информация, распространенная любым способом, в любой форме и с использованием любых средств, адресованная неопределенному кругу лиц и направленная на привлечение внимания к объекту рекламирования, формирование или поддержание интереса к нему и его продвижение на рынке.</p>\n<p><strong>Виды рекламы</strong>:</p>\n<p><strong>Печатная реклама</strong> – газеты, журналы, листовки, каталоги, буклеты. Старейший вид после устной.</p>\n<p><strong>Телевизионная реклама</strong> – ролики в рекламных блоках, спонсорство, product placement.</p>\n<p><strong>Радиореклама</strong> – аудиоролики, джинглы, спонсорство программ.</p>\n<p><strong>Наружная реклама</strong> – билборды, ситилайты, баннеры, реклама на транспорте, цифровые экраны.</p>\n<p><strong>Интернет-реклама</strong> – баннеры, контекстная реклама (Яндекс, Google), таргетированная реклама в соцсетях, нативная реклама, видеореклама (pre-roll).</p>\n<p><strong> </strong></p>\n<p><strong>История рекламы в России</strong>:</p>\n<ul>\n<li>Зарождение рекламного дела относят к 10–11 вв. Купцы предлагали свои товары, используя зазывал и коробейников.</li>\n</ul>\n<ul>\n<li>Первая российская печатная реклама появилась в 18 веке в «Ведомостях» Петра I. Рекламные тексты того времени носили справочный, деловой характер.</li>\n</ul>\n<ul>\n<li>В 19в. рекламу начали размещать на круглых тумбах, установленных в различных частях города, в трамваях.</li>\n</ul>\n<ul>\n<li>После 1917 года реклама была монополизирована государством. В конце 20-х – 30-е годы советская реклама фактически слилась с пропагандой. Большинство плакатов, иных рекламных продуктов, адресованных к массовому потребителю, стали содержать в себе идеологические черты.</li>\n</ul>\n<ul>\n<li>В 60–80-е годы советская реклама постепенно стала приближаться к принятым в то время мировым стандартам.</li>\n</ul>\n<ul>\n<li>С 1991 года начался стремительный рост рекламного бизнеса в России.</li>\n</ul>\n<p><strong>История рекламы в мире</strong>:</p>\n<ul>\n<li>Первые рекламные тексты, отдаленно напоминающие современную рекламу, появились в Древнем Египте и Древней Греции. Объявления были очень просты и носили в основном информационный характер. (3 в. до н.э. на камне: «Я, Рино с острова Крит, по воле богов толкую сновидения»)</li>\n</ul>\n<ul>\n<li>В Средние века появился институт глашатаев и гонцов, некоторые из них могли принимать заявки от населения. Приобрела широкий размах устная реклама.</li>\n</ul>\n<ul>\n<li>В начале 17в.в Европе появились 1е регулярные издания. Они публиковали новости и объявления в различных пропорциях.</li>\n</ul>\n<ul>\n<li>В середине 19в. в Германии издали книгу «Как писать рекламные объявления». Этот момент считается зарождением современного маркетинга</li>\n</ul>\n<ul>\n<li>Первая реклама по радио вышла в эфир в 1920-е годы, а первая телереклама – в 1930-е годы.</li>\n</ul>\n<ul>\n<li>Повсеместное распространение теле- и радиорекламы началось после окончания Второй мировой войны, когда было налажено массовое производство радиоприемников и телевизоров. Интернет-реклама появилась в 1993 году.</li>\n</ul>"},{"n":45,"t":"Рабочие мероприятия в связях с общественностью (виды, особенности)","ann":"Рабочие мероприятия, проводимые компанией в целях формирования позитивного имиджа организации и привлечения внимания общественности к самой компании, ее деятельности и продуктам. Для реализации указанных возможностей PR-потенциала специального общественного мероприятия, оно должно отвечать нескольки","a":"<p><strong>PR-мероприятие</strong> – это специально организованное событие, направленное на формирование позитивного имиджа организации, привлечение внимания общественности и СМИ к компании, ее деятельности и продуктам.</p>\n<p><strong>Пресс-конференция</strong><strong> - </strong>встреча представителей компании с журналистами для передачи важной информации и ответов на вопросы: проводится при наличии значимого информационного повода<strong>, </strong>обязательны пресс-кит и раздаточные материалы<strong>, </strong>завершается фуршетом или индивидуальными интервью.</p>\n<p><strong>Брифинг</strong> - краткая оперативная встреча с журналистами без вопросов или с минимальным их количеством<strong><em>:</strong><strong></em> </strong>длительность 15-20 мин, используется для срочных новостей или комментариев.</p>\n<p><strong>Презентация</strong> - публичное представление нового продукта, услуги, проекта или компании целевой аудитории: цель – не только информировать, но и убедить и произвести впечатление.</p>\n<p><strong>Церемония</strong><strong> - </strong>торжественное мероприятие, посвященное значимому событию в жизни компании или отрасли.</p>\n<p><strong><em>Виды:</strong></em> церемония открытия, награждения, вручения премий, подписания договоров.</p>\n<p><strong>Выставка</strong><strong> - </strong>публичная демонстрация продуктов, услуг или достижений компании в рамках тематического события.</p>\n<p><strong><em>Виды:</strong></em> отраслевые, международные, специализированные, корпоративные выставки.</p>\n<p><strong>Конференция</strong><strong> - </strong>профессиональное мероприятие для обмена знаниями, опытом и мнениями. Для формирования экспертного образа.</p>\n<p><strong>Пресс-тур</strong><strong> - </strong>организованная поездка журналистов, блогеров на объект компании: журналисты получают эксклюзивный опыт «из первых рук», фото, эмоциональная связь</p>"},{"n":46,"t":"Этика массовых коммуникаций. Принципы и критерии этичности рекламы","ann":"основы этики в массовых коммуникациях. Социальная ответственность рекламы: понятие, роль, функции. Этическая, нравственная, культурная составляющие рекламы. Принципы и критерии этичности рекламы. Принципы и критерии этичности рекламы и PR. Последствия нарушения этических принципов в рекламной и PR-д","a":"<p><strong>Массовые коммуникации —</strong> это систематическое распространение информации среди множества рассредоточенных людей с помощью технических средств.</p>\n<p><strong>Основы этики в массовых коммуникациях</strong>:</p>\n<p>— честность;</p>\n<p>— конфиденциальность;</p>\n<p>— отсутствие конфликта интересов;</p>\n<p>— проверка фактов.</p>\n<p><strong>Социальная ответственность рекламы</strong> – это концепция, согласно которой рекламные сообщения должны быть разработаны и распространены с учетом их воздействия на общество.</p>\n<p><strong>Функции СО рекламы</strong>: этическая, информационная, образовательная, социальная. <strong>ЭИОС</strong></p>\n<p><strong>Составляющие рекламы</strong>:</p>\n<ul>\n<li><strong>Этическая</strong>: отсутствие обмана или пропаганды насилия</li>\n</ul>\n<ul>\n<li><strong>Нравственная</strong>: р должна быть честной, нести позитивное сообщение;</li>\n</ul>\n<ul>\n<li><strong>Культурная</strong>. должна учитывать культурные особенности и традиции различных групп потребителей.</li>\n</ul>\n<p><strong>Принципы этичности рекламы</strong>: истина и точность, честность, уважение достоинства, социальная ответственность, экологическая ответственность.</p>\n<p><strong>Критерии этичности рекламы</strong>: достоверная информация о товаре; соблюдение обещаний; формирование позитивного образа товара у потребителя</p>\n<p><strong>Последствия нарушения этических принципов в рекламной и PR-деятельности</strong>: потеря доверия потребителей, юридические последствия, публичное осуждение, ущерб репутации.</p>"},{"n":47,"t":"Типовые эффекты и последствия профессиональной деятельности специалистов по рекламе и по связям с общественностью","ann":"содержание профессиональной деятельности специалиста по рекламе, PR-специалиста. Функции специалистов по рекламе и PR. Доминирующие виды деятельности и круг решаемых задач. Требования к специалисту по связям с общественностью, профессиональные и личностные качества. Эффекты и последствия профессиона","a":"<p><strong>Содержание профессиональной деятельности специалиста по рекламе, PR-специалиста</strong>: управление потоками информации, прямые и косвенные продажи, избирательные и политические процессы, социальные и культурные проекты.</p>\n<p><strong>Функции специалистов PR</strong>:</p>\n<ul>\n<li><strong>Коммуникационная</strong>. Создание эффективной коммуникационной инфраструктуры организации, обеспечение внутренней и внешней коммуникации, формирование и поддержание корп. культуры.</li>\n</ul>\n<ul>\n<li><strong>Рекламно-информирующая</strong>. Разработка, подготовка к выпуску, производство и распространение рекламной продукции.</li>\n</ul>\n<ul>\n<li><strong>Рекламно-исследовательская и прогнозно-аналитическая</strong>. Проведение маркетинговых исследований для составления прогноза развития рынка, его емкости и динамики спроса и предпочтений потребителей.</li>\n</ul>\n<ul>\n<li><strong>Проектная</strong>. Участие в проектировании программ и отдельных мероприятий в области рекламы и связей с общественностью, обеспечение средств и методов реализации проектов.</li>\n</ul>\n<p><strong>Доминирующие виды деятельности и круг решаемых задач</strong>: создание и поддержание благоприятного имиджа компании, налаживание информационных потоков; работа с прессой, предоставление специально подготовленных сведений СМИ от лица компании; разработка, планирование, бюджетирование и реализация коммуникационных стратегий, проектов и пр.</p>\n<p><strong>Требования к специалисту по связям с общественностью</strong>: профессиональная грамотность, умение вдумчиво говорить, владение ПК, владение базовыми принципами рынка рекламы, профессиональная компетентность, желание развиваться, умение организовывать, руководить командой.</p>\n<p><strong>Эффекты и последствия ПД специалистов по рекламе и по связям с общественностью</strong>:</p>\n<p><strong><em>Эффекты</strong></em>: увеличение узнаваемости бренда, улучшение репутации, увеличение продаж.</p>\n<p><strong><em>Последствия</strong></em>: ущерб репутации, юр. проблемы, потеря клиентов, негативное воздействие на общество.</p>"},{"n":48,"t":"Маркетинговая информация и маркетинговая информационная система (МИС) организации.  Виды и процесс маркетинговых исследований","ann":"При ответе на вопрос дайте определение «маркетинговая информационная система» (МИС), укажите ее составляющие. Назовите виды и источники маркетинговой информации. Далее следует остановиться на понятии маркетингового исследования, гипотезе маркетинговых исследований. Описать направления маркетинговых ","a":"<p><strong>Маркетинговая информация </strong>— это любые данные о состоянии рынка, поведении покупателей, действиях конкурентов и внутренней среде компании.</p>\n<p><strong>Виды и источники маркетинговой информации:</strong></p>\n<ul>\n<li><strong><em>По характеру происхождения:</strong></em></li>\n</ul>\n<p><strong>первичная информация</strong> – содержит сведения и данные, полученные из опросов, личных бесед, деловых встреч</p>\n<p><strong>вторичная информация</strong> – получают из статистики, справочного, аналитического материала.</p>\n<ul>\n<li><strong><em>По источнику:</strong></em></li>\n</ul>\n<p><strong>внутренние</strong> – данные самой компании</p>\n<p><strong>внешние</strong> – данные из открытых и коммерческих источников</p>\n<p><strong>Маркетинговая информационная система (МИС)</strong> – это организованная совокупность процедур, методов и ресурсов для сбора, анализа и передачи достоверной информации, необходимой для принятия маркетинговых решений.</p>\n<p><strong>Составляющие МИС:</strong></p>\n<ul>\n<li>данные внутри компании: объемы продаж, складские остатки, клиентская база, финансовые показатели.</li>\n</ul>\n<ul>\n<li>регулярный сбор текущей информации о внешней среде: мониторинг конкурентов, СМИ, отраслевых новостей, поведения потребителей.</li>\n</ul>\n<ul>\n<li>целенаправленный сбор и анализ данных для решения конкретных маркетинговых задач.</li>\n</ul>\n<ul>\n<li>статистические методы, модели и инструменты обработки данных (SWOT-анализ, регрессионный анализ, сегментирование).</li>\n</ul>\n<p><strong>Маркетинговое исследование</strong> – это систематический сбор, обработка и анализ данных о рынке, потребителях, конкурентах и внешней среде с целью принятия обоснованных управленческих решений.</p>\n<p><strong>Гипотеза исследования</strong> – предположение о характере изучаемого явления, которое необходимо подтвердить или опровергнуть в ходе исследования.</p>\n<p><strong>Направления маркетинговых исследований:</strong></p>\n<ul>\n<li>Исследование рынка</li>\n</ul>\n<ul>\n<li>Исследование потребителей</li>\n</ul>\n<ul>\n<li>Исследование конкурентов</li>\n</ul>\n<ul>\n<li>Исследование товара</li>\n</ul>\n<ul>\n<li>Исследование рекламы и коммуникаций</li>\n</ul>\n<ul>\n<li>Исследование цен</li>\n</ul>\n<p><strong>Этапы маркетингового исследования</strong></p>\n<ul>\n<li>Определение проблемы и целей</li>\n</ul>\n<ul>\n<li>Разработка плана исследования</li>\n</ul>\n<ul>\n<li>Формулировка гипотез</li>\n</ul>\n<ul>\n<li>Сбор данных</li>\n</ul>\n<ul>\n<li>Анализ данных</li>\n</ul>\n<ul>\n<li>Интерпретация результатов и выводы</li>\n</ul>\n<ul>\n<li>Презентация результатов</li>\n</ul>\n<p>Важно этично собирать данные во время исследования.</p>"},{"n":49,"t":"Проведение кабинетных и полевых маркетинговых исследований: цели, виды, особенности организации","ann":"дать определение полевому маркетинговому исследованию, охарактеризовать методы сбора первичной информации: наблюдение, эксперимент, опрос. Описать преимущества и недостатки каждого метода. Дать определение кабинетным маркетинговым исследованиям. Следует привести характеристику традиционному анализу ","a":"<p><strong>Полевые исследования </strong></p>\n<p><strong>Полевое маркетинговое исследование</strong> – это сбор первичной информации непосредственно от источника (потребителей, участников рынка) с помощью специально разработанных методов.</p>\n<p><strong>Виды по охвату:</strong></p>\n<ul>\n<li>сплошное исследование.</li>\n</ul>\n<ul>\n<li>выборочное исследование</li>\n</ul>\n<p><strong>Методы сбора первичной информации:</strong></p>\n<ul>\n<li><strong>Наблюдение — </strong>фиксация поведения без прямого контакта с респондентом. Бывает: открытое и скрытое.</li>\n</ul>\n<p><strong>Плюсы: </strong>фиксирует реальное поведение, не зависит от желания респондента отвечать.</p>\n<p><strong>Минусы: </strong>не раскрывает мотивы поведения, трудоемко, ограничено по охвату.</p>\n<p><strong>Разновидность – «Тайный покупатель»</strong> – скрытое наблюдение за качеством обслуживания.</p>\n<ul>\n<li><strong>Эксперимент</strong> — исследователь намеренно изменяет одну переменную и фиксирует влияние на другую. Эксперимент подразделяют на: <strong>лабораторный</strong> (искусственно созданные условия) и <strong>полевой</strong> (реальные условия рынка).</li>\n</ul>\n<p><strong>Плюсы</strong>: позволяет установить причинно-следственные связи, высокая точность.</p>\n<p><strong>Минусы</strong>: дорого, сложно организовать, внешние факторы могут искажать результаты.</p>\n<ul>\n<li><strong>Опрос</strong> – прямое или опосредованное обращение к респондентам. Формы: анкетирование, интервью, фокус-группа.</li>\n</ul>\n<p><strong><em>Плюсы:</strong></em> широкий охват</p>\n<p><strong><em>Минусы:</strong></em> субъективность ответов, возможная неискренность респондентов</p>\n<p><strong>Виды вопросов в анкете:</strong></p>\n<ul>\n<li>Открытые</li>\n</ul>\n<ul>\n<li>Закрытые</li>\n</ul>\n<ul>\n<li>Шкальные</li>\n</ul>\n<p><strong>Кабинетные исследования </strong></p>\n<p><strong>Кабинетное исследование</strong> – это совокупность методов сбора и оценки маркетинговой информации, который заключается в работе с вторичными источниками (статистика, отчёты, документы).</p>\n<p><strong><em>Плюсы:</strong></em> низкая стоимость, быстрота</p>\n<p><strong><em>Минусы:</strong></em> данные могут быть устаревшими, неактуальными</p>\n<p><strong>Традиционный анализ</strong> – качественный метод изучения документов, основанный на понимании и интерпретации их содержания исследователем.</p>\n<p>Включает <strong>внешний анализ</strong> (контекст: автор, время, цель) и <strong>внутренний</strong> (смысл и достоверность). Минус метода — субъективность исследователя, компетентность.</p>\n<p><strong>Контент-анализ</strong> — формализованный количественный метод подсчёта заданных единиц содержания в текстах, СМИ, рекламе конкурентов, отзывах.</p>\n<p><strong>Алгоритм проведения контент-анализа:</strong></p>\n<ul>\n<li>Цели и задачи</li>\n</ul>\n<ul>\n<li>Формирование массива документов</li>\n</ul>\n<ul>\n<li>Определение единиц анализа (статей например)</li>\n</ul>\n<ul>\n<li>Разработка категорий анализа</li>\n</ul>\n<ul>\n<li>Составление кодировочной матрицы</li>\n</ul>\n<ul>\n<li>Кодирование материала</li>\n</ul>\n<ul>\n<li>Статистическая обработка</li>\n</ul>\n<ul>\n<li>Интерпретация и выводы</li>\n</ul>"},{"n":50,"t":"Вербальные, невербальные коммуникации, межличностная коммуникаций. Понятие, отличительные особенности, примеры","ann":"понятие вербальной коммуникации (устноречевая и письменноречевая) коммуникации, формы устноречевой коммуникации, охарактеризовать межличностную коммуникацию. Дать представление о типичных ситуациях межличностного общения и формах реагирования.","a":"<p><strong>Вербальная коммуникация</strong> – представляет собой словесное взаимодействие сторон и осуществляется с помощью знаковых систем, главной среди которых является язык.</p>\n<p><strong>Невербальная коммуникация</strong> - передача информации без использования слов, через несловесные сигналы (жесты, взгляд, позы). До 60–80% информации в живом общении передается невербально.</p>\n<p><strong>Устноречевая коммуникация</strong> - характеризуется довольно слабой подготовленностью, необратимостью, связью с конкретным временем и условиями протекания, автоматизмом в употреблении речевых средств и способов изложения информации.</p>\n<p><strong><em>Задача</strong></em>: добиться того, чтобы в сознании слушателя возникла та информация, которую выражал говорящий.</p>\n<p><strong><em>Формы:</strong></em> монолог, диалог, полилог, спор, полемика. (МДПСП)</p>\n<p><em>Монолог</em> - длительное, связное высказывание одного лица (доклад, лекция, рассказ, речь). Для монолога характерны большая протяженность реплик, композиционная сложность, смысловая завершенность, большая степень традиционности при выборе языковых средств.</p>\n<p><em>Диалог</em> - разговор между двумя лицами, характеризующийся сменой ролей говорящего и слушающего.</p>\n<p><em>Полилог </em>- общение нескольких лиц, обмен мнениями (беседа, дискуссия, совещание).</p>\n<p><em>Спор</em> - столкновение противоположных мнений с целью доказать свою правоту.</p>\n<p><em>Полемика</em> - острая публичная дискуссия по принципиальным вопросам. В отличие от спора цель полемики не просто победить, а переубедить аудиторию и найти истину.</p>\n<p><strong>Письменноречевая коммуникация</strong> - отличается большей подготовленностью независимостью от времени и условий протекания, употреблением более развернутых, литературно оформленных речевых оборотов. Задача — обеспечить точную передачу и восприятие информации независимо от времени и условий.</p>\n<p><strong>Межличностная коммуникация</strong> – это непосредственный обмен информацией, чувствами и смыслами между конкретными людьми в условиях прямого контакта.</p>\n<p><strong>Типичные ситуации межличностного общения: (ЗКДУП)</strong></p>\n<ul>\n<li><strong>Знакомство</strong> – установление первичного контакта.</li>\n</ul>\n<ul>\n<li><strong>Конфликтная ситуация</strong> – столкновение интересов или мнений.</li>\n</ul>\n<ul>\n<li><strong>Деловая беседа</strong> – обсуждение рабочих вопросов.</li>\n</ul>\n<ul>\n<li><strong>Ситуация убеждения</strong> – один участник стремится изменить позицию другого.</li>\n</ul>\n<ul>\n<li><strong>Ситуация поддержки</strong> – эмоциональная помощь в трудной ситуации.</li>\n</ul>\n<p><strong>Формы реагирования:</strong></p>\n<ul>\n<li><strong>Активное слушание</strong> – демонстрация внимания и понимания через кивки, уточняющие вопросы, перефразирование.</li>\n</ul>\n<ul>\n<li><strong>Эмпатическое реагирование</strong> – признание и принятие чувств собеседника.</li>\n</ul>\n<ul>\n<li><strong>Оценочное реагирование</strong> – выражение своей позиции и оценки ситуации.</li>\n</ul>\n<ul>\n<li><strong>Уклонение</strong> – избегание прямого ответа, перевод темы.</li>\n</ul>\n<ul>\n<li><strong>Агрессивное реагирование</strong> – деструктивная форма, разрушающая коммуникацию.</li>\n</ul>"},{"n":51,"t":"Состав коммуникационного процесса","ann":"дать определение коммуникационного процесса. Рассмотреть его составляющие. Коммуникационные барьеры (понятие, виды).","a":"<p><strong>Коммуникационный процесс</strong> – это процесс передачи информации от одного субъекта к другому с целью достижения взаимопонимания. Коммуникация считается успешной, когда получатель воспринял сообщение именно так, как задумал отправитель.</p>\n<p><strong>Составляющие коммуникационного процесса:</strong></p>\n<p>1. \t<strong>Источник (отправитель)</strong> – тот, кто формирует и отправляет сообщение. Им может быть человек, организация, СМИ.</p>\n<p>2. \t<strong>Кодирование</strong> – процесс перевода мысли или идеи в форму, пригодную для передачи: слова, образы, символы, жесты, текст.</p>\n<p>3. \t<strong>Сообщение</strong> – закодированная информация, которую отправитель передает получателю (текст, речь, видео, изображение).</p>\n<p>4. \t<strong>Канал</strong> – средство передачи сообщения.</p>\n<p>5. \t<strong>Декодирование</strong> – процесс интерпретации полученного сообщения получателем.</p>\n<p>6. \t<strong>Получатель</strong> – тот, кому адресовано сообщение.</p>\n<p>7. \t<strong>Обратная связь</strong> – реакция получателя на сообщение, которую он передает отправителю.</p>\n<p><strong>8.</strong> \t<strong>Шум</strong> – любые помехи, искажающие сообщение на любом этапе передачи.</p>\n<p><strong>Схема коммуникационного процесса:</strong></p>\n<p><strong>Источник → Кодирование → Сообщение → Канал → Декодирование → Получатель</strong></p>\n<p>← Обратная связь ←</p>\n<p>На каждом этапе возможен <strong>шум</strong>.</p>\n<p><strong>Коммуникационный барьер</strong> – это препятствие, мешающее эффективной передаче и восприятию информации, приводящее к искажению или потере смысла сообщения.</p>\n<p><strong>Виды барьеров: СПЯСОБ+Ф</strong></p>\n<ul>\n<li><strong>Физические барьеры</strong> – помехи в окружающей среде: шум, плохая связь, большое расстояние между участниками, технические неполадки.</li>\n</ul>\n<ul>\n<li><strong>Семантические барьеры</strong> – различия в понимании слов, терминов, символов. Возникают из-за профессионального жаргона, иностранных слов, двусмысленных формулировок.</li>\n</ul>\n<ul>\n<li><strong>Языковые барьеры</strong> – различия в языке или уровне владения им.</li>\n</ul>\n<ul>\n<li><strong>Психологические барьеры</strong> – внутренние установки, эмоции и предубеждения, мешающие восприятию.</li>\n</ul>\n<ul>\n<li><strong>Социокультурные барьеры</strong> – различия в культурных нормах, традициях, ценностях.</li>\n</ul>\n<ul>\n<li><strong>Организационные барьеры</strong> – препятствия, связанные со структурой организации: многоуровневая иерархия искажает информацию при передаче, информация теряется или задерживается.</li>\n</ul>\n<ul>\n<li><strong>Барьер статуса</strong> – психологическая дистанция между людьми разного социального или должностного положения.</li>\n</ul>"},{"n":52,"t":"Способы продвижения интернет-ресурсов. Поисковая оптимизация\tАннотация: Способы продвижения сайта в интернете (разные виды рекламы в интернете, а также SEO, почтовая рассылка и т.п.). Также следует дать определение, описать особенности, достоинства и недостатки одного из способов – поисковой оптимизации (SEO-продвижения). Рассмотреть, что такое внутренняя и внешняя оптимизация страниц","ann":"Способы продвижения сайта. SEO: особенности, достоинства, недостатки. Внутренняя и внешняя оптимизация.","a":"<p>1. \t<strong>Контекстная реклама</strong> – платные объявления в поисковых системах (Яндекс.Директ, Google Ads), показывающиеся по релевантным запросам пользователей.</p>\n<p>2. \t<strong>Баннерная реклама</strong> – графические объявления на сайтах-партнерах.</p>\n<p>3. \t<strong>Таргетированная реклама в социальных сетях</strong> – реклама ВКонтакте, Telegram и других платформах с точным таргетингом по демографии, интересам и поведению аудитории.</p>\n<p>4. \t<strong>SMM (Social Media Marketing)</strong> – продвижение через ведение страниц и сообществ в социальных сетях.</p>\n<p>5. \t<strong>Почтовая рассылка (Email-маркетинг)</strong> – отправка писем базе подписчиков с новостями, акциями, полезным контентом.</p>\n<p>6. \t<strong>Спам</strong> – массовая рассылка без согласия получателей.</p>\n<p>7. \t<strong>Вирусный маркетинг</strong> – создание контента, который пользователи добровольно распространяют сами (видео, мемы, флешмобы).</p>\n<p>8. \t<strong>Контент-маркетинг</strong> – привлечение аудитории через полезный контент: статьи, видео, подкасты, инфографика. Формирует экспертность и доверие к бренду.</p>\n<p>9. \t<strong>SEO (поисковая оптимизация)</strong> – продвижение сайта в органической выдаче поисковых систем.</p>\n<p><strong>SEO (Search Engine Optimization)</strong> – комплекс мер по улучшению сайта с целью повышения его позиций в органической выдаче поисковых систем по целевым запросам.</p>\n<p><strong>Особенности SEO:</strong></p>\n<ul>\n<li>результат достигается постепенно (от нескольких недель до месяцев)</li>\n</ul>\n<ul>\n<li>эффект сохраняется долгосрочно даже без постоянных вложений</li>\n</ul>\n<ul>\n<li>требует технических знаний и систематической работы</li>\n</ul>\n<ul>\n<li>зависит от алгоритмов поисковых систем, которые регулярно обновляются</li>\n</ul>\n<p><strong>Плюсы SEO:</strong></p>\n<ul>\n<li>бесплатный органический трафик</li>\n</ul>\n<ul>\n<li>высокое доверие пользователей к органической выдаче</li>\n</ul>\n<ul>\n<li>долгосрочный эффект</li>\n</ul>\n<ul>\n<li>точное попадание в целевую аудиторию по запросам</li>\n</ul>\n<p><strong>Минусы SEO:</strong></p>\n<ul>\n<li>медленный результат</li>\n</ul>\n<ul>\n<li>зависимость от изменений алгоритмов поисковиков</li>\n</ul>\n<ul>\n<li>высокая конкуренция в популярных нишах</li>\n</ul>\n<ul>\n<li>требует постоянной работы и экспертизы</li>\n</ul>\n<p><strong>Внутренняя оптимизация (On-page SEO)</strong> – работа непосредственно с содержимым и технической структурой самого сайта.</p>\n<p><strong>Внешняя оптимизация (Off-page SEO)</strong> – работа за пределами сайта, направленная на повышение его авторитетности в глазах поисковых систем.</p>"},{"n":53,"t":"Одностраничные сайты. Сайты интернет-магазинов, структура и информационный состав сайта","ann":"«Продающая страница», «целевая страница», «посадочная страница», «промостраница» – landing page. Перечислить информацию, которая должна быть подготовлена для выкладки на сайте (о нас, каталог, контакты и т.д.). Основные требования, предъявляемые покупателями к организации интернет-магазинов.","a":"<p><strong>Landing page</strong> – это одностраничный сайт, созданный для достижения одной конкретной цели: побудить посетителя совершить целевое действие (купить, оставить заявку, подписаться, зарегистрироваться).</p>\n<ul>\n<li><strong>Продающая страница</strong> – акцент на совершении покупки</li>\n</ul>\n<ul>\n<li><strong>Целевая страница</strong> – страница под конкретную цель</li>\n</ul>\n<ul>\n<li><strong>Посадочная страница</strong> – страница, на которую «приземляется» пользователь после клика на рекламу</li>\n</ul>\n<ul>\n<li><strong>Промостраница</strong> – страница для продвижения конкретного продукта или акции</li>\n</ul>\n<p><strong>Структура эффективного landing page:</strong></p>\n<p>1. \t<strong>Первый экран</strong> – самая важная часть, видимая без прокрутки:</p>\n<ul>\n<li>цепляющий заголовок с главным преимуществом</li>\n</ul>\n<ul>\n<li>подзаголовок с уточнением предложения</li>\n</ul>\n<ul>\n<li>качественное изображение продукта или услуги</li>\n</ul>\n<ul>\n<li>кнопка призыва к действию</li>\n</ul>\n<p>2. \t<strong>Блок с преимуществами</strong> – почему стоит выбрать именно этот продукт, 3–6 ключевых выгод с иконками.</p>\n<p>3. \t<strong>Описание продукта/услуги</strong> – подробная информация о том, что получает клиент.</p>\n<p>4. \t<strong>Отзывы доказательства</strong> – отзывы покупателей, рейтинги, логотипы клиентов, количество продаж.</p>\n<p>5. \t<strong>Блок доверия</strong> – гарантии, сертификаты, награды, условия возврата.</p>\n<p>6. \t<strong>Форма захвата / кнопка CTA</strong> – повторяется несколько раз по странице.</p>\n<p>7. \t<strong>Футер</strong> – контакты, реквизиты, политика конфиденциальности.</p>\n<p><strong>Интернет-магазин</strong> – многостраничный сайт, обеспечивающий полный цикл онлайн-торговли: от представления товаров до оформления и оплаты заказа.</p>\n<p><strong>Структура сайта интернет-магазина:</strong></p>\n<p>1. \t<strong>Главная страница</strong> – витрина магазина. Содержит: акции и специальные предложения, популярные категории товаров, новинки, преимущества магазина, баннеры.</p>\n<p>2. \t<strong>Каталог товаров</strong> – иерархическая структура категорий и подкатегорий. Должен быть логичным и удобным для навигации.</p>\n<p>3. \t<strong>Карточка товара</strong> – ключевая страница интернет-магазина. Обязательные элементы:</p>\n<ul>\n<li>качественные фото с нескольких ракурсов</li>\n</ul>\n<ul>\n<li>подробное описание и характеристики</li>\n</ul>\n<ul>\n<li>цена, наличие, варианты (размер, цвет)</li>\n</ul>\n<ul>\n<li>кнопка «В корзину» / «Купить»</li>\n</ul>\n<ul>\n<li>отзывы покупателей</li>\n</ul>\n<ul>\n<li>похожие товары</li>\n</ul>\n<p>4. \t<strong>Страница «О нас»</strong> – история компании, миссия, команда, достижения. Формирует доверие к магазину.</p>\n<p>5. \t<strong>Контакты</strong> – адрес, телефон, email, карта, режим работы, форма обратной связи.</p>\n<p>6. \t<strong>Доставка и оплата</strong> – подробная информация об условиях, сроках, стоимости доставки и доступных способах оплаты.</p>\n<p>7. \t<strong>Гарантии и возврат</strong> – условия возврата и обмена товара, гарантийные обязательства.</p>\n<p>8. \t<strong>Корзина и оформление заказа</strong> – простой и понятный процесс: корзина → данные покупателя → доставка → оплата → подтверждение.</p>\n<p>9. \t<strong>Личный кабинет</strong> – история заказов, избранное, персональные данные, бонусы.</p>\n<p>10.  <strong>Блог / FAQ</strong> – полезный контент для SEO и ответы на частые вопросы.</p>\n<p><strong>Основные требования покупателей к интернет-магазину:</strong></p>\n<ul>\n<li>Удобство навигации</li>\n</ul>\n<ul>\n<li>Полнота информации о товаре</li>\n</ul>\n<ul>\n<li>Прозрачность цен и условий</li>\n</ul>\n<ul>\n<li>Простота оформления заказа</li>\n</ul>\n<ul>\n<li>Разнообразие способов оплаты</li>\n</ul>\n<ul>\n<li>Надежность и безопасность</li>\n</ul>\n<ul>\n<li>Скорость работы сайта</li>\n</ul>\n<ul>\n<li>Юзабилити сайта</li>\n</ul>\n<ul>\n<li>Качественная служба поддержки</li>\n</ul>"},{"n":54,"t":"SEO-продвижение, SMM и E-mail маркетинг в структуре интернет-маркетинговых коммуникаций","ann":"При ответе на этот вопрос необходимо продемонстрировать знание основ SEO-продвижения, SMM и E-mail маркетинга, понимание их ролей в интернет-маркетинге. Следует раскрыть особенности работы с данными инструментами и способы оценки их эффективности.","a":"<p><h4><strong>SEO</strong> (Search Engine Optimization) — комплекс работ по оптимизации сайта для повышения позиций в органической выдаче. В интернет-маркетинге обеспечивает долгосрочный органический трафик без затрат на рекламу.</h4></p>\n<p><strong>Ключевые понятия: </strong>семантическое ядро (ВЧ/СЧ/НЧ запросы), сниппет, заголовки H1–H6, посадочная страница, юзабилити, технический аудит.</p>\n<p><strong>Оценка эффективности: </strong>позиции по запросам, органический трафик, CTR сниппетов, конверсия.</p>\n<p><h4><strong>SMM</strong> (Social Media Marketing) — продвижение через соцсети путём создания контента, взаимодействия с аудиторией и работы с лидерами мнений. В интернет-маркетинге формирует сообщество вокруг бренда и строит долгосрочную лояльность аудитории.</h4></p>\n<p><strong>Инструменты: </strong>контент-план, инфлюенсер-маркетинг, таргетированная реклама, комьюнити-менеджмент.</p>\n<p><strong>Оценка эффективности: </strong>охват, вовлечённость (лайки, комментарии, репосты), прирост подписчиков, трафик на сайт, конверсии.</p>\n<p><h4><strong>E-mail маркетинг</strong> — коммуникация с аудиторией через email для удержания клиентов и роста продаж. В интернет-маркетинге работает с уже существующей базой — удерживает клиентов и возвращает «спящих».</h4></p>\n<p><strong>Ключевые понятия: </strong>сегментация базы, триггерные цепочки, реанимация/реактивация базы, доставляемость.</p>\n<p><strong>Структура письма: </strong>тема → прехедер → заголовок → тело → CTA.</p>\n<p><strong>Оценка эффективности:</strong> OR (открытия), CTR (клики), Conversion Rate, Unsubscribe Rate, ROI.</p>"},{"n":55,"t":"Жанровая характеристика корпуса PR-текстов","ann":"Проблемы классификации и принципы типологии PR-текстов. Образно-новостные жанры PR-текстов. Исследовательско-новостные жанры PR-текстов. Фактологические жанры. Оперативно-новостные жанры PR-текстов. Комбинированные PR-тексты.","a":"<p><strong>Проблемы классификации PR-текстов</strong>: размытость границ между жанрами, влияние контекста, субъективность оценки.</p>\n<p><strong>Принципы типологии PR-текстов</strong>: объём и характер информации; степень подготовленности к публикации; канал распространения; степень выраженности личностного начала.</p>\n<p><strong>Жанры PR-текстов</strong>:</p>\n<ul>\n<li><strong>Образно-новостные</strong>. Новость от конкретного лица (байлайнер, письмо, поздравление).</li>\n</ul>\n<ul>\n<li><strong>Исследовательско-новостные</strong>. Актуальная информация, анализ, истолкование новостного события (бэкграундер, вопросы-ответы).</li>\n</ul>\n<ul>\n<li><strong>Фактологические</strong>. Дополнительные факты о событии (факт-лист, биография).</li>\n</ul>\n<ul>\n<li><strong>Оперативно-новостные</strong>. Новая информация (пресс-релиз, приглашение).</li>\n</ul>\n<p><strong>Комбинированные PR-тексты</strong>. Совокупность текстов по теме (пресс-кит, буклет, проспект, брошюра, ньюслеттер, листовка).</p>"},{"n":56,"t":"Структура рекламного текста","ann":"Слоган, рекламный заголовок, основной рекламный текст, эхо-фраза. Определения, правила составления, примеры. Рекламные схемы.","a":"<p><strong>1. Слоган. </strong>Краткая рекламная фраза, излагающая основное предложение.  Правила: Отражает идею, краткий, точный, оригинальный, соответствует целям и аудитории.  Пример: \"Мезим - от желудка незаменим!\".</p>\n<p><strong>2. Рекламный заголовок. </strong>Первый элемент, определяющий тему и актуальность. Правила: Информирует о товаре, обращается к потребителю, указывает на преимущество, провоцирует на чтение. Пример: \"Когда грязь в удовольствие! Салон красоты Рафаэль\".</p>\n<p><strong>3. Основной рекламный текст. </strong>Изложение сути рекламы, аргументы, преимущества. Правила: Объясняет, почему нужно купить, может строиться на разных моделях (перевёрнутая пирамида, сравнение…)</p>\n<p><strong>4. Эхо-фраза.</strong> Выражение в конце текста, повторяющее основной мотив. Правила: Воспроизводит слоган, добавляет характеристику, призывает к действию. Примеры: \"AXE — В тебе что-то есть\", \"Ты не ты, когда голоден — Snickers\", \"Моменты удовольствия вкуснее с LAY'S STAX\".</p>\n<p><strong>5. Код. </strong>Заключительная часть, побуждающая к немедленному действию. Правила: Призыв к покупке, облегчение задачи приобретения. Пример: \"Весь мир с тобой!\" (Blue sky).</p>\n<p>Рекламные схемы</p>\n<ul>\n<li>AIDA – внимание – интерес – желание – призыв к действию</li>\n</ul>\n<ul>\n<li>AIDMA - внимание – интерес – убеждение – желание – действие</li>\n</ul>\n<ul>\n<li>ACCA - внимание – понимание – убеждение – действие</li>\n</ul>\n<ul>\n<li>PMHS – боль – больше боли – надежда – решение</li>\n</ul>\n<ul>\n<li>Перевернутая пирамида - самое важное – важное – детали</li>\n</ul>\n<ul>\n<li>So what? -  И что?</li>\n</ul>"},{"n":57,"t":"Специфика составления рекламных текстов для различных СМИ и в интернете","ann":"Специфика составления рекламных текстов для ТВ, радио, печатной и наружной рекламы, интернет-рекламы. SMM – понятие, основные принципы, виды текстового контента.","a":"<p><strong>Специфика составления рекламных текстов</strong>:</p>\n<p><strong>1.</strong> <strong>Телевизионная реклама</strong>. Привлечение внимания: риторические вопросы, восклицания, вопросно-ответная форма. Завершение: побудительные высказывания (просьба, совет, напоминание).</p>\n<p><strong>2. Радиореклама</strong>. Важны позитивно-оценочная и нейтральная лексика, рекламные клише, модальные обороты (просьба, предложение).</p>\n<p><strong>3. Печатная реклама</strong>. Учет образовательного уровня аудитории. Четкие аргументы, факты, точное место и время.</p>\n<p><strong>4. Наружная реклама</strong>. Эффективность: краски, размер, шрифт, подсветка, большой поток людей.</p>\n<p><strong>5. Транзитная реклама</strong>. Деление на динамичную и статичную рекламу. Динамичная: простой, короткий текст, крупный шрифт.</p>\n<p><strong>6. Интернет-реклама</strong>. Яркий, броский язык. Правила: разбивка на абзацы, выделение ключевых мыслей, одна мысль в абзаце.</p>\n<p>SMM – направление интернет-маркетинга, связанное с продвижением через социальные сети; акцент смещается с прямого продающего сообщения на построение долгосрочных отношений с аудиторией.</p>\n<p>Основные принципы:</p>\n<ul>\n<li>Вовлечение: тексты строятся как повод для коммуникации, цель – вызвать реакцию (лайк, комментарий, репост).</li>\n</ul>\n<ul>\n<li>Аутентичность:  отказ от официального стиля в пользу живого, эмоционального общения, соответствующего языку целевой аудитории.</li>\n</ul>\n<ul>\n<li>Форматность: контент жестко привязан к техническим и поведенческим особенностям конкретной платформы.</li>\n</ul>\n<p>Виды текстового контента:</p>\n<ul>\n<li>Посты: короткие или средние по объему тексты для информирования, развлечения или формирования лояльности.</li>\n</ul>\n<ul>\n<li>Сторителлинг: тексты в формате историй для удержания внимания и создания эмоциональной связи.</li>\n</ul>\n<ul>\n<li>Продающие тексты: сообщения с четким призывом к действию, адаптированные под формат соцсетей в более мягкой, дружественной форме.</li>\n</ul>"},{"n":58,"t":"Деловой копирайтинг. Общие правила деловой переписки. Виды писем в деловой переписке. Работа над речью","ann":"Правила оформления делового письма. Структура и синтаксис делового письма. Лексические и синтаксические ошибки в официальной переписке.  Виды деловых писем - убеждающие письма, письма отказы, письма претензии, письма ответы на претензии. Композиция текста для публичного выступления.","a":"<p><strong>Деловой копирайтинг</strong> – это подготовка текстов для документов административной, управленческой, правовой сфер.</p>\n<p><strong>Правила оформления делового письма</strong>: лаконичность; одно письмо – один вопрос; уважительный тон; использование бланков; письмо на языке адресата/английском</p>\n<p><strong>Структура делового письма</strong>: данные отправителя и дата, адрес получателя (с указанием лица или отдела), вступительное обращение, основной текст, указание на приложения, заключение, подпись и номер телефона.</p>\n<p><strong>Синтаксис делового письма</strong>: простые предложения, устойчивые словосочетания, прямой порядок слов, отсутствие лишних слов.</p>\n<p><strong>Ошибки в официальной переписке</strong>. <strong>Лексические</strong>: неправильное использование слов, иностранные слова без необходимости, плеоназмы, тавтология, неразличение паронимов. <strong>Синтаксические</strong>: неправильный порядок слов; ошибки в оборотах, в структуре сложного предложения и т.д.</p>\n<p>Виды деловых писем</p>\n<ul>\n<li><strong>Убеждающие письма</strong>. Аргументация для склонения к определенной точке зрения (тезис, доказательства, опровержение).</li>\n</ul>\n<ul>\n<li><strong>Письма отказы</strong>. Уведомление об отказе (коммерческие предложения, сотрудничество и т.д.).</li>\n</ul>\n<ul>\n<li><strong>Письма претензии</strong>. Выражение недовольства качеством исполнения обязательств (возврат средств, невыполнение условий и т.д.).</li>\n</ul>\n<ul>\n<li><strong>Письма ответы на претензии</strong>. Официальный ответ, пишется в свободной форме, может быть использовано как доказательство в суде.</li>\n</ul>\n<p>Композиция текста для публичного выступления</p>\n<ul>\n<li>Вступление: цель – привлечь внимание аудитории, обозначить тему и установить контакт со слушателями.</li>\n</ul>\n<ul>\n<li>Основная часть: строится на последовательном изложении ключевых тезисов с аргументацией (факты, примеры, ссылки на авторитеты).</li>\n</ul>\n<ul>\n<li>Заключение: содержит итоговые выводы, обобщение сказанного и формулировку призыва или финальной мысли.</li>\n</ul>"},
