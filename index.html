{"n":59,"t":"Технологии литературного редактирования. Виды редакторской правки текста","ann":"Правка-вычитка, правка-сокращение, правка-обработка, правка-переделка. Анализ и оценка композиции текста.","a":"<p><strong>Редакторская правка текста </strong>– это совместная работа редактора и автора над совершенствованием формы текста: улучшением стиля и структуры работы, исправлением неточностей.</p>\n<p><strong>Правка-вычитка. </strong>Устранение технических погрешностей (опечатки, орфографические ошибки).</p>\n<p><strong>Правка-сокращение. </strong>Сокращение текста без искажения содержания (удаление отрывков, внутритекстовое сокращение).</p>\n<p><strong>Правка-обработка. </strong>Улучшение стиля, уточнение формулировок, придание логичности (с сохранением авторской мысли).</p>\n<p><strong>Правка-переделка.</strong> Значительная переработка текста (с сохранением авторского стиля).</p>\n<p>Анализ и оценка композиции — это исследование того, как автор выстроил и связал части текста.</p>\n<p><strong>Анализ и оценка композиции текста включает 3 этапа: </strong>критический анализ текста, его оценка и исправление рукописи.</p>"},{"n":60,"t":"Основы гражданского права","ann":"Ответ на этот вопрос должен содержать: понятие, предмет, метод, принципы гражданского права; определение физического лица и юридического лица; определение  право- и дееспособности физических и юридических лиц, условия возникновения, прекращения, ограничения их право- и дееспособности; понятие и соде","a":"<p><strong>Гражданское право</strong> - отрасль права, регулирующая имущественные отношения (собственность, обязательства, предпринимательство) и связанные с ними личные неимущественные (интеллектуальная собственность, честь и достоинство).</p>\n<p><strong>Физическое лицо</strong> - гражданин как субъект гражданских правоотношений.</p>\n<p><strong>Правоспособность ФЛ</strong> - способность иметь права и нести обязанности. Возникает с рождения, прекращается со смертью.</p>\n<p><strong>Дееспособность ФЛ</strong> - способность своими действиями приобретать права и исполнять обязанности:</p>\n<ul>\n<li>полная - с 18 лет</li>\n</ul>\n<ul>\n<li>досрочная (брак, эмансипация, работа/ИП) - с 16 лет</li>\n</ul>\n<ul>\n<li>частичная - с 14 до 18 лет</li>\n</ul>\n<ul>\n<li>недееспособность - по решению суда при психическом расстройстве</li>\n</ul>\n<p><strong>Юридическое лицо</strong> - организация с обособленным имуществом, отвечающая по обязательствам, выступающая истцом/ответчиком в суде.</p>\n<p><strong>Право- и дееспособность ЮЛ</strong> возникают одновременно - с момента государственной регистрации, прекращаются с ликвидацией.</p>\n<p><strong>Право собственности</strong> - закрепленная законом возможность владеть, пользоваться и распоряжаться имуществом.</p>\n<p><strong>Три правомочия собственника:</strong></p>\n<ul>\n<li><strong>владение</strong></li>\n</ul>\n<ul>\n<li><strong>пользование</strong></li>\n</ul>\n<ul>\n<li><strong>распоряжение</strong></li>\n</ul>\n<p>Собственник несёт бремя содержания и риск гибели имущества.</p>\n<p><strong>Виды собственности:</strong> частная (граждан и юрлиц), государственная (федеральная и субъектов РФ), муниципальная.</p>\n<p><strong>Обязательство</strong> - правоотношение, по которому должник обязан совершить действие в пользу кредитора (или воздержаться от него).</p>\n<p><strong>Виды:</strong></p>\n<ul>\n<li>договорные</li>\n</ul>\n<ul>\n<li>недоговорные</li>\n</ul>\n<p><strong>Способы обеспечения исполнения:</strong> неустойка, залог, удержание имущества, поручительство, банковская гарантия, задаток.</p>"},{"n":61,"t":"Советское государство в 1918 – 1991 гг","ann":"При ответе на данный вопрос необходимо осветить: положение в России после окончания гражданской войны; сущность и результаты НЭП; процесс образования СССР; причины перехода к форсированной индустриализации и коллективизации, итоги ускоренного строительства социализма. Также отвечающему следует расск","a":"<p>[<strong>https://www.youtube.com/watch?v=deePqOO4a6g</strong>](https://www.youtube.com/watch?v=deePqOO4a6g)</p>\n<p><strong>После Гражданской войны → НЭП</strong> Военный коммунизм довёл страну до голода, крестьянских восстаний и Кронштадтского мятежа (1921) → переход к НЭПу.</p>\n<p><strong>НЭП:</strong> продналог вместо продразвёрстки, частная торговля, хозрасчёт. Экономика восстановлена к 1925–26 гг., но к концу 1920-х свёрнут из-за противоречий.</p>\n<p><strong>Образование СССР</strong> 30 декабря 1922 г. - I съезд Советов, РСФСР + УССР + БССР + ЗСФСР → СССР.</p>\n<p>Январь 1924 г. - первая Конституция СССР.</p>\n<p><strong>Индустриализация и коллективизация (конец 1920-х - 1930-е)</strong></p>\n<p><strong>Причины:</strong> военная угроза, отсталость от Запада, нужны деньги на промышленность. Две пятилетки → Днепрогэс, Магнитка, Уралмаш. СССР из аграрной → индустриальная держава.</p>\n<p><strong>Коллективизация:</strong> принудительное создание колхозов, раскулачивание, государственный контроль над селом.</p>\n<p><strong>Итог:</strong> голод 1932–33 гг. (Украина, Поволжье, Казахстан), репрессии, низкий уровень жизни.</p>\n<p><strong>Внешняя политика: преодоление изоляции (1920-е)</strong> 1922 г. - Генуэзская конференция + Рапалльский договор с Германией. 1924–25 гг. - «полоса признаний» (Великобритания, Франция, Япония, Китай).</p>\n<p><strong>Внешняя политика 1930-х</strong> 1934 г. - СССР в Лиге Наций, курс на коллективную безопасность. Мюнхенский сговор 1938 г. (западные страны «умиротворяют» Гитлера без СССР) → смена курса.</p>\n<p>23 августа 1939 г. - пакт Молотова–Риббентропа, секретный протокол о разделе сфер влияния. 1939–40 гг. - присоединены Западная Украина, Беларусь, Прибалтика, Бессарабия. Война с Финляндией.</p>\n<p><strong>Великая Отечественная война (1941–1945)</strong> 22 июня 1941 г. - нападение Германии. Антигитлеровская коалиция (СССР, США, Великобритания). Три этапа: отступление → перелом (Сталинград, Курск) → освобождение Европы, Берлин.</p>\n<p>9 мая 1945 г. - победа. Август 1945 г. - разгром Японии.</p>\n<p><strong>Послевоенные годы (1945–1953)</strong> Холодная война (речь Черчилля в Фултоне, 1946), гонка вооружений. 1949 г. - СССР создал ядерное оружие. Внутри страны - репрессии, «Ленинградское дело» (1949).</p>\n<p><strong>Борьба за власть после Сталина</strong> 5 марта 1953 г. - смерть Сталина. Борьба: Маленков vs Берия vs Хрущёв. Арест Берии (июнь 1953 г.) → победа Хрущёва.</p>\n<p><strong>«Оттепель» Хрущёва (1953–1964)</strong> XX съезд КПСС (1956) - разоблачение культа личности, реабилитация жертв репрессий. Экономика: целина, совнархозы, массовое строительство «хрущёвок». Внешняя политика: «мирное сосуществование», Карибский кризис (1962). Октябрь 1964 г. - смещён из-за волюнтаризма и недовольства номенклатуры.</p>\n<p><strong>«Застой» Брежнева (1964–1982)</strong> Экономика: нефтегазовый экспорт, экстенсивный рост, зависимость от цен на нефть, деградация промышленности. Политика: Конституция 1977 г., «развитой социализм», нарастание отчуждения власти от общества. 1975 г. - Хельсинкские соглашения (разрядка). 1979 г. - ввод войск в Афганистан → изоляция. После Брежнева: Андропов (1982–84) и Черненко (1984–85) - без системных изменений.</p>\n<p><strong>«Перестройка» Горбачёва (1985–1991) и её крах</strong> Гласность, демократизация, альтернативные выборы, пост Президента СССР (1990), отмена 6-й статьи о роли КПСС. Экономика: законы о кооперации, аренде - но непоследовательно → дефицит, хаос. Внешняя политика: вывод из Афганистана (1989), нормализация с Западом, объединение Германии.</p>\n<p><strong>Причины провала:</strong> нет чёткой программы реформ, межнациональные конфликты, «парад суверенитетов», падение авторитета Горбачёва.</p>\n<p>Август 1991 г. - путч ГКЧП провалился, власть перешла к республикам. Декабрь 1991 г. - Беловежские соглашения (РСФСР + Украина + Беларусь) → СНГ вместо СССР. 25 декабря 1991 г. - Горбачёв сложил полномочия. СССР прекратил существование.</p>"},{"n":62,"t":"Проявление и формы коррупции","ann":"При ответе на данный вопрос следует дать определение коррупции, перечислить ее признаки, основные формы, указать негативные последствия коррупции для государства и общества.","a":"<p>Коррупция – это использование должностным лицом своих властных полномочий, прав, авторитета, возможностей и связей в целях личной выгоды, противоречащее законодательству и моральным устоям.</p>\n<p>Основные формы коррупции:</p>\n<ul>\n<li>взяточничество</li>\n</ul>\n<ul>\n<li>фаворитизм – продвижение «своих» людей, лично преданных, независимо от их квалификации</li>\n</ul>\n<ul>\n<li>непотизм – назначение на должности родственников</li>\n<li>лоббизм – оказание давления для принятия/отклонения законопроекта</li>\n</ul>\n<ul>\n<li>казнокрадство – хищение бюджетных средств, имущества государства</li>\n</ul>\n<ul>\n<li>конфликт интересов – личная заинтересованность чиновника влияет на его служебное решение</li>\n</ul>\n<p>Признаки коррупции: (<strong>ПИН</strong>)</p>\n<ul>\n<li>получение неправомерных выгод как имущественного, так и неимущественного характера;</li>\n</ul>\n<ul>\n<li>использование должностного или иного служебного положения вопреки законным интересам общества и государства;</li>\n</ul>\n<ul>\n<li>наличие корыстной цели (получение имущественных выгод) или личной заинтересованности в неправомерных преимуществах.</li>\n</ul>\n<p>Негативные последствия коррупции:</p>\n<p>В социальной сфере: обнищание части общества и возрастание социальной напряженности.</p>\n<p>В политической сфере: снижение доверия общества к власти.</p>\n<p>В экономической сфере: расширение теневой экономики, нарушение конкуренции рынка.</p>"},{"n":63,"t":"Противодействие коррупции","ann":"Отвечающий на данный вопрос должен дать определение коррупции, перечислить принципы и методы противодействия коррупции, меры профилактики коррупции, продемонстрировать знание основных составляющих антикоррупционного законодательства РФ.","a":"<p>Коррупция – это использование должностным лицом своих властных полномочий, прав, авторитета, возможностей и связей в целях личной выгоды, противоречащее законодательству и моральным устоям.</p>\n<p><strong>Принципы противодействия коррупции:</strong></p>\n<ul>\n<li>публичность и открытость деятельности гос. органов</li>\n<li>законность</li>\n<li>неотвратимость ответственности за коррупцию</li>\n</ul>\n<ul>\n<li>сотрудничество государства с обществом</li>\n</ul>\n<p><strong>Методы противодействия коррупции: </strong></p>\n<ul>\n<li>расследование и привлечение к ответственности виновных;</li>\n</ul>\n<ul>\n<li>формирование у граждан неприятия коррупционного поведения;</li>\n</ul>\n<ul>\n<li>проведение антикоррупционной экспертизы и т.д.</li>\n</ul>\n<p><strong>Профилактика коррупции</strong></p>\n<ul>\n<li>формирование неприятия коррупционного поведения</li>\n</ul>\n<ul>\n<li>антикоррупционная экспертиза правовых актов и проектов</li>\n</ul>\n<ul>\n<li>повышение по службе за безупречную и результативную работу</li>\n</ul>\n<ul>\n<li>увольнение госслужащих за несообщение сведений о доходах, расходах и имуществе</li>\n</ul>\n<p><strong>Основные составляющие антикоррупционного законодательства РФ:</strong></p>\n<ul>\n<li>Федеральный закон (ФЗ) «О противодействии коррупции» от 25.12.2008 N 273-ФЗ</li>\n</ul>\n<ul>\n<li>Статья 290 УК РФ: получение взятки должностным лицом за действия или бездействие.</li>\n</ul>"},{"n":64,"t":"Ответственность за коррупционные правонарушения","ann":"Виды правонарушений. Ответственность: дисциплинарная, административная, гражданско-правовая, уголовная.","a":"<p>Коррупция – это использование должностным лицом своих властных полномочий, прав, авторитета, возможностей и связей в целях личной выгоды, противоречащее законодательству и моральным устоям.</p>\n<p>Виды коррупционных правонарушений и ответственность за нарушение:</p>\n<ul>\n<li>Гражданско-правовые – правонарушения, влекущие за собой обязанность возмещения причиненного ущерба <strong>(</strong><strong>взыскание в судебном порядке ущерба</strong><strong>, причиненного коррупционными действиями виновных лиц, расторжение незаконных государственных и муниципальных контрактов)</strong></li>\n</ul>\n<ul>\n<li>Дисциплинарные проступки  – обладающие признаками коррупции и не являющиеся преступлениями или административными правонарушениями, за которые установлена дисциплинарная ответственность (<strong>замечание, </strong><strong>выговор</strong><strong>, строгий выговор (для сотрудников ряда правоохранительных органов), предупреждение о неполном должностном соответствии, </strong><strong>увольнение</strong><strong>)</strong></li>\n</ul>\n<ul>\n<li>Административные преступления – обладающие признаками коррупции и не являющиеся преступлениями правонарушения, за которые установлена административная ответственность <strong>(</strong><strong>административный штраф</strong><strong>, административный арест, дисквалификация)</strong></li>\n</ul>\n<ul>\n<li>Уголовные преступления – совершенные общественно опасные деяния, содержащие признаки коррупции <strong>(штраф, лишение права занимать определенные должности или заниматься определенной деятельностью, обязательные работы, </strong><strong>исправительные работы</strong><strong>, принудительные работы, ограничение свободы, </strong><strong>лишение свободы на определенный срок</strong><strong> (до 15 лет, зависит от размера взятки)</strong></li>\n</ul>"},{"n":65,"t":"Нормативные документы, регулирующие рекламную деятельность. Обычаи делового оборота","ann":"Основные нормативные документы. Обычаи делового оборота.","a":"<p>История развития законодательства о рекламе в РФ:</p>\n<ul>\n<li>1991 г. закон «О конкуренции и ограничении монополистической деятельности на товарных рынках». Это 1-й антимонопольный закон.</li>\n</ul>\n<ul>\n<li>1991 г. закон РСФСР «О средствах массовой информации», который, во-первых, указывал на недопустимость злоупотребления свободой слова и устанавливал ответственность за распространение недостоверной информации и, во-вторых, ограничивал объем рекламы в СМИ, не зарегистрированных в качестве специализирующихся на сообщениях и материалах рекламного характера.</li>\n</ul>\n<ul>\n<li>1992 г. Закон РФ «О защите прав потребителей», который: установил требования к информации о товарах, работах, услугах, которая должна доводиться до потребителя.</li>\n</ul>\n<ul>\n<li>18 июня 1995 г. был принят первый Закон РФ «О рекламе», центральный нормативно-правовой акт, регулирующий рекл. деятельность в РФ.</li>\n</ul>\n<p>Нормативные документы, на которых строится рекламное законодательство:</p>\n<ul>\n<li>ФЗ «О рекламе» ФЗ 38;</li>\n</ul>\n<ul>\n<li>Закон РФ «О защите прав потребителей»;</li>\n</ul>\n<ul>\n<li>ФЗ «О защите конкуренции;</li>\n</ul>\n<ul>\n<li>Закон РФ «О СМИ»;</li>\n</ul>\n<ul>\n<li>КОАП; ГК РФ.</li>\n</ul>\n<p>Обычаи делового оборота – это неписаные правила, которые не закреплены в законе, но все в бизнесе их соблюдают просто потому что так принято.</p>"},{"n":66,"t":"Ответственность за нарушения законодательства в рекламной деятельности","ann":"Виды ответственности. Роль ФАС. Штрафы. Ненадлежащая реклама.","a":"<p>Гражданско-правовая ответственность</p>\n<p>Нарушение законодательства о рекламе – пострадавший идёт в суд и требует::</p>\n<ul>\n<li>о возмещении убытков, включая упущенную выгоду;</li>\n</ul>\n<ul>\n<li>о возмещении вреда здоровью и имуществу;</li>\n</ul>\n<ul>\n<li>о компенсации морального вреда;</li>\n</ul>\n<ul>\n<li>о публичном опровержении недостоверной рекламы (контррекламе) .</li>\n</ul>\n<p>пример: Компания выпустила рекламу БАДа с утверждением «вылечит диабет». Покупатель приобрёл товар, лечения не получил, здоровье ухудшилось. Подаёт в суд — требует возместить стоимость товара, вред здоровью и моральный ущерб. Суд обязывает компанию также опубликовать опровержение.</p>\n<p>Административная ответственность</p>\n<p>Нарушение законодательства о рекламе влечет ответственность по КоАП РФ.</p>\n<p><strong>Рекламодатель</strong> отвечает за нарушение требований к содержанию рекламы, <strong>рекламораспространитель</strong> – за нарушение требований к способам и месту распространения, <strong>рекламопроизводитель</strong> – если нарушение произошло по его вине</p>\n<p>Основное наказание – штраф, но он не освобождает от исполнения предписания о прекращении нарушения .</p>\n<p>Уголовная ответственность</p>\n<p>В действующем Федеральном законе № 38-ФЗ «О рекламе» (2006 г.) <strong>не предусмотрена.</strong> Есть статья за мошенничество в УК РФ.</p>"},{"n":67,"t":"Регулирование отдельных видов и способов распространения рекламы согласно","ann":"Особенности регулирования: ТВ, радио, наружная реклама, интернет по ФЗ №38.","a":"<p><strong>ФЗ №38 «О рекламе»</strong></p>\n<p>Аннотация:  ФЗ №38 «О рекламе». Реклама в телепрограммах и телепередачах. Реклама в радиопрограммах и радиопередачах. Реклама в периодических печатных изданиях. Реклама в кино– и видеообслуживании. Реклама, распространяемая по сетям электросвязи. Реклама на транспортных средствах. Наружная реклама. Особенности иных способов распространения рекламы..</p>\n<p>ФЗ №38 «О рекламе» – это главный законодательный акт, который регламентирует работу рекламной отрасли. В документе определено, что и каким образом разрешено рекламировать, а за какую рекламу можно получить штраф.</p>\n<p>Регулирование отдельных видов рекламы:</p>\n<ul>\n<li>ТВ: Ограничение по объему (7% кадра, 20% времени вещания), запреты в траур, ограничения на товары.</li>\n</ul>\n<ul>\n<li>Радио: Ограничение по времени (20% в сутки), запрет прерывания религиозных передач/агитации, ограничения на товары.</li>\n</ul>\n<ul>\n<li>Пресса: Пометка \"реклама\", не более 40% объема.</li>\n</ul>\n<ul>\n<li>Видеообслуживание: Запрет прерывания фильмов, ограничение времени упоминания спонсоров в социальной рекламе (3 сек).</li>\n</ul>\n<ul>\n<li>Сети электросвязи: Требуется согласие на получение, запрет автоматических звонков/рассылок, время рекламы не учитывается в стоимости.</li>\n</ul>\n<ul>\n<li>Транспорт: Только по договору с владельцем; запрещено использовать ТС как передвижные конструкции; нельзя размещать на спецтранспорте; нельзя создавать угрозу безопасности и использовать звуковое сопровождение.</li>\n</ul>\n<ul>\n<li>Наружная реклама: Запрет на размещение на знаках, звуковую рекламу на стенах; соответствие регламенту; договор с владельцем участка/здания.</li>\n</ul>\n<ul>\n<li>Особенности иных способов распространения рекламы: реклама на почтовых отправлениях может размещаться только при наличии разрешения.</li>\n</ul>\n<p>Ответственность за нарушения законодательства о рекламной деятельности:</p>\n<ul>\n<li>Гражданско-правовая – регулируется нормами гражданского и рекламного законодательства (возмещение убытка; получение упущенной выгоды; компенсация морального вреда, публичное опровержение)</li>\n</ul>\n<ul>\n<li>Административная – КоАП РФ (штраф должностных лиц и ИП – на 12-20 тысяч рублей; организации – на 100-500 тысяч рублей).</li>\n</ul>\n<ul>\n<li>Уголовная – в настоящее время не применяется.</li>\n</ul>"},{"n":68,"t":"Региональное и муниципальное регулирование рекламной деятельности","ann":"Региональный и муниципальный уровни регулирования.","a":"<p>Государственный надзор в сфере рекламы – это деятельность уполномоченных органов, прежде всего Федеральной антимонопольной службы (ФАС России), направленная на предупреждение, выявление и пресечение нарушений законодательства о рекламе</p>\n<p>Права и ответственность ФАС:</p>\n<ul>\n<li>выдача обязательных для исполнения предписаний о прекращении нарушения законодательства о рекламе;</li>\n</ul>\n<ul>\n<li>предписания об отмене или изменении актов, противоречащих  законодательству о рекламе;</li>\n</ul>\n<ul>\n<li>предъявление в суд исков о запрете распространения рекламы;</li>\n</ul>\n<ul>\n<li>предъявление исков о публичном опровержении недостоверной рекламы.</li>\n</ul>\n<p>В России действует двухуровневая система регулирования рекламы:</p>\n<p>1-й уровень – Федеральный, главным органом является ФАС России, которая контролирует содержание рекламы, то есть ее достоверность, этичность и соответствие закону.</p>\n<p>2-й уровень – Региональный и муниципальный, где регулирование осуществляют органы субъектов РФ и местного самоуправления, которые отвечают за место размещения рекламы, в частности наружную рекламу и выдачу разрешений на рекламные конструкции.</p>\n<p>Федеральный закон № 38 «О рекламе» – основной закон, регулирующий эту сферу</p>\n<p>Комитет по печати и взаимодействию со средствами массовой информации (Администрация Санкт – Петербурга) – исполнительный орган гос. власти СПб.</p>\n<p>Услуги Комитета:</p>\n<ul>\n<li>проводит государственную политику в сфере полиграфии, книгоиздания, распространения книжной и периодической печатной продукции, средств массовой информации, социальной рекламы</li>\n</ul>\n<ul>\n<li>выдает разрешения на установку рекламных конструкций или перемещение объектов для размещения информации в СПб.</li>\n</ul>"},{"n":69,"t":"Особенности рекламы отдельных видов товаров согласно ФЗ №38 «О рекламе»","ann":"Ограничения и особенности рекламы: алкоголь, табак, медикаменты, финансовые услуги.","a":"<p>ФЗ № 38 «О рекламе» устанавливает специальные требования и ограничения для рекламы отдельных видов товаров, которые в силу своей специфики требуют повышенной защиты потребителей .</p>\n<p><strong>Алкоголь</strong> Нельзя: обращаться к несовершеннолетним, использовать образы людей и животных, создавать впечатление пользы от употребления. Запрещено размещать: на ТВ и радио с 7 до 23ч, на первой/последней полосах газет, обложках журналов, в детских/образовательных/медицинских организациях, на транспорте.</p>\n<p><strong>Лекарства, медизделия и медуслуги</strong> Обязательно предупреждение о противопоказаниях и необходимости консультации врача. Нельзя: создавать впечатление ненужности врача, гарантировать эффект, преувеличивать эффективность. Народная медицина - только при наличии сертификата и разрешения.</p>\n<p><strong>БАД, пищевые добавки, детское питание</strong> БАД: нельзя представлять как лекарства или ссылаться на случаи излечения.</p>\n<p><strong>Детское питание: </strong>нельзя представлять как полноценный заменитель грудного молока или дискредитировать естественное вскармливание.</p>\n<p><strong>Азартные игры и пари</strong> Запрещено на ТВ, радио, транспорте, в детских/образовательных/медицинских/спортивных учреждениях, в интернете (кроме официальных сайтов организаторов). Обязательно указание на риск игровой зависимости.</p>\n<p><strong>Финансовые услуги</strong> Обязательно указывать все существенные условия: сумму, срок, ставку, полную стоимость кредита (ПСК). Нельзя гарантировать выдачу кредита или умалчивать об условиях, влияющих на стоимость.</p>\n<p><strong>Ценные бумаги</strong> Обязательно указание на необходимость ознакомления с проспектом эмиссии и на инвестиционные риски. Нельзя гарантировать доходность или прогнозировать рост курсовой стоимости.</p>\n<p>Ответственность за нарушение этих требований несут рекламодатель и рекламораспространитель в соответствии со статьей 38 ФЗ № 38 и КоАП РФ</p>"},{"n":70,"t":"Закон РФ \"О средствах массовой информации\". Законодательство о защите авторских прав и смежных прав","ann":"Основные положения закона о СМИ. Авторское право и смежные права.","a":"<p>Закон РФ «О СМИ» – нормативно-правовой акт, регулирующий отношения между участниками производства массовой информации.</p>\n<p>В законе РФ «О СМИ» :</p>\n<ul>\n<li>провозглашается свобода массовой информации, предназначенной для неограниченного круга лиц.</li>\n</ul>\n<ul>\n<li>под средством массовой информации понимается периодическое печатное издание, радио-, теле-, видеопрограмма, кинохроникальная программа и иная форма периодического распространения массовой информации.</li>\n</ul>\n<ul>\n<li>цензура массовой информации не допускается, как и злоупотребление свободой массовой информации.</li>\n</ul>\n<ul>\n<li>редакция СМИ осуществляет свою деятельность после его регистрации в установленном порядке.</li>\n</ul>\n<p>Основные понятия: реклама; объект рекламирования; товар; ненадлежащая реклама; рекламодатель; рекламопроизводитель; рекламораспространитель; потребители рекламы; спонсор; спонсорская реклама; социальная реклама; антимонопольный орган; рекламная система; оператор рекламной системы.</p>\n<p>Закон «О СМИ»  влияет на регулирование деятельности в сфере рекламы и связей с общественностью, так как размещение многих рекламных и PR-материалов осуществляется в СМИ: телевидении, прессе, радио, электронных СМИ.</p>\n<p>Гражданский кодекс РФ (часть четвертая)</p>\n<p>Глава 70: АВТОРСКОЕ ПРАВО:</p>\n<ul>\n<li>это Интеллектуальные права на произведения науки, литературы и искусства</li>\n</ul>\n<p>Автору произведения принадлежат следующие права:</p>\n<ul>\n<li>исключительное право на произведение;</li>\n</ul>\n<ul>\n<li>право авторства;</li>\n</ul>\n<ul>\n<li>право автора на имя;</li>\n</ul>\n<ul>\n<li>право на неприкосновенность произведения;</li>\n</ul>\n<ul>\n<li>право на обнародование произведения.</li>\n</ul>\n<p>Смежные права - это интеллектуальные права на результаты деятельности, которая помогает создавать, исполнять или распространять произведения</p>"},{"n":71,"t":"История и источники правового регулирования рекламной деятельности в России","ann":"Понятие государственного регулирования рекламной деятельности. Законодательная база регулирования рекламной деятельности. Организации, осуществляющие контроль рекламы","a":"<p><strong>Государственное регулирование рекламной деятельности</strong> - система правовых, организационных и контрольных мер для соблюдения законодательства о рекламе, защиты конкуренции и прав потребителей.</p>\n<p>История развития законодательства о рекламе в РФ:</p>\n<ul>\n<li>1991 г. закон «О конкуренции и ограничении монополистической деятельности на товарных рынках». Это 1-й антимонопольный закон.</li>\n</ul>\n<ul>\n<li>1991 г. закон РСФСР «О средствах массовой информации», который, во-первых, указывал на недопустимость злоупотребления свободой слова и устанавливал ответственность за распространение недостоверной информации и, во-вторых, ограничивал объем рекламы в СМИ, не зарегистрированных в качестве специализирующихся на сообщениях и материалах рекламного характера.</li>\n</ul>\n<ul>\n<li>1992 г. Закон РФ «О защите прав потребителей», который: установил требования к информации о товарах, работах, услугах, которая должна доводиться до потребителя.</li>\n</ul>\n<ul>\n<li>18 июня 1995 г. был принят первый Закон РФ «О рекламе», центральный нормативно-правовой акт, регулирующий рекл. деятельность в РФ.</li>\n</ul>\n<p><strong>Ключевые понятия ФЗ №38:</strong></p>\n<ul>\n<li><strong>реклама</strong> - информация, адресованная неопределенному кругу лиц, направленная на продвижение объекта на рынке</li>\n</ul>\n<ul>\n<li><strong>рекламодатель</strong> - определяет объект рекламирования</li>\n</ul>\n<ul>\n<li><strong>рекламопроизводитель</strong> - приводит информацию в готовую форму</li>\n</ul>\n<ul>\n<li><strong>рекламораспространитель</strong> - распространяет рекламу</li>\n</ul>\n<ul>\n<li><strong>ненадлежащая реклама</strong> - не соответствующая требованиям законодательства</li>\n</ul>\n<p>ФАС – основной орган государственного контроля в сфере рекламы.</p>\n<p><strong>Контроль рекламы: ФАС России</strong> (ст. 33 ФЗ №38)</p>\n<ul>\n<li>надзор за соблюдением законодательства о рекламе</li>\n</ul>\n<ul>\n<li>выявляет и пресекает нарушения, возбуждает дела</li>\n</ul>\n<ul>\n<li>выдаёт предписания о прекращении нарушений</li>\n</ul>\n<ul>\n<li>предъявляет иски о запрете рекламы и о контррекламе</li>\n</ul>\n<ul>\n<li>применяет меры административной ответственности</li>\n</ul>\n<p><strong>Законодательная база РД в РФ:</strong></p>\n<ul>\n<li>ФЗ №38-ФЗ «О рекламе» (2006) - основной</li>\n</ul>\n<ul>\n<li>ФЗ №135-ФЗ «О защите конкуренции» (ст. 14 - недобросовестная конкуренция)</li>\n</ul>\n<ul>\n<li>Закон «О защите прав потребителей»</li>\n</ul>\n<ul>\n<li>Закон «О СМИ»</li>\n</ul>\n<ul>\n<li>КоАП РФ (ст. 14.3, 14.37)</li>\n</ul>\n<ul>\n<li>ГК РФ</li>\n</ul>"},{"n":72,"t":"Основы правового регулирования массовых коммуникаций","ann":"Правовые основы регулирования МК: свобода слова, ограничения, интернет.","a":"<p><strong>Законодательство в сфере рекламы и массовых коммуникаций</strong>: ФЗ «О рекламе»; Закон РФ «О защите прав потребителей»; ФЗ «О защите конкуренции; ФЗ «О защите детей от информации, причиняющей вред здоровью и развитию»; Закон РФ «О СМИ»; КОАП; ГК РФ.</p>\n<p><strong>Недобросовестная реклама</strong> – это рекламная продукция, дискредитирующая партнеров, конкурентов, граждан, не пользующихся рекламируемой продукцией, злоупотребляющая доверием или недостаточной осведомленностью.</p>\n<p><strong>Недостоверная реклама</strong> – это реклама, которая содержит не соответствующие действительности сведения.</p>\n<p><strong>Особенности отдельных способов распространения рекламы</strong>:</p>\n<p><strong>ТВ</strong>: Ограничение по объему (7% кадра, 20% времени вещания), запреты в траур, ограничения на товары.</p>\n<p><strong>Радио</strong>: Ограничение по времени (20% в сутки), запрет прерывания религиозных передач/агитации, ограничения на товары.</p>\n<p><strong>Пресса</strong>: Пометка \"реклама\", не более 40% объема.</p>\n<p><strong>Видеообслуживание</strong>: Запрет прерывания фильмов, ограничение времени упоминания спонсоров в социальной рекламе (3 сек).</p>\n<p><strong>Сети электросвязи</strong>: Требуется согласие на получение, запрет автоматических звонков/рассылок, время рекламы не учитывается в стоимости.</p>\n<p><strong>Транспорт</strong>: Только по договору с владельцем; запрещено использовать ТС как передвижные конструкции; нельзя размещать на спецтранспорте; нельзя создавать угрозу безопасности и использовать звуковое сопровождение.</p>\n<p><strong>Наружная реклама</strong>: Запрет на размещение на знаках, звуковую рекламу на стенах; соответствие регламенту; договор с владельцем участка/здания.</p>\n<p><strong>Особенности рекламы отдельных видов товаров</strong>:</p>\n<ul>\n<li><strong>Алкоголь</strong>. отсутствие несоверш.; предупреждение о вреде.</li>\n</ul>\n<ul>\n<li><strong>Табак</strong>. Не утверждать, что курение поможет достичь признание; не осуждать за воздержание от курения.</li>\n</ul>\n<ul>\n<li><strong>Лекарства/медицина</strong>. Запрет пропаганды самолечения; предупреждение о необходимости консультации.</li>\n</ul>\n<ul>\n<li><strong>БАДы</strong>. Наличие фразы: «не является лекарственным средством».</li>\n</ul>\n<ul>\n<li><strong>Детское питание</strong>. Запрет пропаганды искусственного вскармливания.</li>\n</ul>\n<ul>\n<li><strong>Реклама игр основанных на риске,</strong> пари, рекламы финансовых услуг и ценных бумаг, рекламы услуг по заключению договоров ренты, в том числе договора пожизненного содержания с иждивением.</li>\n</ul>\n<p><strong> </strong></p>\n<p><strong>Саморегулирование в сфере рекламы</strong> – процесс регламентирования порядка осуществления рекламной деятельности самими её субъектами. Оно основано на добровольном контроле за соблюдением правил поведения на рекламном рынке.</p>\n<p><strong>Гос.</strong> <strong>контроль в сфере рекламы и ответственность за нарушение законодательства РФ о рекламе</strong> — это <em>система мероприятий</em>, которые осуществляют уполномоченные органы с целью <em>проверки соблюдения</em> субъектами рекламной деятельности <em>требований действующего законодательства о рекламе</em>. В роли федерального антимонопольного органа в России выступает ФАС.</p>\n<p>+ <em>Предусматривается административная и уголовная ответс. за нарушение законодательства о рекламе.</em></p>\n<p>Примеры современных законов в сфере массовой коммуникации</p>\n<ul>\n<li>ФЗ № 38 «О рекламе»</li>\n</ul>\n<ul>\n<li>ФЗ № 135 «О защите конкуренции»</li>\n</ul>\n<ul>\n<li>Закон РФ «О средствах массовой информации»</li>\n</ul>\n<ul>\n<li>ФЗ № 149 «Об информации, информационных технологиях и о защите информации»</li>\n</ul>\n<ul>\n<li>КоАП РФ (ст. 14.3, 14.37)</li>\n</ul>"},{"n":73,"t":"Профессиональные стандарты в сфере рекламы и PR","ann":"Профессиональные стандарты специалистов по рекламе и PR: компетенции, квалификации.","a":"<p>Международные профессиональные стандарты в сфере рекламы и PR:</p>\n<ul>\n<li>реклама должна соответствовать законности, пристойности, честности, достоверности, добросовестности и социальной ответственности.</li>\n</ul>\n<ul>\n<li>реклама не должна дискредитировать рекламную деятельность в глазах общества.</li>\n</ul>\n<p>Российские профессиональные стандарты в области рекламы и PR:</p>\n<ul>\n<li>Декларация профессиональных и этических принципов в области связей с общественностью (Декларация РАСО),</li>\n</ul>\n<ul>\n<li>Кодекс профессиональных и этических принципов.</li>\n</ul>\n<p>Что должны делать специалисты в сфере рекламы и PR:</p>\n<ul>\n<li>действовать для общественного блага и не наносить ущерб законным интересам, чести, достоинству личности.</li>\n</ul>\n<ul>\n<li>соблюдать принципы точности, правдивости и добросовестности передаваемой информации.</li>\n</ul>\n<ul>\n<li>запрещено использовать ложные или вводящие в заблуждение сведения, распространять информацию, причиняющую вред третьим сторонам.</li>\n</ul>\n<ul>\n<li>честный и откровенный подход в отношениях со своими клиентами или нанимателями.</li>\n</ul>\n<ul>\n<li>необходимо соблюдать полную конфиденциальность, строго придерживаться принципа секретности информации, полученной от клиентов.</li>\n</ul>\n<ul>\n<li>нужно избегать нечестной конкуренции в отношениях с коллегами, не наносить умышленно ущерб профессиональной репутации или работе коллег.</li>\n</ul>\n<p>Схожесть международных и отечественных стандартов:</p>\n<ul>\n<li>наличие общих этических принципов (честность, достоверность информации, уважение к потребителям; защита их интересов).</li>\n</ul>\n<ul>\n<li>наличие определенных знаний у специалистов в области рекламы и связей с общественностью, таких как умение разрабатывать эффективные коммуникационные стратегии, управлять репутацией бренда и т.д.</li>\n</ul>\n<p>Различия:</p>\n<ul>\n<li>международные стандарты могут быть более универсальными, в то время как отечественные стандарты могут быть более специфичными.</li>\n</ul>\n<ul>\n<li>различия в культурных особенностях могут привести к разным подходам к рекламе и связям с общественностью</li>\n</ul>\n<ul>\n<li>в разных странах есть различия в доступности технологий и цифровых платформ</li>\n</ul>\n<ul>\n<li>международные стандарты могут учитывать языковые особенности и требования к переводу рекламных материалов.</li>\n</ul>\n<p><strong>Основные институты </strong><strong>в области профессиональных стандартов рекламы и PR: </strong></p>\n<p><strong>– МТП </strong>(Международная торговая палата, ICC): Разрабатывает глобальные стандарты маркетинговых коммуникаций.</p>\n<p><strong>– ИПРА </strong>(Международная ассоциация по связям с общественностью — IPRA): Главный глобальный институт для PR-специалистов.</p>\n<p><strong>– РАСО</strong> (Российская ассоциация по связям с общественностью): Крупнейшее профессиональное объединение в РФ, адаптирующее мировые стандарты.</p>\n<p><strong>– АКОС </strong>(Ассоциация компаний-консультантов в области связей с общественностью): Объединение ведущих PR-агентств РФ, развивающее цивилизованный рынок.</p>\n<p><strong>– АКАР</strong> (Ассоциация коммуникационных агентств России): Основная индустриальная организация, регламентирующая рекламный рынок.</p>"},{"n":74,"t":"Основные показатели носителей рекламы","ann":"Показатели носителей рекламы: тираж, аудитория, рейтинг, охват, частота, CPT.","a":"<p><strong>Рейтинг носителя</strong> – доля аудитории, бывшей в контакте с носителем (смотрела передачу, купила газету и т.д.). Показывает популярность медианосителя.</p>\n<p>Тпер - чисто телезрит. передачи</p>\n<p>Тп - общ. численность потенциальных телезрителей</p>\n<p>Рейтинг может быть:</p>\n<p><strong>Общий</strong> рейтинг — по всему населению территории</p>\n<p><strong>Целевой</strong> рейтинг — по конкретной ЦА (например, мужчины 25–35 лет)</p>\n<p><strong>Доля аудитории телевидения в данный момент времени (HUT) </strong>- доля всех телезрителей, смотрящих ТВ в данный момент, от всей потенциальной аудитории. Характеризует популярность временного интервала.</p>\n<p><strong>Доля аудитории передачи (Share)</strong> - аудитория конкретной передачи от всех смотрящих ТВ в этот момент. Показывает сколько % телезрителей выбрали именно эту передачу.</p>\n<p>Удобна для сравнения программ на одном канале в разное время.</p>\n<p><strong>Индекс соответствия (Affinity)</strong> – отношение доли ЦА в аудитории СМИ / доля ЦА в населении в целом × 100%. Показывает насколько плотно ЦА контактировала с носителем по сравнению с базовой аудиторией. &gt;100 — носитель хорошо попадает в ЦА.</p>"},{"n":75,"t":"Экономическая эффективность рекламы","ann":"Понятие и методы оценки экономической эффективности. ROI, товарооборот, рентабельность.","a":"<p>Экономический эффект - это конечный экономический результат, полученный от проведения какого-либо мероприятия, вызывающего улучшение каких-либо показателей работы организации. Результат является абсолют­ным показателем и измеряется в денежных единицах</p>\n<p>Экономическая эффективность рекламы – это соотношение между экономическим результатом, полученным от применения рекламного средства или организации рекламной кампании и затраченными ресурсами.</p>\n<p><strong>Показатели экономической эффективности: </strong></p>\n<ul>\n<li>изменение рентабельности под влиянием рекламы</li>\n</ul>\n<ul>\n<li>отношение прироста прибыли, полученной после рекламной кампании, к сумме рекламных затрат (рентабельность рекламной кампании);</li>\n</ul>\n<ul>\n<li>анализ целевых альтернатив;</li>\n</ul>\n<ul>\n<li>зависимость объема продаж от расходов на рекламу (формула Ламбена);</li>\n</ul>\n<ul>\n<li>расходы на рекламу, приходящиеся на 1000 потребителей, подвергшихся воздействию всех видов рекламы (данного средства рекламы);</li>\n</ul>\n<ul>\n<li>расходы на рекламу за определенный период по отношению к количеству и сумме покупок (заказов) за этот же период;</li>\n</ul>\n<ul>\n<li>рост продажи товаров к единице расходов на рекламу и т. д.</li>\n</ul>\n<p><strong>Проблемы определения эффективности рекламы:</strong></p>\n<ul>\n<li>Получить абсолютно точные данные об экономической эффективности рекламы практически невозможно.</li>\n</ul>\n<ul>\n<li>Целесообразно рассматривать изменения экономических показателей деятельности фирмы под действием лишь рекламной кампании, не проводя в это же время других мероприятий по продвижению.</li>\n</ul>"},{"n":76,"t":"CPA и лидогенерация в структуре интернет-маркетинговых коммуникаций","ann":"CPA и лидогенерация: понятия, место в ИМК, стоимость лида.","a":"<p>CPA-маркетинг  – рекламодатель платит не за показы и клики, а за конкретных потребителей, подтвердивших интерес к продукту целевыми действиями.</p>\n<p>Лидогенерация – это привлечение потенциальных клиентов и сбор данных. Цель – превратить посетителей в лидов.</p>\n<p>Схемы лидогенерации:</p>\n<ul>\n<li>контент-маркетинг,</li>\n</ul>\n<ul>\n<li>лендинги,</li>\n</ul>\n<ul>\n<li>рекламные кампании,</li>\n</ul>\n<ul>\n<li>вебинары,</li>\n</ul>\n<ul>\n<li>контент-партнерство,</li>\n</ul>\n<ul>\n<li>партнерские программы,</li>\n</ul>\n<ul>\n<li>инфлюенс-маркетинг.</li>\n</ul>\n<p>Модели оплаты трафика:</p>\n<ul>\n<li><em>CPM</em> (плата за 1000 показов),</li>\n</ul>\n<ul>\n<li><em>CPC</em> (цена за клик),</li>\n</ul>\n<ul>\n<li><em>CPA</em> (плата за действие),</li>\n</ul>\n<ul>\n<li><em>CPO (стоимость оформленного заказа/заявки),</em></li>\n</ul>\n<ul>\n<li><em>CPS</em> (цена за продажу),</li>\n</ul>\n<ul>\n<li><em>CPD</em> (цена за скачивание).</li>\n</ul>\n<p><em>Кликабельность</em> (CTR) – это показатель, который отражает процент пользователей, кликнувших на объявление.</p>\n<p><em>Партнерские программы</em> – это модели оплаты рекламы, в которых участники получают деньги от рекламодателей за количество переходов, совершенных пользователями через средство рекламы, размещенное на сайте.</p>\n<p><em>Инфлюенс-маркетинг</em> – это стратегия продвижения, основанная на взаимодействии брендов с лидерами мнений (инфлюенсерами), чья персона имеет значительное влияние на ЦА.</p>"},{"n":77,"t":"Управление рекламной деятельностью. Организация рекламной деятельности рекламодателя. Организация рекламного агентства","ann":"Управление рекламной деятельностью. Организация на стороне рекламодателя. Структура РА.","a":"<p>Понятие управления</p>\n<p>Управление – это сознательное воздействие человека на объекты и процессы в целях придания деятельности предприятия коммерческой направленности и получения определенных результатов, то есть это процесс анализа, планирования, реализации планов и контроля.</p>\n<p><strong>Управление РД</strong> – взаимодействие участников для создания, продвижения и исследования рекламы с целью стимулирования потребительской деятельности или формирования имиджа.</p>\n<p><strong>Анализ среды РД</strong>: выявление факторов, влияющих на эффективность рекламы (анализ внешнего окружения, внутренней нерекламной и внутренней рекламной среды).</p>\n<p><strong>Коммуникационная среда функционирования рекламы состоит из</strong>: коммуникатор, сообщение, кодирование, канал, получатель, декодирование. Цель - нейтрализация негативных факторов и усиление позитивных.</p>\n<p><strong>Уровни организации РД</strong>: планирование, реализация, контроль.</p>\n<p><strong>Основные организационные структуры построения рекламодателя</strong>: маркетинговый отдел, отдел рекламы и коммуникаций, отдел продаж, аналитический отдел.</p>\n<p><strong>Рекламное агентство</strong> – это независимая организация, которая специализируется на разработке, подготовке, производстве и размещении рекламных программ, материалов и продуктов.</p>\n<p><strong>Виды рекламных агентств</strong>: рекламные творческие (создание рекламы) и медийные агентства (размещение).</p>\n<p><strong>Наиболее частая организационная структура рекламного агентства</strong>: творческий отдел, отдел средств рекламы, исследовательский отдел, коммерческий отдел + директор, бухгалтер.</p>"},{"n":78,"t":"Расчет рекламного бюджета. Контроль рекламной деятельности","ann":"Методы расчёта рекламного бюджета. Контроль.","a":"<p><strong>Рекламный бюджет</strong> – сумма средств, выделенная на продвижение в определенный период.</p>\n<p><strong>Сущность бюджетирования: </strong>распределение ресурсов, контроль затрат и анализ рентабельности.</p>\n<p><strong>Этапы распределения рекламного бюджета</strong>: определение целей рекламы, описание ЦА, выбор способов продвижения, распределение бюджета по каналам (медиаплан).</p>\n<p><strong>Основные статьи расходов</strong>: подготовка р. материалов; размещение рекламы; гонорары и т.д.</p>\n<p><strong>Контроль РД</strong> – это оценка результатов работы организации в сфере рекламы.</p>\n<p><strong>Виды контроля рекламной деятельности</strong>:</p>\n<ul>\n<li><em>Стратегический контроль рекламы</em>. Установление соответствия рекламы коммуникационной политике, достижение целей коммуникационной и рекламной стратегии</li>\n</ul>\n<ul>\n<li><em>Тактический контроль рекламы</em>. Определение оптимальных вариантов каналов, форм рекламы и т.д.</li>\n</ul>\n<ul>\n<li><em>Рекламный аудит</em>. Анализ того, насколько эффективно работает ваша реклама в интернете: приводит ли она покупателей, окупаются ли затраты и т. д.</li>\n</ul>"},{"n":79,"t":"Работа с системой контекстной рекламы Яндекс.Директ","ann":"Особенности работы с Яндекс.Директ: кампания, объявление, ключевые слова, ставки, CTR.","a":"<p>Яндекс.Директ – это вид контекстной рекламы, разработанной для продвижения бизнес-проектов и рекламы сайтов. Пользователи видят рекламу Яндекс.Директ в результатах поиска, когда система помещает ссылки на сайт в первых строчках поисковой выдачи Яндекса, а также на сайтах - в виде рекламных блоков.</p>\n<p>Директ предлагает 4 типа кампаний:</p>\n<ul>\n<li>текстово-графические – рекламные объявления на поиске и в рекламных сетях (РСЯ)</li>\n</ul>\n<ul>\n<li>смарт-баннеры – баннеры, нацеленные на релевантную аудиторию пользователей</li>\n</ul>\n<ul>\n<li>динамические объявления – автоматически формируемая реклама, адаптация под контент и поведение пользователя</li>\n</ul>\n<ul>\n<li>рекламу мобильных приложений – объявления показываются только на мобильных устройствах - в поиске и в РСЯ</li>\n</ul>\n<p>Особенности рекламы в ЯД:</p>\n<ul>\n<li>возможность таргетирования,</li>\n</ul>\n<ul>\n<li>управление бюджетом,</li>\n</ul>\n<ul>\n<li>отслеживание конверсий</li>\n</ul>\n<p>Преимущества: целевая аудитория, гибкие настройки, отчетность.</p>\n<p>Недостатки: конкуренция, требует постоянной оптимизации.</p>"},{"n":80,"t":"Понятие и особенности массовой коммуникации","ann":"Понятие, особенности и функции массовой коммуникации. Институциональность. Анонимность аудитории.","a":"<p><strong>Массовая коммуникация</strong> – это процесс распространение информации с помощью технических средств на большие, рассредоточенные аудитории.</p>\n<p><strong>Особенности массовой коммуникации</strong>: общественная значимость передаваемой информации; массовость аудитории; опосредованность и многоканальность; институциональность и односторонность; публичность.</p>\n<p><strong>Массовая аудитория</strong> – это одна из разновидностей аудитории, особенностью которой является большое количество участников в ней.</p>\n<p><strong>Структура массовой коммуникации</strong>:</p>\n<p>•  Источник информации.</p>\n<p>•  Средства массовой коммуникации (СМК)/СМИ/СМВ (каналы).</p>\n<p>•  Сообщение.</p>\n<p>•  Кодирование.</p>\n<p>•  Каналы связи.</p>\n<p>•  Получатели.</p>\n<p>•  Декодирование.</p>\n<p>•  Обратная связь.</p>\n<p><strong>Массовая информация</strong> – это систематическое распространение информации среди численно большой, рассредоточенной аудитории с целью оказания воздействия на мнение, оценки и поведение людей.</p>\n<p><strong>Социальные функции массовой коммуникации</strong>: информационная; регулирующая; рекреативная; функция социальной интеграции<strong>.</strong></p>"},{"n":81,"t":"Виды делового письма","ann":"Виды деловых писем: информационные, запрос, оферта, рекламация, сопроводительное, гарантийное.","a":"<p>Деловое письмо – это краткий документ, который касается одного вопроса или нескольких тесно взаимосвязанных вопросов и предназначен для информационного обмена между предприятиями, организациями, учреждениями и их структурными подразделениями.</p>\n<p>Виды деловых писем</p>\n<p><strong>– Убеждающие письма</strong>. Аргументация для склонения к определенной точке зрения (тезис, доказательства, опровержение).</p>\n<p><strong>– Письма отказы</strong>. Уведомление об отказе (коммерческие предложения, сотрудничество и т.д.).</p>\n<p><strong>– Письма претензии</strong>. Выражение недовольства качеством исполнения обязательств (возврат средств, невыполнение условий и т.д.).</p>\n<p><strong>– Письма ответы на претензии</strong>. Официальный ответ, пишется в свободной форме, может быть использовано как доказательство в суде.</p>\n<p>Доп. классификация писем:</p>\n<ul>\n<li>письма, требующие ответа (запросы, обращения, предложения, просьбы)</li>\n</ul>\n<ul>\n<li>письма, не требующие ответа (информационные письма, извещения, напоминания, подтверждения)</li>\n</ul>"},{"n":82,"t":"Предпринимательская идея и пути ее создания","ann":"Понятие предпринимательской идеи. Пути создания. Источники идей. SWOT. Бизнес-план.","a":"<p>Предпринимательская идея — это концепция решения проблемы или удовлетворения потребности рынка, направленная на систематическое извлечение прибыли.</p>\n<p>Анализ внешней и внутренней среды – обязательный этап для любого предпринимателя, поскольку правильное понимание условий, в которых предстоит работать, позволяет выработать наиболее эффективную стратегию и является необходимой предпосылкой для принятия управленческих решений.</p>\n<p><strong>Предпринимательские идеи создаются через следующие 5 путей:</strong></p>\n<ul>\n<li>Решение личных проблем</li>\n</ul>\n<ul>\n<li>Анализ дефицита на рынке</li>\n</ul>\n<ul>\n<li>Зарубежный опыт</li>\n</ul>\n<ul>\n<li>Модификация существующего</li>\n</ul>\n<ul>\n<li>Креативные методики</li>\n</ul>\n<p>Выбор ПИ: анализ рынка, потребностей; создание банка идей; оценка идей; выбор лучшей идеи и ее проверка; анализ конкурентов; принятие решения о реализации ПИ и разработка бизнес-плана.</p>\n<p>Внешняя среда – факторы, которые предприниматель не может изменить, но обязан учитывать:</p>\n<ul>\n<li>экономические (уровень налогов, доступность кредитов, покупательная способность)</li>\n</ul>\n<ul>\n<li>правовые (законодательство, регулирующее выбранную сферу деятельности)</li>\n</ul>\n<ul>\n<li>конкурентные (наличие и сила конкурентов на рынке)</li>\n</ul>\n<ul>\n<li>технологические (уровень развития техники в отрасли)</li>\n</ul>\n<ul>\n<li>Внешняя среда носит для предпринимателя объективный характер – он не может ее напрямую изменить, но должен учитывать при ведении дела.</li>\n</ul>\n<p>Внутренняя среда – ресурсы и возможности самого предпринимателя:</p>\n<ul>\n<li>финансовые ресурсы (собственный капитал, возможность привлечь кредит)</li>\n</ul>\n<ul>\n<li>производственные мощности</li>\n</ul>\n<ul>\n<li>компетенции и опыт предпринимателя</li>\n</ul>"},{"n":83,"t":"Оборотные средства предприятия","ann":"Понятие, состав и структура оборотных средств. Оборотные фонды и фонды обращения. Оборачиваемость.","a":"<p>Оборотные средства предприятия – это деньги и ресурсы, которые постоянно участвуют в производстве и потом возвращаются обратно через продажи.</p>\n<p>1.\tОборотные фонды</p>\n<ul>\n<li>производственные запасы;</li>\n</ul>\n<ul>\n<li>НЗП;</li>\n</ul>\n<ul>\n<li>расходы будущих периодов.</li>\n</ul>\n<p>2.\tФонды обращения</p>\n<ul>\n<li>ГП (готовая продукция) на складе;</li>\n</ul>\n<ul>\n<li>отгруженная продукция;</li>\n</ul>\n<ul>\n<li>дебиторская задолженность;</li>\n</ul>\n<ul>\n<li>ДС (денежные средства)</li>\n</ul>\n<p><strong>Источники формирования: </strong></p>\n<ul>\n<li>Собственные: уставный капитал, прибыль, амортизационные отчисления.</li>\n</ul>\n<ul>\n<li>Заемные: банковские кредиты, займы.</li>\n</ul>\n<ul>\n<li>Привлеченные (Кредиторская задолженность): задолженность поставщикам, бюджету, персоналу.</li>\n</ul>\n<p><strong>Показатели использования:</strong></p>\n<p>Коэффициент оборачиваемости – сколько оборотов совершают средства за период.</p>\n<p>Период оборота – за сколько дней средства возвращаются в виде выручки.</p>\n<p>Норма запаса – минимальный запас в днях для бесперебойной работы, используется при нормировании.</p>"},{"n":84,"t":"Основные производственные фонды промышленного предприятия (ОПФ)","ann":"понятие ОПФ, состав и структура. Виды оценки, экономическая сущность амортизации","a":"<p>Основные производственные фонды – это имущество предприятия, которое используется долго (больше года), участвует в производстве и не теряет свою форму сразу.</p>\n<p><strong>ОПФ бывают: </strong></p>\n<p><strong>Активные:</strong> машины и оборудование, транспортные средства, приборы и т.д.</p>\n<p><strong>Пассивные:</strong> здания и сооружения, производственные здания, земля</p>\n<p><strong>Виды оценки ОПФ: БРО+ВЛ </strong></p>\n<ul>\n<li>балансовая стоимость (ставятся на учет и определяется амортизация)</li>\n</ul>\n<ul>\n<li>рыночная стоимость (сколько можно получить при продаже)</li>\n</ul>\n<ul>\n<li>остаточная стоимость (разница между первоначальной или восстановительной стоимостью и величиной износа основных средств)</li>\n</ul>\n<ul>\n<li>восстановительная стоимость (во время переоценки, ремонта и т.д.)</li>\n</ul>\n<ul>\n<li>ликвидационная стоимость (при продаже в короткие сроки).</li>\n</ul>\n<p>Амортизация – процесс постепенного переноса стоимости ОС на производимую продукцию.</p>\n<p>У каждого ОС есть свой срок полезного использования, в течение которого оно постепенно изнашивается морально или физически и его стоимость снижается.</p>"},{"n":85,"t":"Понятие «рекламный текст»: определение, типы, цель","ann":"Рекламный текст – это текст, содержащий рекламную информацию. Цель рекламного текста ― максимально воздействовать на сознание потенциального потребителя товаров и услуг, на его выбор через обобщения, абстракции, понятия, образы, которые, понравившись потребителю, вызвав его положительную реакцию, за","a":"<p>Рекламный текст – это текст, содержащий рекламную информацию.</p>\n<p>Цель рекламного текста ― максимально воздействовать на сознание потенциального потребителя товаров и услуг, на его выбор через обобщения, абстракции, понятия, образы, которые, понравившись потребителю, вызвав его положительную реакцию, запомнившись, в дальнейшем перерабатываются в конкретные желания и действия, поступки.</p>\n<p><strong>Типы рекламных текстов (по целям и задачам):</strong></p>\n<ul>\n<li><strong>Информационные</strong> — знакомят аудиторию с товаром, услугой или брендом, сообщают характеристики без прямого призыва к действию.</li>\n</ul>\n<ul>\n<li><strong>Напоминающие</strong> — удерживают клиентов, напоминают о бренде и стимулируют повторные покупки.</li>\n</ul>\n<ul>\n<li><strong>Внушающие</strong> — формируют запоминаемость и положительные ассоциации через повторение названия и характеристик товара.</li>\n</ul>\n<ul>\n<li><strong>Убеждающие</strong> (продающие) — побуждают к действию: покупке, регистрации, подписке, делают акцент на выгодах и уникальности предложения.</li>\n</ul>\n<p><strong>По формату и каналу размещения для:</strong></p>\n<ul>\n<li>для соцсетей;</li>\n</ul>\n<ul>\n<li>контекстной рекламы;</li>\n</ul>\n<ul>\n<li>email-рассылок;</li>\n</ul>\n<ul>\n<li>лендингов;</li>\n</ul>\n<ul>\n<li>баннерной рекламы;</li>\n</ul>\n<ul>\n<li>SEO-тексты;</li>\n</ul>\n<ul>\n<li>офлайн-рекламы.</li>\n</ul>"},{"n":86,"t":"Медийный текст: основные особенности","ann":"Понятие медиатекст: определение, история появления. Отличия понятий текст и медиатекст.","a":"<p>Медиатекст – это конкретный результат медиа продукции – информационное сообщение, изложенное в любом виде и жанре медиа (телепередача, видеоклип, фильм и пр.).</p>\n<p><strong>История появления: </strong>понятие «медиатекст» возникло в 90-х годах XX века в англоязычной научной литературе. Это связано со стремительным развитием средств массовой коммуникации (медиа), когда на смену традиционному печатному тексту пришли новые разновидности текстов.</p>\n<p><strong>Отличия понятий текст и медиатекст:</strong></p>\n<p>Текст – это последовательность слов, вербальных единиц.</p>\n<p>Медиатекст шире понятия «текст», так как он выходит за пределы вербальной знаковой системы. Медиатекст может включать в себя не только письменный текст, но и другие медийные элементы, такие как изображения, аудио- и видеофайлы, графику и т. д. Важной особенностью медиатекста является его адаптация к конкретным медийным форматам и целевой аудитории.</p>\n<p><strong>Характеристики издания или канала:</strong> медиатекст сильно обусловлен каналом коммуникации. У каждого СМИ есть свои особые медийные признаки, которые влияют на лингвоформатные свойства текста.</p>\n<p><strong>Функционально-жанровая принадлежность текстов:</strong> в рамках медиалингвистики выделяются такие функционально-жанровые типы медиатекстов, как новости, информационная аналитика и комментарий, публицистика и реклама.</p>"},{"n":87,"t":"Функциональные характеристики медиатекстов","ann":"Понятие медиатекст, базовые исходные особенности медия. Специфические черты медиатекстов.","a":"<p>Медиатекст – информационное сообщение, изложенное в любом виде и жанре медиа (телепередача, видеоклип, фильм и пр.).</p>\n<p><strong>Базовые исходные особенности медиа: </strong></p>\n<ul>\n<li><strong>П</strong>оточность — производство на поток, одноразовость</li>\n</ul>\n<ul>\n<li><strong>К</strong>оллективность — несколько авторов и редакторов</li>\n</ul>\n<ul>\n<li><strong>О</strong>посредованность — нет прямого контакта, обратная связь особая</li>\n</ul>\n<ul>\n<li><strong>Т</strong>ехнологичность — зависит от технических средств передачи</li>\n</ul>\n<ul>\n<li><strong>К</strong>оммерческость — экономический параметр влияет на содержание</li>\n</ul>\n<p><strong>Специфические черты медиатекстов: </strong>яркий заголовок; информативность начала текста (самое важное в начале); пирамида обратного порядка; объемность и многослойность.</p>\n<p><strong>Информационная функция</strong> медиатекстов заключается в передаче любой информации о мире с помощью письменных средств (новостные статьи), звуковых средств (радиопередачи, подкасты) и видеофрагментов (телевидение, видеопорталы в Интернете).</p>"},{"n":88,"t":"Формальные признаки рекламного текста","ann":"Формальные признаки рекламного текста включают в себя: элементы презентации; рекламные реквизиты; компоненты бренда.","a":"<p>Рекламный текст – это текст, содержащий рекламную информацию.</p>\n<p><strong>Формальные признаки рекламного текста:</strong></p>\n<p><strong>Элементы презентации.</strong> Официальное представление общественности объекта рекламирования. Объектом может служить продвигаемый товар, услуга, человек или образ действий. Формальными презентационными сигналами служит расположение текста на рекламных площадях и носителях, его трансляция в рекламных блоках, наличие значка «на правах рекламы».</p>\n<p><strong>Рекламные реквизиты.</strong> Любая контактная информация, по которой целевая аудитория может дать обратную связь рекламодателю и совершить целевое действие. К реквизитам относится адрес магазина или офиса продаж, номер телефона, web-адрес, ссылки на интернет-страницы и т. д.</p>\n<p><strong>Компоненты бренда. </strong>Товарный знак, торговая марка, логотип, фирменный стиль в оформлении, звуковой образ, миссия, позиционирование. Наличие элементов бренда не является обязательным для всех рекламных текстов, и может отсутствовать, например, в социальной рекламе.</p>"},{"n":89,"t":"Лексика и словообразование как ресурс рекламного и PR-текста","ann":"Языковые особенности современной рекламы. Лингвистические особенности PR-текстов. Понятие PR-текст. Приемы языковой игры в рекламе.","a":"<p><strong>Лексика современной рекламы: </strong>специфические приемы используются для привлечения внимания аудитории и формирования положительного образа товара или услуги.</p>\n<p><strong>Для рекламы характерны:</strong></p>\n<ul>\n<li>создание новых слов (окказиональное словообразование)</li>\n</ul>\n<ul>\n<li>использование жаргонизмов и профессиональной лексики</li>\n<li>простой синтаксис</li>\n<li>вопросительные предложения.</li>\n</ul>\n<p><strong>Для PR-текстов характерны: </strong>информативность, точность, понятность и лаконичность. Также в них часто используются статистические данные, терминология и обращения к авторитетным источникам.</p>\n<p>PR-текст – информационное сообщение, созданное для формирования позитивного имиджа компании, продвижения бренда или привлечения внимания к событию</p>\n<p><strong>Языковая игра в рекламе</strong> — намеренное изменение привычных языковых норм для усиления выразительности и привлечения внимания.</p>\n<p><strong>Основные приемы языковой игры:</strong></p>\n<ul>\n<li>графические</li>\n<li>лингвистические</li>\n<li>художественные</li>\n<li>цитатное письмо</li>\n</ul>"},{"n":90,"t":"Информационная культура","ann":"При ответе на этот вопрос необходимо раскрыть понятия «информационная культура», «информация», «информационный процесс», «информационная технология», «информационные ресурсы», «информационный продукт», «качество и количество информации». Место информационной культуры в жизни человека и общества.","a":"<p>Информационная культура – это совокупность знаний, навыков и поведения человека, связанных с использованием информации и информационных технологий.</p>\n<p>Информация – любые обрабатываемые компьютером данные.</p>\n<p>Информационный процесс – это деятельность, связанная с преобразованием и передачей информации.</p>\n<p>Информационная технология – совокупность методов, производственных процессов и программно-технических средств, объединенных для сбора, обработки, хранения, передачи и анализа информации.</p>\n<p>Информационные ресурсы – это совокупность данных, организованных для получения достоверной информации.</p>\n<p>Информационный продукт – это информация всех видов, программные продукты, базы данных, представленные в форме товара, т. е. созданные с целью продажи за деньги или обмена на другие продукты</p>\n<p>Качество информации – это показатель ценности, которую информация предоставляет пользователю этой информации.</p>\n<p>Количество информации – это мера уменьшения неопределенности знаний при получении информационных сообщений.</p>\n<p>Место информационной культуры в жизни человека и общества: информационные технологии и информационная культура определяют развитие общества. Они являются фундаментом современной экономики, образования, медицины и повседневного общения.</p>"},{"n":91,"t":"Представление информации в памяти компьютера","ann":"При ответе на этот вопрос необходимо раскрыть понятие «система счисления», рассказать о типах систем счисления, алфавите и представлении информации в двоично-восьмеричных и двоично-шестнадцатеричных кодах.","a":"<p>Система счисления – это метод представления чисел с помощью определенных знаков и правил их записи. Она позволяет удобно обозначать количества, выполнять расчеты и хранить информацию в различной форме.</p>\n<p>Различают позиционные СС, когда значение каждой цифры числа определяется ее позицией в записи числа и непозиционные, когда значение цифры в числе не зависит от ее места в записи числа</p>\n<p>Типы систем счисления:</p>\n<ul>\n<li>Десятичная. Использует десять символов – от 0 до 9.</li>\n</ul>\n<ul>\n<li>Двоичная. Алфавит состоит из двух цифр – 0 и 1.</li>\n</ul>\n<ul>\n<li>Восьмеричная. Основание – 8, используются цифры 0–7. Каждой восьмеричной цифре соответствует строго три двоичные цифры.</li>\n</ul>\n<ul>\n<li>Шестнадцатеричная. Основание – 16, используются 16 символов: 0–9 для чисел от нуля до девяти и A, B, C, D, E, F для чисел от десяти до пятнадцати.</li>\n</ul>\n<p>Алфавит и представление информации в двоично-восьмеричном коде:  способ записи чисел, при котором каждая цифра восьмеричной системы (от 0 до 7) представлена трехзначным двоичным числом (двоичной триадой). Например, 0-000, 1-001, а 2- 010.</p>\n<p>Алфавит и представление информации в двоично-шестнадцатеричном коде: каждая шестнадцатеричная цифра эквивалентна последовательности из четырех двоичных бит. Благодаря этому любое двоичное число можно записать в четыре раза короче в шестнадцатеричном формате. Например, двоичный байт 11111111₂ в шестнадцатеричной системе записывается как короткое FF₁₆.</p>"},{"n":92,"t":"Уровни представления информационных технологий","ann":"При ответе на этот вопрос необходимо раскрыть понятия «графический пользовательский интерфейс» и «командная строка». Рассказать об эволюции пользовательского интерфейса, основных элементах и его роли в информационных технологиях. ","a":"<p>Графический пользовательский интерфейс – это тип интерфейса, который предоставляет пользователям возможность взаимодействовать с компьютерными системами и приложениями через визуальные элементы, такие как окна, иконки, кнопки и меню, а не текстовые команды.</p>\n<p>Командная строка – это текстовый интерфейс пользователя для взаимодействия с операционной системой компьютера и/или другим программным обеспечением с помощью команд, вводимых с клавиатуры.</p>\n<p><strong>Эволюция пользовательского интерфейса (ПИ):</strong></p>\n<p>Этап 1. Создание монитора и клавиатуры, позволявших вводить информацию и отображать результаты выполнения программ.</p>\n<p>Этап 2. Появление средств позиционного ввода (манипуляторов типа «мышь»).</p>\n<p>Этап 3. Появление цветных мониторов и мультимедиа.</p>\n<p>Этап 4. Создание компьютеров планшетного карманного типа и соответствующих им графических ПИ.</p>\n<p>Этап 5. Виртуальная реальность, где взаимодействие пользователя и ЭВМ осуществляется с помощью различных сенсоров.</p>\n<p><strong>Основные элементы ПИ:</strong></p>\n<ul>\n<li>Элементы управления – такие как кнопки, флажки, текстовые поля и другие.</li>\n</ul>\n<ul>\n<li>Меню – набор команд и опций, сгруппированных по категориям, которые пользователь может выбирать для выполнения определенных действий.</li>\n</ul>\n<ul>\n<li>Панели инструментов – набор кнопок и иконок, предоставляющих быстрый доступ к часто используемым функциям.</li>\n</ul>\n<ul>\n<li>Индикаторы состояния – отображают информацию о текущем состоянии приложения.</li>\n</ul>\n<p>Роль ПИ в информационных технологиях: ПИ является средством взаимодействия пользователя с программным обеспечением.</p>"},{"n":93,"t":"Правовые нормы защиты информации","ann":"При ответе на этот вопрос необходимо рассказать о видах конфиденциальной информации, действиях по защите информации от несанкционированного доступа, правовых мерах обеспечения безопасности и защиты информации.","a":"<p>Конфиденциальная информация – это данные, которые считаются частными, секретными или ограниченными для определенного круга лиц и не предназначены для публичного распространения.</p>\n<p>Виды конфиденциальной информации: персональные данные; коммерческая тайна; государственная тайна; профессиональная тайна; служебная тайна; сведения о сути изобретений.</p>\n<p><strong>Действия по защите информации от несанкционированного доступа:</strong></p>\n<ul>\n<li>Идентификация и аутентификация пользователей;</li>\n</ul>\n<ul>\n<li>Соблюдение правил работы с документацией;</li>\n</ul>\n<ul>\n<li>Защита данных на ПК;</li>\n</ul>\n<ul>\n<li>Предотвращение сетевых атак. Необходимо устанавливать межсетевые экраны для защиты от внешних угроз, использовать корпоративный VPN для безопасного удаленного доступа, регулярно проводить аудит безопасности сетей;</li>\n</ul>\n<ul>\n<li>Проверка соискателей и сотрудников. Чтобы предотвратить возможные внутренние угрозы, нужно проверять новичков и сотрудников, которые получают доступ к конфиденциальной информации.</li>\n</ul>\n<p><strong>Правовые меры обеспечения безопасности и защиты информации:</strong></p>\n<ul>\n<li>законодательное разграничение полномочий в области обеспечения информационной безопасности (ИБ) РФ между федеральными органами гос. власти и органами государственной власти субъектов РФ;</li>\n</ul>\n<ul>\n<li>внесение изменений в законодательство РФ, регулирующее отношения в области обеспечения ИБ, в целях создания и совершенствования системы обеспечения ИБ РФ;</li>\n</ul>\n<ul>\n<li>разработка и принятие нормативных правовых актов РФ, устанавливающих ответственность юридических и физических лиц за несанкционированный доступ к информации, ее противоправное копирование;</li>\n</ul>\n<ul>\n<li>законодательное закрепление приоритета развития нац. сетей связи и отечественного производства спутников связи;</li>\n</ul>\n<ul>\n<li>определение статуса организаций, предоставляющих услуги глобальных информационно-телекоммуникационных сетей.</li>\n</ul>"},{"n":94,"t":"Графические редакторы","ann":"При ответе на этот вопрос необходимо дать определение понятию «графический редактор», рассказать о назначении и основных возможностях программ данного типа. Виды графических редакторов. Векторная и растровая графика: определение, особенности. ","a":"<p>Графический редактор – это программа для создания, редактирования и обработки цифровых изображений на компьютере.</p>\n<p><strong>Назначение ГР:</strong> позволяют обрабатывать фотографии, создавать иллюстрации, разрабатывать логотипы и другие визуальные материалы.</p>\n<p><strong>Основные возможности ГР: </strong>создание рисунка; манипулирование рисунком (выделение фрагментов, проработка деталей, копирование); ввод в изображение текста; работа с цветами; работа с внешними устройствами (дисками, принтером, сканером).</p>\n<p><strong>Виды графических редакторов: </strong></p>\n<ul>\n<li>Растровые. Растровая графика – это тип компьютерной графики, который представляет изображение в виде сетки пикселей. Особенности: высокая детализация и реалистичность; широкие возможности для обработки; большой вес изображений; потеря качества при сжатии.</li>\n</ul>\n<ul>\n<li>Векторные. Векторная графика – это метод создания компьютерного изображения, который строится посредством обработки математического описания в специальном программном обеспечении. Особенности: использование математических формул; масштабируемость; меньший размер файлов; редактируемость; высокое качество печати.</li>\n</ul>\n<ul>\n<li>3D-редакторы. Создают объемные модели в виртуальном пространстве.</li>\n</ul>"},{"n":95,"t":"Социальная и корпоративная ответственность в профессиональной деятельности","ann":"Сущность, понятие и виды социальной ответственности. Принципы социальной ответственности. Социальная ответственность личности и профессиональная социальная ответственность. Корпоративная социальная ответственность (КСО). Мотивы и инструменты для реализации различных направлений социальной ответствен","a":"<p><strong>Социальная ответственность (СО)</strong> – ответственность человека или организации перед обществом. Включает заботу о социальной среде, экономике, экологии и правах человека.</p>\n<p><strong>Виды СО:</strong></p>\n<ul>\n<li>Индивидуальная – волонтерство</li>\n</ul>\n<ul>\n<li>Корпоративная – благотворительность бизнеса</li>\n</ul>\n<p>Принципы социальной ответственности:</p>\n<p>а) Закон и этика</p>\n<ul>\n<li>этичность</li>\n<li>закон</li>\n<li>права человека</li>\n<li>международные нормы</li>\n</ul>\n<p>б) Открытость</p>\n<ul>\n<li>прозрачность</li>\n</ul>\n<ul>\n<li>подотчетность</li>\n</ul>\n<p><strong>СО личности</strong> – участие человека в жизни общества</p>\n<p><strong>Профессиональная СО </strong>– ответственное выполнение профессиональных обязанностей</p>\n<p><strong>(КСО) </strong>– это стратегический подход к ведению бизнеса, при котором он добровольно несет ответственность перед обществом и окружающей средой</p>\n<p><strong>Мотивы СО: </strong></p>\n<ul>\n<li>улучшение имиджа;</li>\n</ul>\n<ul>\n<li>снижение текучести кадров;</li>\n</ul>\n<ul>\n<li>рост производительности;</li>\n</ul>\n<ul>\n<li>дополнительная реклама;</li>\n</ul>\n<ul>\n<li>льготы и инвестиции.</li>\n</ul>\n<p><strong>Инструменты СО:</strong></p>\n<ul>\n<li>благотворительность</li>\n</ul>\n<ul>\n<li>спонсорство</li>\n</ul>\n<ul>\n<li>гранты</li>\n</ul>\n<ul>\n<li>соцпрограммы</li>\n</ul>\n<p><strong>Классические концепции КСО:</strong></p>\n<ul>\n<li>Теория <strong>«корпоративного эгоизма</strong>» – единственная ответственность бизнеса – увеличение прибыли для акционеров.</li>\n</ul>\n<ul>\n<li><strong>«Классическая точка зрения»:</strong> Руководство компании несет ответственность только за экономические результаты, а социальные вопросы – компетенция государства или частных лиц.</li>\n</ul>\n<ul>\n<li><strong>Экономическая эффективность:</strong> Социальные инициативы приемлемы только если они напрямую способствуют увеличению прибыли и долгосрочной устойчивости компании.</li>\n</ul>\n<p><strong>Современные концепции КСО</strong></p>\n<ul>\n<li><strong>Ответственное инвестирование: </strong>Бизнес учитывает влияние на общество и окружающую среду, чтобы привлекать инвесторов.</li>\n</ul>\n<ul>\n<li><strong>Устойчивое развитие: </strong>фокус на экологичности, социальной ответственности и долгосрочной жизнеспособности.</li>\n</ul>\n<p><strong>Понятие ESG</strong> (Environmental, Social, Governance) – это совокупность количественных и качественных критериев, позволяющих оценить, насколько компания устойчива и ответственна.</p>"},{"n":96,"t":"Цели и виды социологических исследований","ann":"при ответе на вопрос необходимо дать определение социологического исследования, выделить его цели и задачи. Назвать виды социологических исследований, привести их характеристику. Выделить виды стратегического плана исследования и обосновать его выбор. Особое внимание уделить построению гипотезы, наз","a":"<p><strong>Социологическое исследование (СИ)</strong> – это система процедур в социологии для получения научных знаний о социальных явлениях и процессах.</p>\n<p><strong>Цели: </strong>получение объективной и достоверной информации о социальных явлениях, установление закономерностей и механизмов их функционирования</p>\n<p><strong>Виды социологических исследований: Эдик Очень Внезапно Съел Арбуз, Опоздал, Потом Плакал и Рыдал</strong></p>\n<ul>\n<li>Эмпирическое. Изучение конкретных явлений через наблюдение, эксперимент и внедрение результатов в практику.</li>\n</ul>\n<ul>\n<li>Описательное. Создание целостного представления об изучаемом явлении или группе людей с разными характеристиками.</li>\n</ul>\n<ul>\n<li>Выборочное. Оценка характеристик большой группы на основе изучения ее части.</li>\n</ul>\n<ul>\n<li>Сплошное. Изучение общества в целом, а не отдельных его частей.</li>\n</ul>\n<ul>\n<li>Аналитическое. Детальный анализ данных для принятия решений.</li>\n</ul>\n<ul>\n<li>Оперативное. Быстрое исследование для решения практических задач.</li>\n</ul>\n<ul>\n<li>Пилотажное. Небольшое предварительное исследование для уточнения проблемы.</li>\n</ul>\n<ul>\n<li>Поисковое. Первичное исследование для определения проблемы.</li>\n</ul>\n<ul>\n<li>Репрезентативная выборка. Исследование на основе выборки, точно отражающей характеристики общей группы.</li>\n</ul>\n<p><strong>Построение гипотезы:</strong> важный элемент стратегического плана. Чем конкретнее цель и яснее сформулированы гипотезы, тем правильнее будет сделана выборка.</p>\n<p><strong>Виды гипотез: </strong></p>\n<ul>\n<li>Общая гипотеза – это вид гипотезы, объясняющей причину явления или группы явлений в целом.</li>\n</ul>\n<ul>\n<li>Частная гипотеза – это разновидность гипотезы, объясняющая какую-либо отдельное свойство явления или события</li>\n</ul>"},{"n":97,"t":"Программа как основной документ социологического исследования","ann":"при ответе на вопрос следует рассмотреть программу как основной документ социологического исследования, ее основные функции. Необходимо знать, что такое объект и предмет социологического исследования, уметь описать его цель и задачи. Ответ должен содержать понятие гипотезы, описание видов гипотез и ","a":"<p>Программа как основной документ социологического исследования (СИ) – научный документ, задающий стратегию и алгоритм работы ученого.</p>\n<p><strong>Основные функции:</strong></p>\n<p><strong>– </strong>методологическая (определение проблемы)</p>\n<ul>\n<li>методическая (план исследования)</li>\n<li>организационная (разделение задач между членами коллектива).</li>\n</ul>\n<p><strong>Объект СИ</strong> – социальная реальность (процесс, сфера, отношения).</p>\n<p><strong>Предмет СИ </strong>– свойства и характеристики объекта исследования.</p>\n<p><strong>Цель СИ:</strong> понимание и объяснение социальных явлений для принятия решений.</p>\n<p><strong>Задачи СИ: </strong>конкретные шаги для достижения цели исследования.</p>\n<p>Гипотеза – это научно обоснованное предположение о причинах или взаимосвязях каких-либо явлений или событий природы, общества и мышления</p>\n<p><strong>Виды гипотез (описание+ требования к ним): ПВОО</strong></p>\n<ul>\n<li>Первичные. Выдвигаются в начале исследования. Требование: соответствие начальным данным и здравому смыслу.</li>\n</ul>\n<ul>\n<li>Вторичные. Заменяют опровергнутые первичные гипотезы. Требование: объяснение отклонений и соответствие новым данным.</li>\n</ul>\n<ul>\n<li>Описательные. Предположения о свойствах объектов или связях между ними (классификационные или структурные). Требование: точность определений и возможность наблюдения.</li>\n</ul>\n<ul>\n<li>Объяснительные. Определяют причинно-следственные связи, выявляют причины, установленные в описательных гипотезах. Требование: обоснованность п-с связей и соответствие эмпирич. данным.</li>\n</ul>\n<p><strong>Виды переменных: </strong></p>\n<ul>\n<li>Зависимые. Наблюдаемые в процессе эксперимента, изменяющиеся в результате изменений независимой переменной.</li>\n</ul>\n<ul>\n<li>Независимые. Произвольно изменяемые экспериментатором.</li>\n</ul>\n<ul>\n<li>Явные. Прямо измеримые и наблюдаемые переменные.</li>\n</ul>\n<ul>\n<li>Латентные. Скрытые переменные, измеряемые косвенно через другие переменные.</li>\n</ul>"},{"n":98,"t":"Метод анкетирования при проведении социологического исследования","ann":"при ответе на вопрос необходимо выделить преимущества и ограничения метода анкетирования. Знать виды, этапы и основные способы анкетирования, понимать в чем отличие программных и индикаторных вопросов. Внимание при ответе уделить правилам отбора респондентов, правилам составления вопросов и их видах","a":"<p>Анкетирование – это метод сбора информации через опрос группы людей.</p>\n<p><strong>Преимущества метода анкетирования: </strong>массовость и оперативность; экономичность; стандартизация данных; удобство для респондентов.</p>\n<p><strong>Ограничения метода анкетирования: </strong>поверхностность и ограниченность анализа; риск недостоверных данных; трудности работы с определенными группами.</p>\n<p><strong>Виды анкетирования:</strong></p>\n<ul>\n<li>По количеству: индивидуальное/групповое</li>\n</ul>\n<ul>\n<li>По контакту: очное/заочное/телефонное</li>\n</ul>\n<p><strong>Этапы анкетирования:</strong></p>\n<ul>\n<li>Подготовка. Определение целей, разработка вопросов, выбор аудитории.</li>\n</ul>\n<ul>\n<li>Сбор данных. Проведение опроса, обучение персонала, обеспечение анонимности.</li>\n</ul>\n<ul>\n<li>Обработка. Классификация ответов, анализ, подведение итогов.</li>\n</ul>\n<p><strong>Правила отбора респондентов: </strong>соответствие ЦА; доступность для участия; заинтересованность респонд.</p>\n<p><strong>Структура анкеты: </strong>любая анкета включает три части: введение (цель, инструкция, анонимность), паспортичка (демографические данные о респонденте), основная часть (содержательные вопросы).</p>\n<p><strong>Правила составления вопросов: </strong>правило воронки (простые-сложные-простые вопросы); 1е вопросы максимально вовлекающие; деликатные вопросы – ближе к концу опроса.</p>\n<p><strong>Виды вопросов: ПИГ ОчЗлСег</strong></p>\n<ul>\n<li>Программные. Вопросы, направленные на получение основной информации.</li>\n</ul>\n<ul>\n<li>Индикаторные. Вопросы, измеряющие конкретные показатели.</li>\n</ul>\n<ul>\n<li>Гало-эффект. общее впечатление влияет на ответ</li>\n</ul>\n<ul>\n<li>Открытые. Требуют развернутого ответа.</li>\n</ul>\n<ul>\n<li>Закрытые. Предлагают варианты ответа.</li>\n</ul>\n<ul>\n<li>Вопросы смешанного типа. Комбинация открытых и закрытых вопросов.</li>\n</ul>"},{"n":99,"t":"Организация рабочей команды социологического исследования","ann":"при ответе на вопрос необходимо описать организацию рабочей команды социологического исследования, указать ключевые признаки команды. Привести различия в понятиях команды и коллектива. Особое внимание уделить распределению ролей в команде. Обосновать выбор канала сбора данных. Дать определение понят","a":"<p>Организация рабочей команды СИ – объединение людей с общими целями.</p>\n<p><strong>Ключевые признаки команды: </strong>небольшое число участников, взаимодополняющие навыки, общие цели и ценности, единые стандарты работы и совместная ответственность.</p>\n<p><strong>Различия в понятиях команды и коллектива:</strong> в команде – общая цель, в кол-индивид. задачи; поверхностные отношения в коллективе и доверие, сплоченность и прочная связь в команде.</p>\n<p><strong>Распределение ролей в команде:</strong> исходя из компетентности; предпочтений, несмотря на вид команды:</p>\n<ul>\n<li>Кросс-функциональная команда. Представители разных подразделений, решающие одноразовую задачу.</li>\n</ul>\n<ul>\n<li>Интактная команда. Долгосрочная группа, производящая продукт/услугу.</li>\n</ul>\n<p><strong>Обоснование выбора канала</strong> сбора данных: зависит от целей, задач и специфики исследования.</p>\n<p>«Пилотаж анкеты» – это процедура, которая позволяет получить информацию о том, как анкета воспринимается респондентами.</p>\n<p><strong>Приемы пилотажа: </strong></p>\n<ul>\n<li>Дебрифинг участников. Оценка сложности/удовлетворенности, высказывание мнения.</li>\n</ul>\n<ul>\n<li>Протокольный анализ. Оценка мнений респондентов.</li>\n</ul>"},{"n":100,"t":"Концептуализация данных со
